    "Республика Мордовия":["мордовия","республика мордовия"],
    "Удмуртская Республика":["удмуртия","удмуртская республика"],

    "Республика Саха (Якутия)":["якутия","саха"],
    "ХМАО":["хмао","ханты-мансийский"],
    "ЯНАО":["янао","ямало-ненецкий"],
    "Адыгея":["республика адыгея"]
};

// ===================== ФУНКЦИЯ ЗАГРУЗКИ =====================
async function loadAlerts() {
    const log = document.getElementById("log");
    log.innerHTML = "Загрузка...";

    try {
        // Для работы в браузере: возможно потребуется прокси из-за CORS
        const resp = await fetch("https://t.me/s/bplarussiaru");
        const html = await resp.text();

        const data = [...html.matchAll(/data-post="bplarussiaru\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gs)];

        const alerts = {};

        for (const item of data) {
            const postId = Number(item[1]);
            let text = item[2].replace(/<[^>]+>/g, "").toLowerCase().replace(/\s+/g, " ");

            const matchedRegions = Object.keys(regionAliases).filter(region =>
                regionAliases[region].some(alias => text.includes(alias))
            );

            if (!matchedRegions.length) continue;

            const isOtboy = ["отбой","нет угрозы","угрозы нет","угроза снята"].some(x => text.includes(x));
            const isAlert = ["опасность","бпла","ракета","ракет","авиацион","угроза"].some(x => text.includes(x));

            matchedRegions.forEach(region => {
                if (isOtboy) alerts[region] = "clear";
                else if (isAlert) alerts[region] = "alert";
            });
        }

        // ===================== ОТОБРАЖЕНИЕ =====================
        log.innerHTML = "";
        Object.keys(regionAliases).forEach(region => {
            const div = document.createElement("div");
            div.className = "region " + (alerts[region] === "alert" ? "alert" : "clear");
            div.innerText = region;
            log.appendChild(div);
        });

    } catch (e) {
        log.innerHTML = `<div class='alert'>Ошибка загрузки: ${e.message}</div>`;
        console.error(e);
    }
}

// ===================== АВТОМАТИЧЕСКОЕ ОБНОВЛЕНИЕ =====================
loadAlerts();
setInterval(loadAlerts, 60000); // обновлять каждые 60 секунд
</script>
