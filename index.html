<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Alert Map - Границы регионов РФ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0e1a;
        font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
        overflow: hidden;
    }

    .clock {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 10px 20px;
        color: #e8eef2;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .time-main {
        font-size: 2rem;
        font-weight: 600;
        line-height: 1;
    }

    .date {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 18px;
        color: #e8eef2;
        font-size: 0.8rem;
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .legend-color {
        width: 28px;
        height: 18px;
        border-radius: 4px;
    }

    .custom-popup .leaflet-popup-content-wrapper {
        background: #1a1f2e;
        color: #e8eef2;
        border-radius: 12px;
        border-left: 4px solid;
    }

    .leaflet-control-attribution {
        display: none !important;
    }

    .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3000;
        background: rgba(0,0,0,0.95);
        padding: 20px 30px;
        border-radius: 12px;
        color: white;
        text-align: center;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .loader-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .time-main { font-size: 1.2rem; }
        .clock { padding: 5px 12px; top: 10px; right: 10px; }
        .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
        .legend-color { width: 20px; height: 14px; }
    }
</style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #2e7d32;"></div> <span>🟢 Внимание по БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Ракетная опасность</span></div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <span>Загрузка границ регионов...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ===========================================
    // ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ===========================================
    const map = L.map('map').setView([61, 95], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 10,
        minZoom: 2
    }).addTo(map);

    // ===========================================
    // ЦВЕТА ТРЕВОГ
    // ===========================================
    const colors = {
        clear: "#6c757d",
        droneAttention: "#2e7d32",
        droneDanger: "#ffc107",
        rocket: "#dc3545"
    };

    let currentAlertLevels = {};
    let regionsLayer = null;

    // ===========================================
    // ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('liveTime').innerHTML = `${hours}:${minutes}`;
        const options = { day: 'numeric', month: 'long', weekday: 'long' };
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', options);
    }
    updateClock();
    setInterval(updateClock, 60000);

    // ===========================================
    // ФОРМАТИРОВАНИЕ НАЗВАНИЙ
    // ===========================================
    function formatRegionName(name) {
        if (!name) return "";
        const words = name.split(' ');
        if (words.length === 1) return words[0];
        return `${words[0]}<br>${words.slice(1).join(' ')}`;
    }

    // ===========================================
    // РЕГИОНЫ ДЛЯ ПАРСИНГА
    // Удмуртская Республика (полностью)
    // Чувашия, Марий Эл (без "Республика")
    // ===========================================
    const regionAliases = {
        "Москва": ["москва", "мск"],
        "Московская область": ["московская область", "подмосковье"],
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб"],
        "Ленинградская область": ["ленинградская область"],
        "Белгородская область": ["белгородская область", "белгород"],
        "Брянская область": ["брянская область", "брянск"],
        "Владимирская область": ["владимирская область"],
        "Воронежская область": ["воронежская область", "воронеж"],
        "Ивановская область": ["ивановская область"],
        "Калужская область": ["калужская область", "калуга"],
        "Костромская область": ["костромская область"],
        "Курская область": ["курская область", "курск"],
        "Липецкая область": ["липецкая область"],
        "Нижегородская область": ["нижегородская область", "нижний новгород"],
        "Новгородская область": ["новгородская область"],
        "Орловская область": ["орловская область"],
        "Пензенская область": ["пензенская область"],
        "Псковская область": ["псковская область"],
        "Рязанская область": ["рязанская область"],
        "Смоленская область": ["смоленская область"],
        "Тамбовская область": ["тамбовская область"],
        "Тверская область": ["тверская область"],
        "Тульская область": ["тульская область"],
        "Ярославская область": ["ярославская область"],
        "Краснодарский край": ["краснодарский край", "кубань"],
        "Ставропольский край": ["ставропольский край"],
        "Ростовская область": ["ростовская область"],
        "Волгоградская область": ["волгоградская область"],
        "Астраханская область": ["астраханская область"],
        "Республика Татарстан": ["татарстан", "республика татарстан"],
        "Республика Башкортостан": ["башкортостан", "республика башкортостан"],
        "Республика Крым": ["крым", "республика крым"],
        "Калининградская область": ["калининградская область", "калининград"],
        "Свердловская область": ["свердловская область"],
        "Челябинская область": ["челябинская область"],
        "Новосибирская область": ["новосибирская область"],
        "Омская область": ["омская область"],
        "Томская область": ["томская область"],
        "Кемеровская область": ["кемеровская область"],
        "Иркутская область": ["иркутская область"],
        "Красноярский край": ["красноярский край"],
        "Алтайский край": ["алтайский край"],
        "Приморский край": ["приморский край"],
        "Хабаровский край": ["хабаровский край"],
        "Самарская область": ["самарская область"],
        "Саратовская область": ["саратовская область"],
        "Пермский край": ["пермский край"],
        "Ханты-Мансийский АО": ["хмао", "ханты-мансийский"],
        "Ямало-Ненецкий АО": ["янао", "ямало-ненецкий"],
        // ВАЖНО: Удмуртская Республика (полное название)
        "Удмуртская Республика": ["удмуртская республика", "удмуртия", "удмурт"],
        // Чувашия и Марий Эл - без "Республика"
        "Чувашия": ["чувашия", "чувашская республика", "чуваши"],
        "Марий Эл": ["марий эл", "республика марий эл", "марий"],
        "Мордовия": ["мордовия", "республика мордовия"],
        "Карелия": ["карелия", "республика карелия"],
        "Республика Коми": ["коми", "республика коми"],
        "Дагестан": ["дагестан", "республика дагестан"],
        "Адыгея": ["адыгея", "республика адыгея"],
        "Кабардино-Балкария": ["кабардино-балкария"],
        "Карачаево-Черкесия": ["карачаево-черкесия"],
        "Северная Осетия": ["северная осетия"],
        "Ингушетия": ["ингушетия"],
        "Чечня": ["чечня", "чеченская республика"],
        "Бурятия": ["бурятия", "республика бурятия"],
        "Алтай": ["алтай", "республика алтай"],
        "Тыва": ["тыва", "тува", "республика тыва"],
        "Хакасия": ["хакасия", "республика хакасия"],
        "Саха (Якутия)": ["якутия", "саха", "республика саха"],
        "Камчатский край": ["камчатский край"],
        "Амурская область": ["амурская область"],
        "Магаданская область": ["магаданская область"],
        "Сахалинская область": ["сахалинская область"],
        "Еврейская АО": ["еврейская автономная", "еао"],
        "Забайкальский край": ["забайкальский край"],
        "Архангельская область": ["архангельская область"],
        "Мурманская область": ["мурманская область"],
        "Вологодская область": ["вологда", "вологодская область"],
        "Курганская область": ["курганская область"],
        "Оренбургская область": ["оренбургская область"],
        "Тюменская область": ["тюменская область"],
        "Республика Адыгея": ["адыгея"],
        "Карачаево-Черкесская Республика": ["карачаево-черкесия"],
        "Кабардино-Балкарская Республика": ["кабардино-балкария"]
    };

    // ===========================================
    // ЗАГРУЗКА ГРАНИЦ С GITHUB
    // ===========================================
    const geojsonUrl = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
    const fallbackUrl = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
    
    function loadGeoJSON(url, isFallback = false) {
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log("GeoJSON загружен:", url);
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(error => {
                console.error("Ошибка загрузки из", url, error);
                if (!isFallback) {
                    loadGeoJSON(fallbackUrl, true);
                } else {
                    document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки границ</span>';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                    }, 3000);
                }
            });
    }

    function initRegionsLayer(geoJsonData) {
        regionsLayer = L.geoJSON(geoJsonData, {
            style: function(feature) {
                let regionName = feature.properties?.name || feature.properties?.NAME || "";
                const level = currentAlertLevels[regionName] || 0;
                let fillColor;
                if (level === 0) fillColor = colors.clear;
                else if (level === 1) fillColor = colors.droneAttention;
                else if (level === 2) fillColor = colors.droneDanger;
                else fillColor = colors.rocket;
                
                return {
                    color: "#ffffff",
                    weight: 2.2,
                    fillColor: fillColor,
                    fillOpacity: 0.7,
                    smoothFactor: 0.5
                };
            },
            onEachFeature: function(feature, layer) {
                let regionName = feature.properties?.name || feature.properties?.NAME || "";
                if (regionName) {
                    const formattedName = formatRegionName(regionName);
                    const level = currentAlertLevels[regionName] || 0;
                    let levelText = "", levelColor = "";
                    if (level === 0) { levelText = "⚪ Отбой / Спокойно"; levelColor = "#adb5bd"; }
                    else if (level === 1) { levelText = "🟢 Внимание! Угроза БПЛА"; levelColor = "#81c784"; }
                    else if (level === 2) { levelText = "🟡 Опасность БПЛА"; levelColor = "#ffc107"; }
                    else { levelText = "🔴 РАКЕТНАЯ ОПАСНОСТЬ!"; levelColor = "#ff6b6b"; }
                    
                    layer.bindPopup(`
                        <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                            <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                                ${formattedName}
                            </div>
                            <span style="color:${levelColor};">${levelText}</span>
                        </div>
                    `, { className: 'custom-popup' });
                }
            }
        }).addTo(map);
        
        setTimeout(() => {
            map.flyTo([61, 95], 4.5, { duration: 1.2 });
        }, 200);
        
        fetchAndUpdateAlerts();
        setInterval(fetchAndUpdateAlerts, 35000);
    }

    function updateRegionColors() {
        if (!regionsLayer) return;
        regionsLayer.eachLayer(layer => {
            let regionName = layer.feature?.properties?.name || layer.feature?.properties?.NAME || "";
            const level = currentAlertLevels[regionName] || 0;
            let fillColor;
            if (level === 0) fillColor = colors.clear;
            else if (level === 1) fillColor = colors.droneAttention;
            else if (level === 2) fillColor = colors.droneDanger;
            else fillColor = colors.rocket;
            
            layer.setStyle({ fillColor: fillColor });
            
            if (layer.getPopup()) {
                const formattedName = formatRegionName(regionName);
                let levelText = "", levelColor = "";
                if (level === 0) { levelText = "⚪ Отбой / Спокойно"; levelColor = "#adb5bd"; }
                else if (level === 1) { levelText = "🟢 Внимание! Угроза БПЛА"; levelColor = "#81c784"; }
                else if (level === 2) { levelText = "🟡 Опасность БПЛА"; levelColor = "#ffc107"; }
                else { levelText = "🔴 РАКЕТНАЯ ОПАСНОСТЬ!"; levelColor = "#ff6b6b"; }
                
                layer.getPopup().setContent(`
                    <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                        <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                            ${formattedName}
                        </div>
                        <span style="color:${levelColor};">${levelText}</span>
                    </div>
                `);
            }
        });
    }

    // ===========================================
    // ПАРСИНГ TELEGRAM
    // ===========================================
    async function parseTelegramAlerts() {
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/bplarussiaru";
        
        try {
            const resp = await fetch(proxyUrl + encodeURIComponent(channel));
            if (!resp.ok) throw new Error();
            let html = await resp.text();
            
            const postRegex = /data-post="bplarussiaru\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            const posts = [];
            let m;
            while ((m = postRegex.exec(html)) !== null) {
                posts.push({
                    id: parseInt(m[1]),
                    text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
                });
            }
            
            posts.sort((a,b) => b.id - a.id);
            const tempLevels = {};
            
            for (const post of posts) {
                const text = post.text;
                let matchedRegions = [];
                for (const [official, keywords] of Object.entries(regionAliases)) {
                    if (keywords.some(kw => text.includes(kw))) {
                        matchedRegions.push(official);
                    }
                }
                if (matchedRegions.length === 0) continue;
                
                let level = 0;
                const isOtboy = text.includes("отбой");
                const isDroneDanger = text.includes("бпла") || text.includes("беспилот");
                const isDroneAttention = text.includes("внимание") && isDroneDanger;
                const isRocket = text.includes("ракет") || text.includes("ракетная");
                
                if (isOtboy) level = 0;
                else if (isRocket) level = 3;
                else if (isDroneAttention) level = 2;
                else if (isDroneDanger) level = 1;
                else if (text.includes("угроза")) level = 2;
                
                for (const region of matchedRegions) {
                    const existing = tempLevels[region];
                    if (!existing || existing.postId < post.id) {
                        tempLevels[region] = { level, postId: post.id };
                    }
                }
            }
            
            const finalAlerts = {};
            for (const [region, data] of Object.entries(tempLevels)) {
                finalAlerts[region] = data.level;
            }
            return finalAlerts;
        } catch (err) {
            return {};
        }
    }
    
    async function fetchAndUpdateAlerts() {
        try {
            const levels = await parseTelegramAlerts();
            for (const [reg, lvl] of Object.entries(levels)) {
                currentAlertLevels[reg] = lvl;
            }
            updateRegionColors();
            localStorage.setItem("alertCache", JSON.stringify(currentAlertLevels));
        } catch(e) {
            const cached = localStorage.getItem("alertCache");
            if (cached) {
                currentAlertLevels = JSON.parse(cached);
                updateRegionColors();
            }
        }
    }
    
    loadGeoJSON(geojsonUrl);
    
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && regionsLayer) {
            fetchAndUpdateAlerts();
        }
    });
</script>
</body>
</html>
