<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Карта тревог РФ - Границы регионов</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0e1a;
        font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
        overflow: hidden;
    }

    .clock {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 10px 20px;
        color: #e8eef2;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .time-main {
        font-size: 2rem;
        font-weight: 600;
        line-height: 1;
    }

    .date {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 18px;
        color: #e8eef2;
        font-size: 0.8rem;
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .legend-color {
        width: 28px;
        height: 18px;
        border-radius: 4px;
    }

    .custom-popup .leaflet-popup-content-wrapper {
        background: #1a1f2e;
        color: #e8eef2;
        border-radius: 12px;
        border-left: 4px solid;
    }

    .leaflet-control-attribution {
        display: none !important;
    }

    .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3000;
        background: rgba(0,0,0,0.95);
        padding: 20px 30px;
        border-radius: 12px;
        color: white;
        text-align: center;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .loader-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .time-main { font-size: 1.2rem; }
        .clock { padding: 5px 12px; top: 10px; right: 10px; }
        .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
        .legend-color { width: 20px; height: 14px; }
    }
</style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Внимание по БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #800020;"></div> <span>🏴‍☠️ Ракетная опасность</span></div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <span>Загрузка границ регионов...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ==========================================
    // ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ==========================================
    const map = L.map('map').setView([61, 95], 4.2);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 10,
        minZoom: 2
    }).addTo(map);

    // ==========================================
    // ЦВЕТА ТРЕВОГ
    // ==========================================
    const colors = {
        clear: "#6c757d",
        droneDanger: "#ffc107",
        droneAttention: "#dc3545",
        rocket: "#800020"
    };

    let currentAlertLevels = {};
    let regionsLayer = null;

    // ==========================================
    // ЧАСЫ
    // ==========================================
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('liveTime').innerHTML = `${hours}:${minutes}`;
        const options = { day: 'numeric', month: 'long', weekday: 'long' };
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', options);
    }
    updateClock();
    setInterval(updateClock, 60000);

    // ==========================================
    // ФОРМАТИРОВАНИЕ НАЗВАНИЙ
    // ==========================================
    function formatRegionName(name) {
        if (!name) return "";
        const words = name.split(' ');
        if (words.length === 1) return words[0];
        return `${words[0]}<br>${words.slice(1).join(' ')}`;
    }

    // ==========================================
    // ВСЕ РЕГИОНЫ РФ (из вашего Python кода)
    // ==========================================
    const regionAliases = {
        "Москва": ["москва", "мск"],
        "Московская область": ["московская область", "подмосковье"],
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб"],
        "Ленинградская область": ["ленинградская область"],
        "Белгородская область": ["белгородская область", "белгород"],
        "Брянская область": ["брянская область", "брянск"],
        "Владимирская область": ["владимирская область"],
        "Воронежская область": ["воронежская область", "воронеж"],
        "Ивановская область": ["ивановская область"],
        "Калужская область": ["калужская область", "калуга"],
        "Костромская область": ["костромская область", "кострома"],
        "Курская область": ["курская область", "курск"],
        "Липецкая область": ["липецкая область", "липецк"],
        "Нижегородская область": ["нижегородская область", "нижний новгород"],
        "Новгородская область": ["новгородская область", "новгород"],
        "Орловская область": ["орловская область", "орел"],
        "Пензенская область": ["пензенская область", "пенза"],
        "Псковская область": ["псковская область", "псков"],
        "Рязанская область": ["рязанская область", "рязань"],
        "Смоленская область": ["смоленская область", "смоленск"],
        "Тамбовская область": ["тамбовская область", "тамбов"],
        "Тверская область": ["тверская область", "тверь"],
        "Тульская область": ["тульская область", "тула"],
        "Ярославская область": ["ярославская область", "ярославль"],
        "Краснодарский край": ["краснодарский край", "кубань"],
        "Ставропольский край": ["ставропольский край", "ставрополь"],
        "Ростовская область": ["ростовская область", "ростов-на-дону", "ростов"],
        "Волгоградская область": ["волгоградская область", "волгоград"],
        "Астраханская область": ["астраханская область", "астрахань"],
        "Татарстан": ["татарстан", "республика татарстан", "казань"],
        "Башкортостан": ["башкортостан", "республика башкортостан", "уфа"],
        "Марий Эл": ["марий эл", "республика марий эл"],
        "Чувашская Республика": ["чувашия", "чувашская республика"],
        "Республика Мордовия": ["мордовия", "республика мордовия"],
        "Удмуртская Республика": ["удмуртия", "удмуртская республика"],
        "Самарская область": ["самарская область", "самара"],
        "Саратовская область": ["саратовская область", "саратов"],
        "Ульяновская область": ["ульяновская область", "ульяновск"],
        "Свердловская область": ["свердловская область", "екатеринбург"],
        "Челябинская область": ["челябинская область", "челябинск"],
        "Курганская область": ["курганская область", "курган"],
        "Оренбургская область": ["оренбургская область", "оренбург"],
        "Пермский край": ["пермский край", "пермь"],
        "Новосибирская область": ["новосибирская область", "новосибирск"],
        "Омская область": ["омская область", "омск"],
        "Томская область": ["томская область", "томск"],
        "Кемеровская область": ["кемеровская область", "кемерово"],
        "Иркутская область": ["иркутская область", "иркутск"],
        "Красноярский край": ["краснодарский край", "красноярск"],
        "Алтайский край": ["алтайский край", "барнаул"],
        "Забайкальский край": ["забайкальский край", "чита"],
        "Приморский край": ["приморский край", "владивосток"],
        "Хабаровский край": ["хабаровский край", "хабаровск"],
        "Амурская область": ["амурская область", "благовещенск"],
        "Сахалинская область": ["сахалинская область", "южно-сахалинск"],
        "Магаданская область": ["магаданская область", "магадан"],
        "Камчатский край": ["камчатский край", "петропавловск-камчатский"],
        "Архангельская область": ["архангельская область", "архангельск"],
        "Мурманская область": ["мурманская область", "мурманск"],
        "Крым": ["крым", "республика крым", "симферополь"],
        "Дагестан": ["дагестан", "республика дагестан", "махачкала"],
        "Республика Карелия": ["карелия", "республика карелия", "петрозаводск"],
        "Республика Коми": ["коми", "республика коми", "сыктывкар"],
        "Республика Саха (Якутия)": ["якутия", "саха", "якутск"],
        "ХМАО": ["хмао", "ханты-мансийский", "ханты-мансийск"],
        "ЯНАО": ["янао", "ямало-ненецкий", "салехард"],
        "Адыгея": ["адыгея", "республика адыгея", "майкоп"]
    };

    // ==========================================
    // ЗАГРУЗКА ГРАНИЦ С GITHUB
    // ==========================================
    const geojsonUrl = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
    const fallbackUrl = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
    
    function loadGeoJSON(url, isFallback = false) {
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log("GeoJSON загружен:", url);
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(error => {
                console.error("Ошибка загрузки из", url, error);
                if (!isFallback) {
                    console.log("Пробуем запасной источник...");
                    loadGeoJSON(fallbackUrl, true);
                } else {
                    document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки границ. Проверьте соединение.</span>';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                    }, 3000);
                }
            });
    }

    function initRegionsLayer(geoJsonData) {
        regionsLayer = L.geoJSON(geoJsonData, {
            style: function(feature) {
                let regionName = feature.properties?.name || 
                                feature.properties?.NAME || 
                                feature.properties?.admin_name ||
                                feature.properties?.region ||
                                "";
                
                const level = currentAlertLevels[regionName] || 0;
                let fillColor;
                if (level === 0) fillColor = colors.clear;
                else if (level === 1) fillColor = colors.droneDanger;
                else if (level === 2) fillColor = colors.droneAttention;
                else fillColor = colors.rocket;
                
                return {
                    color: "#ffffff",
                    weight: 2.2,
                    fillColor: fillColor,
                    fillOpacity: 0.7,
                    smoothFactor: 0.5,
                    opacity: 0.9
                };
            },
            onEachFeature: function(feature, layer) {
                let regionName = feature.properties?.name || 
                                feature.properties?.NAME || 
                                feature.properties?.admin_name ||
                                feature.properties?.region ||
                                "";
                
                if (regionName) {
                    const formattedName = formatRegionName(regionName);
                    const level = currentAlertLevels[regionName] || 0;
                    
                    let levelText = "";
                    let levelColor = "";
                    if (level === 0) {
                        levelText = "⚪ Отбой / Спокойно";
                        levelColor = "#adb5bd";
                    } else if (level === 1) {
                        levelText = "🟡 Опасность БПЛА";
                        levelColor = "#ffc107";
                    } else if (level === 2) {
                        levelText = "🔴 Внимание! Угроза БПЛА";
                        levelColor = "#ff6b6b";
                    } else {
                        levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!";
                        levelColor = "#c41e3a";
                    }
                    
                    layer.bindPopup(`
                        <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                            <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                                ${formattedName}
                            </div>
                            <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                        </div>
                    `, { className: 'custom-popup' });
                }
            }
        }).addTo(map);
        
        // Плавный зум после загрузки
        setTimeout(() => {
            map.flyTo([61, 95], 4.5, { duration: 1.2 });
        }, 200);
        
        // Запускаем обновление тревог
        fetchAndUpdateAlerts();
        setInterval(fetchAndUpdateAlerts, 35000);
    }

    // ==========================================
    // ОБНОВЛЕНИЕ ЦВЕТОВ РЕГИОНОВ
    // ==========================================
    function updateRegionColors() {
        if (!regionsLayer) return;
        
        regionsLayer.eachLayer(layer => {
            let regionName = layer.feature?.properties?.name || 
                            layer.feature?.properties?.NAME || 
                            layer.feature?.properties?.admin_name ||
                            layer.feature?.properties?.region ||
                            "";
            
            const level = currentAlertLevels[regionName] || 0;
            let fillColor;
            if (level === 0) fillColor = colors.clear;
            else if (level === 1) fillColor = colors.droneDanger;
            else if (level === 2) fillColor = colors.droneAttention;
            else fillColor = colors.rocket;
            
            layer.setStyle({
                fillColor: fillColor,
                fillOpacity: 0.7,
                color: "#ffffff",
                weight: 2.2
            });
            
            // Обновляем попап
            if (layer.getPopup()) {
                const formattedName = formatRegionName(regionName);
                let levelText = "";
                let levelColor = "";
                if (level === 0) {
                    levelText = "⚪ Отбой / Спокойно";
                    levelColor = "#adb5bd";
                } else if (level === 1) {
                    levelText = "🟡 Опасность БПЛА";
                    levelColor = "#ffc107";
                } else if (level === 2) {
                    levelText = "🔴 Внимание! Угроза БПЛА";
                    levelColor = "#ff6b6b";
                } else {
                    levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!";
                    levelColor = "#c41e3a";
                }
                
                layer.getPopup().setContent(`
                    <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                        <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                            ${formattedName}
                        </div>
                        <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                    </div>
                `);
            }
        });
    }

    // ==========================================
    // ПАРСИНГ TELEGRAM (как в вашем Python коде)
    // ==========================================
    async function parseTelegramAlerts() {
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/bplarussiaru";
        
        try {
            // Загружаем несколько страниц (как в Python: for _ in range(5))
            let allHtml = "";
            let url = channel;
            
            for (let attempt = 0; attempt < 5; attempt++) {
                const resp = await fetch(proxyUrl + encodeURIComponent(url));
                if (!resp.ok) break;
                const html = await resp.text();
                allHtml += html;
                
                // Ищем посты для пагинации
                const posts = [...html.matchAll(/data-post="\/bplarussiaru(\d+)"/g)];
                if (posts.length === 0) break;
                
                const ids = posts.map(m => parseInt(m[1]));
                const oldestPost = Math.min(...ids);
                url = `${channel}?before=${oldestPost}`;
            }
            
            // Парсинг сообщений (как в Python)
            const postRegex = /data-post="bplarussiaru\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            const postsData = [];
            let match;
            while ((match = postRegex.exec(allHtml)) !== null) {
                postsData.push({
                    id: parseInt(match[1]),
                    text: match[2]
                });
            }
            
            // Сортируем по ID
            postsData.sort((a, b) => a.id - b.id);
            
            console.log("Сообщений найдено:", postsData.length);
            
            // Логика определения тревог (как в Python)
            const alerts = {};
            
            for (const post of postsData) {
                let text = post.text.replace(/<[^>]*>/g, ' ').toLowerCase();
                text = text.replace(/\s+/g, ' ').trim();
                
                // Поиск регионов
                const matched = [];
                for (const [region, keywords] of Object.entries(regionAliases)) {
                    if (keywords.some(kw => text.includes(kw))) {
                        matched.push(region);
                    }
                }
                
                if (matched.length === 0) continue;
                
                // Проверка отбоя
                const isOtboy = text.includes("отбой") || 
                               text.includes("нет угрозы") || 
                               text.includes("угрозы нет") || 
                               text.includes("угроза снята");
                
                // Проверка тревоги
                const isAlert = text.includes("опасность") || 
                               text.includes("бпла") || 
                               text.includes("ракета") || 
                               text.includes("ракет") || 
                               text.includes("авиацион") || 
                               text.includes("угроза");
                
                for (const region of matched) {
                    if (isOtboy) {
                        alerts[region] = { status: "clear", postId: post.id };
                    } else if (isAlert) {
                        alerts[region] = { status: "alert", postId: post.id };
                    }
                }
            }
            
            // Финальные активные тревоги
            const finalAlerts = {};
            for (const [region, data] of Object.entries(alerts)) {
                if (data.status === "alert") {
                    // Определяем уровень тревоги (для совместимости с картой)
                    finalAlerts[region] = 1; // По умолчанию уровень 1
                }
            }
            
            console.log("Активных тревог:", Object.keys(finalAlerts).length);
            console.log(finalAlerts);
            
            return finalAlerts;
            
        } catch (err) {
            console.error("Ошибка парсинга Telegram:", err);
            return {};
        }
    }
    
    async function fetchAndUpdateAlerts() {
        try {
            const alerts = await parseTelegramAlerts();
            
            // Конвертируем в формат уровней
            const newLevels = {};
            for (const [region, level] of Object.entries(alerts)) {
                newLevels[region] = level;
            }
            
            let changed = false;
            for (const [reg, lvl] of Object.entries(newLevels)) {
                if (currentAlertLevels[reg] !== lvl) {
                    currentAlertLevels[reg] = lvl;
                    changed = true;
                }
            }
            
            if (changed) {
                updateRegionColors();
                localStorage.setItem("alertCache", JSON.stringify(currentAlertLevels));
            }
        } catch(e) {
            console.warn("Ошибка обновления", e);
            const cached = localStorage.getItem("alertCache");
            if (cached && Object.keys(currentAlertLevels).length === 0) {
                currentAlertLevels = JSON.parse(cached);
                updateRegionColors();
            }
        }
    }
    
    // Запускаем загрузку границ
    loadGeoJSON(geojsonUrl);
    
    // Плавный зум при взаимодействии
    map.on('zoomend', function() {
        if (map.getZoom() > 7) {
            map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 });
        }
    });
    
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && regionsLayer) {
            fetchAndUpdateAlerts();
        }
    });
</script>
</body>
</html>
