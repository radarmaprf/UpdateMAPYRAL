<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Alert Map - Все регионы РФ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0e1a;
        font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
        overflow: hidden;
    }

    .clock {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 10px 20px;
        color: #e8eef2;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .time-main {
        font-size: 2rem;
        font-weight: 600;
        line-height: 1;
    }

    .date {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 18px;
        color: #e8eef2;
        font-size: 0.8rem;
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .legend-color {
        width: 28px;
        height: 18px;
        border-radius: 4px;
    }

    .status-badge {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(8px);
        border-radius: 30px;
        padding: 6px 16px;
        color: #0f0;
        font-size: 0.7rem;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        pointer-events: none;
    }

    .custom-popup .leaflet-popup-content-wrapper {
        background: #1a1f2e;
        color: #e8eef2;
        border-radius: 12px;
        border-left: 4px solid;
    }

    .leaflet-control-attribution {
        display: none !important;
    }

    .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3000;
        background: rgba(0,0,0,0.95);
        padding: 20px 30px;
        border-radius: 12px;
        color: white;
        text-align: center;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .loader-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .time-main { font-size: 1.2rem; }
        .clock { padding: 5px 12px; top: 10px; right: 10px; }
        .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
        .legend-color { width: 20px; height: 14px; }
        .status-badge { font-size: 0.55rem; bottom: 10px; right: 10px; }
    }
</style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="status-badge" id="statusBadge">🟢 Мониторинг</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #28a745;"></div> <span>🟢 Внимание (начальная стадия)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #800020;"></div> <span>🏴‍☠️ Ракетная опасность</span></div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <span>Загрузка границ регионов...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ===========================================
    // ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ===========================================
    const map = L.map('map').setView([61, 95], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 10,
        minZoom: 2
    }).addTo(map);

    // ===========================================
    // ЦВЕТА ТРЕВОГ
    // ===========================================
    const colors = {
        clear: "#6c757d",
        attention: "#28a745",
        droneDanger: "#ffc107",
        rocket: "#800020"
    };

    let currentAlertLevels = {};
    let regionsLayer = null;

    // ===========================================
    // ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('liveTime').innerHTML = `${hours}:${minutes}`;
        const options = { day: 'numeric', month: 'long', weekday: 'long' };
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', options);
    }
    updateClock();
    setInterval(updateClock, 60000);

    function formatRegionName(name) {
        if (!name) return "";
        const words = name.split(' ');
        if (words.length === 1) return words[0];
        return `${words[0]}<br>${words.slice(1).join(' ')}`;
    }

    // ===========================================
    // ВСЕ РЕГИОНЫ РФ (расширенный список)
    // ===========================================
    const allRegions = {
        // Центральный ФО
        "Москва": ["москва", "мск", "г москва", "город москва"],
        "Московская область": ["московская область", "подмосковье", "мо обл", "московская обл"],
        "Белгородская область": ["белгородская область", "белгород", "белгородская обл"],
        "Брянская область": ["брянская область", "брянск", "брянская обл"],
        "Владимирская область": ["владимирская область", "владимир"],
        "Воронежская область": ["воронежская область", "воронеж"],
        "Ивановская область": ["ивановская область", "иваново"],
        "Калужская область": ["калужская область", "калуга"],
        "Костромская область": ["костромская область", "кострома"],
        "Курская область": ["курская область", "курск"],
        "Липецкая область": ["липецкая область", "липецк"],
        "Нижегородская область": ["нижегородская область", "нижний новгород"],

        "Рязанская область": ["рязанская область", "рязань"],
        "Смоленская область": ["смоленская область", "смоленск"],
        "Тамбовская область": ["тамбовская область", "тамбов"],
        "Тверская область": ["тверская область", "тверь"],
        "Тульская область": ["тульская область", "тула"],
        "Ярославская область": ["ярославская область", "ярославль"],
        
        // Северо-Западный ФО
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб"],
        "Ленинградская область": ["ленинградская область", "ленобласть"],
        "Архангельская область": ["архангельская область", "архангельск"],
        "Вологодская область": ["вологодская область", "вологда"],
        "Калининградская область": ["калининградская область", "калининград"],
        "Республика Карелия": ["карелия", "республика карелия"],
        "Республика Коми": ["коми", "республика коми"],
        "Мурманская область": ["мурманская область", "мурманск"],
        "Новгородская область": ["новгородская область", "великий новгород", "новгород"],
        "Псковская область": ["псковская область", "псков"],
        
        // Южный ФО
        "Республика Адыгея": ["адыгея", "республика адыгея"],
        "Республика Калмыкия": ["калмыкия", "республика калмыкия"],
        "Республика Крым": ["крым", "республика крым"],
        "Краснодарский край": ["краснодарский край", "кубань", "краснодар"],
        "Астраханская область": ["астраханская область", "астрахань"],
        "Волгоградская область": ["волгоградская область", "волгоград"],
        "Ростовская область": ["ростовская область", "ростов", "ростов-на-дону"],
        
        // Северо-Кавказский ФО
        "Республика Дагестан": ["дагестан", "республика дагестан"],
        "Республика Ингушетия": ["ингушетия", "республика ингушетия"],
        "Кабардино-Балкарская Республика": ["кабардино-балкария", "кбр"],
        "Карачаево-Черкесская Республика": ["карачаево-черкесия", "кчр"],
        "Республика Северная Осетия": ["северная осетия", "осетия"],
        "Чеченская Республика": ["чечня", "чеченская"],

        // Приволжский ФО
        "Республика Башкортостан": ["башкортостан", "республика башкортостан", "уфа"],
        "Республика Марий Эл": ["марий эл", "республика марий эл"],
        "Республика Мордовия": ["мордовия", "республика мордовия"],
        "Республика Татарстан": ["татарстан", "республика татарстан", "казань"],
        "Удмуртская Республика": ["удмуртия", "удмуртская республика"],
        "Чувашская Республика": ["чувашия", "чувашская республика"],
        "Пермский край": ["пермский край", "пермь"],
        "Кировская область": ["кировская область", "киров"],
        "Оренбургская область": ["оренбургская область", "оренбург"],
        "Пензенская область": ["пензенская область", "пенза"],
        "Самарская область": ["самарская область", "самара"],
        "Саратовская область": ["саратовская область", "саратов"],
        "Ульяновская область": ["ульяновская область", "ульяновск"],
        
        // Уральский ФО
        "Курганская область": ["курганская область", "курган"],
        "Свердловская область": ["свердловская область", "екатеринбург"],
        "Тюменская область": ["тюменская область", "тюмень"],
        "Челябинская область": ["челябинская область", "челябинск"],
        "Ханты-Мансийский АО": ["хмао", "ханты-мансийский", "сургут"],
        "Ямало-Ненецкий АО": ["янао", "ямало-ненецкий"],
        
        // Сибирский ФО
        "Республика Алтай": ["алтай", "республика алтай"],
        "Республика Бурятия": ["бурятия", "республика бурятия", "улан-удэ"],
        "Республика Тыва": ["тыва", "тува", "республика тыва"],
        "Республика Хакасия": ["хакасия", "республика хакасия"],
        "Алтайский край": ["алтайский край", "барнаул"],
        "Забайкальский край": ["забайкальский край", "чита"],
        "Красноярский край": ["краснодарский край", "краснодар"],
        "Иркутская область": ["иркутская область", "иркутск"],
        "Кемеровская область": ["кемеровская область", "кемерово", "кузбасс"],
        "Новосибирская область": ["новосибирская область", "новосибирск"],
        "Омская область": ["омская область", "омск"],
        "Томская область": ["томская область", "томск"],
        
        // Дальневосточный ФО
        "Республика Саха (Якутия)": ["якутия", "саха", "якутск"],
        "Камчатский край": ["камчатский край", "камчатка"],
        "Приморский край": ["приморский край", "владивосток", "приморье"],
        "Хабаровский край": ["хабаровский край", "хабаровск"],
        "Амурская область": ["амурская область", "благовещенск"],
        "Магаданская область": ["магаданская область", "магадан"],
        "Сахалинская область": ["сахалинская область", "сахалин"],
        "Еврейская АО": ["еврейская", "еао"],
        "Чукотский АО": ["чукотка", "чукотский"]
    };

    // ===========================================
    // ЗАГРУЗКА ГРАНИЦ С GITHUB
    // ===========================================
    const geojsonUrl = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
    const fallbackUrl = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
    
    function loadGeoJSON(url, isFallback = false) {
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log("GeoJSON загружен:", url);
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(error => {
                console.error("Ошибка загрузки из", url, error);
                if (!isFallback) {
                    loadGeoJSON(fallbackUrl, true);
                } else {
                    document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки границ</span>';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                    }, 3000);
                }
            });
    }

    function initRegionsLayer(geoJsonData) {
        regionsLayer = L.geoJSON(geoJsonData, {
            style: function(feature) {
                let regionName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                let level = 0;
                
                for (const [key, keywords] of Object.entries(allRegions)) {
                    if (regionName.toLowerCase().includes(key.toLowerCase()) || 
                        keywords.some(kw => regionName.toLowerCase().includes(kw.toLowerCase()))) {
                        level = currentAlertLevels[key] || 0;
                        break;
                    }
                }
                
                let fillColor;
                if (level === 0) fillColor = colors.clear;
                else if (level === 1) fillColor = colors.attention;
                else if (level === 2) fillColor = colors.droneDanger;
                else fillColor = colors.rocket;
                
                return {
                    color: "#ffffff",
                    weight: 2,
                    fillColor: fillColor,
                    fillOpacity: 0.7,
                    smoothFactor: 0.5,
                    opacity: 0.9
                };
            },
            onEachFeature: function(feature, layer) {
                let regionName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                
                if (regionName) {
                    const formattedName = formatRegionName(regionName);
                    let level = 0;
                    
                    for (const [key, keywords] of Object.entries(allRegions)) {
                        if (regionName.toLowerCase().includes(key.toLowerCase()) || 
                            keywords.some(kw => regionName.toLowerCase().includes(kw.toLowerCase()))) {
                            level = currentAlertLevels[key] || 0;
                            break;
                        }
                    }
                    
                    let levelText = "";
                    let levelColor = "";
                    if (level === 0) {
                        levelText = "⚪ Отбой / Спокойно";
                        levelColor = "#adb5bd";
                    } else if (level === 1) {
                        levelText = "🟢 Внимание (начальная стадия)";
                        levelColor = "#6fcf97";
                    } else if (level === 2) {
                        levelText = "🟡 Опасность БПЛА";
                        levelColor = "#ffc107";
                    } else {
                        levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!";
                        levelColor = "#c41e3a";
                    }
                    
                    layer.bindPopup(`
                        <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                            <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                                ${formattedName}
                            </div>
                            <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                        </div>
                    `, { className: 'custom-popup' });
                }
            }
        }).addTo(map);
        
        setTimeout(() => {
            map.flyTo([61, 95], 4.2, { duration: 1.2 });
        }, 200);
        
        fetchAndUpdateAlerts();
        setInterval(fetchAndUpdateAlerts, 35000);
    }

    function updateRegionColors() {
        if (!regionsLayer) return;
        
        regionsLayer.eachLayer(layer => {
            let regionName = layer.feature?.properties?.name || layer.feature?.properties?.NAME || layer.feature?.properties?.admin_name || "";
            let level = 0;
            
            for (const [key, keywords] of Object.entries(allRegions)) {
                if (regionName.toLowerCase().includes(key.toLowerCase()) || 
                    keywords.some(kw => regionName.toLowerCase().includes(kw.toLowerCase()))) {
                    level = currentAlertLevels[key] || 0;
                    break;
                }
            }
            
            let fillColor;
            if (level === 0) fillColor = colors.clear;
            else if (level === 1) fillColor = colors.attention;
            else if (level === 2) fillColor = colors.droneDanger;
            else fillColor = colors.rocket;
            
            layer.setStyle({
                fillColor: fillColor,
                fillOpacity: 0.7,
                color: "#ffffff",
                weight: 2
            });
            
            if (layer.getPopup()) {
                const formattedName = formatRegionName(regionName);
                let levelText = "";
                let levelColor = "";
                if (level === 0) {
                    levelText = "⚪ Отбой / Спокойно";
                    levelColor = "#adb5bd";
                } else if (level === 1) {
                    levelText = "🟢 Внимание (начальная стадия)";
                    levelColor = "#6fcf97";
                } else if (level === 2) {
                    levelText = "🟡 Опасность БПЛА";
                    levelColor = "#ffc107";
                } else {
                    levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!";
                    levelColor = "#c41e3a";
                }
                
                layer.getPopup().setContent(`
                    <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                        <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                            ${formattedName}
                        </div>
                        <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                    </div>
                `);
            }
        });
        
        const alertCount = Object.values(currentAlertLevels).filter(l => l > 0).length;
        const badge = document.getElementById('statusBadge');
        if (alertCount > 0) {
            badge.innerHTML = `⚠️ Тревог: ${alertCount}`;
            badge.style.color = "#ffc107";
        } else {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            badge.innerHTML = `🟢 Мониторинг | ${timeStr}`;
            badge.style.color = "#0f0";
        }
    }

    // ===========================================
    // ПАРСИНГ TELEGRAM (канал radarrussiia)
    // ===========================================
    async function parseTelegramAlerts() {
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/radarrussiia";
        
        try {
            console.log("Парсинг канала:", channel);
            const resp = await fetch(proxyUrl + encodeURIComponent(channel));
            if (!resp.ok) throw new Error("Ошибка загрузки канала");
            let html = await resp.text();
            
            console.log("HTML получен, длина:", html.length);
            
            // Регулярное выражение для поиска постов
            const postRegex = /data-post="radarrussiia\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            const posts = [];
            let m;
            while ((m = postRegex.exec(html)) !== null) {
                posts.push({
                    id: parseInt(m[1]),
                    text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
                });
            }
            
            console.log("Найдено постов:", posts.length);
            
            // Если постов мало, пробуем подгрузить еще
            if (posts.length < 5) {
                const firstMatch = html.match(/data-post="radarrussiia(\d+)"/);
                if (firstMatch) {
                    const oldestId = parseInt(firstMatch[1]);
                    const nextUrl = `https://t.me/s/radarrussiia?before=${oldestId}`;
                    const nextResp = await fetch(proxyUrl + encodeURIComponent(nextUrl));
                    if (nextResp.ok) {
                        const nextHtml = await nextResp.text();
                        while ((m = postRegex.exec(nextHtml)) !== null) {
                            posts.push({
                                id: parseInt(m[1]),
                                text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
                            });
                        }
                    }
                }
            }
            
            posts.sort((a,b) => b.id - a.id);
            console.log("Всего постов после сортировки:", posts.length);
            
            const tempLevels = {};
            
            for (const post of posts) {
                const text = post.text;
                console.log("Анализ поста:", text.substring(0, 100));
                
                let matchedRegions = [];
                for (const [official, keywords] of Object.entries(allRegions)) {
                    for (const kw of keywords) {
                        if (text.includes(kw)) {
                            matchedRegions.push(official);
                            break;
                        }
                    }
                }
                
                if (matchedRegions.length === 0) continue;
                
                console.log("Найдены регионы:", matchedRegions);
                
                let level = 0;
                const isOtboy = /\bотбой\b/i.test(text);
                const isAttention = /\bвнимание\b/i.test(text) && !/\b(бпла|беспилот|дрон|ракет)\b/i.test(text);
                const isDrone = /\b(бпла|беспилот|дрон)\b/i.test(text);
                const isRocket = /\b(ракет|ракетная|баллистич|крылат)\b/i.test(text);
                
                if (isOtboy) {
                    level = 0;
                } else if (isRocket) {
                    level = 3;
                } else if (isDrone) {
                    level = 2;
                } else if (isAttention || /\b(угроза|опасность|тревога)\b/i.test(text)) {
                    level = 1;
                }
                
                console.log("Уровень тревоги:", level);
                
                for (const region of matchedRegions) {
                    const existing = tempLevels[region];
                    if (!existing || existing.postId < post.id) {
                        tempLevels[region] = { level, postId: post.id };
                    }
                }
            }
            
            const finalAlerts = {};
            for (const [region, data] of Object.entries(tempLevels)) {
                if (data.level > 0) {
                    finalAlerts[region] = data.level;
                }
            }
            
            console.log("Активные тревоги:", finalAlerts);
            return finalAlerts;
        } catch (err) {
            console.error("Парсинг ошибка:", err);
            return {};
        }
    }
    
    async function fetchAndUpdateAlerts() {
        try {
            const levels = await parseTelegramAlerts();
            let changed = false;
            
            for (const [reg, lvl] of Object.entries(levels)) {
                if (currentAlertLevels[reg] !== lvl) {
                    currentAlertLevels[reg] = lvl;
                    changed = true;
                }
            }
            
            for (const reg of Object.keys(currentAlertLevels)) {
                if (currentAlertLevels[reg] > 0 && !levels[reg]) {
                    delete currentAlertLevels[reg];
                    changed = true;
                }
            }
            
            if (changed) {
                updateRegionColors();
                localStorage.setItem("alertCache", JSON.stringify(currentAlertLevels));
            }
        } catch(e) {
            console.warn("Ошибка обновления", e);
            const cached = localStorage.getItem("alertCache");
            if (cached && Object.keys(currentAlertLevels).length === 0) {
                currentAlertLevels = JSON.parse(cached);
                updateRegionColors();
            }
        }
    }
    
    loadGeoJSON(geojsonUrl);
    
    map.on('zoomend', function() {
        if (map.getZoom() > 7) {
            map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 });
        }
    });
    
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && regionsLayer) {
            fetchAndUpdateAlerts();
        }
    });
</script>
