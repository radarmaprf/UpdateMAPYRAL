<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Alert Map - Все регионы РФ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #0a0e1a;
        font-family: 'Segoe UI', 'Roboto', sans-serif;
        overflow: hidden;
    }
    .clock {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 10px 20px;
        color: #e8eef2;
        font-family: monospace;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.15);
    }
    .time-main { font-size: 2rem; font-weight: 600; line-height: 1; }
    .date { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; text-transform: uppercase; }
    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 18px;
        color: #e8eef2;
        font-size: 0.8rem;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }
    .legend-item { display: flex; align-items: center; gap: 10px; }
    .legend-color { width: 28px; height: 18px; border-radius: 4px; }
    .status-badge {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(0,0,0,0.8);
        border-radius: 30px;
        padding: 6px 16px;
        color: #0f0;
        font-size: 0.7rem;
        font-family: monospace;
    }
    .debug-panel {
        position: fixed;
        bottom: 20px;
        left: 200px;
        z-index: 2000;
        background: rgba(0,0,0,0.85);
        padding: 8px 12px;
        border-radius: 8px;
        color: #0f0;
        font-size: 0.6rem;
        font-family: monospace;
        max-width: 350px;
        max-height: 150px;
        overflow-y: auto;
        pointer-events: none;
        border: 1px solid #333;
    }
    .leaflet-control-attribution { display: none !important; }
    .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3000;
        background: rgba(0,0,0,0.95);
        padding: 20px 30px;
        border-radius: 12px;
        color: white;
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .loader-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
        .time-main { font-size: 1.2rem; }
        .clock { padding: 5px 12px; top: 10px; right: 10px; }
        .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
        .debug-panel { left: 10px; bottom: 70px; max-width: 90%; font-size: 0.5rem; }
    }
</style>
</head>
<body>
<div class="clock"><div class="time-main" id="liveTime">--:--</div><div class="date" id="liveDate">--</div></div>
<div class="status-badge" id="statusBadge">🟢 Загрузка...</div>
<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #28a745;"></div> <span>🟢 Внимание (начальная)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #800020;"></div> <span>🔴 Ракетная опасность</span></div>
</div>
<div class="debug-panel" id="debugPanel">🟡 Инициализация...</div>
<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>
<div id="loader" class="loader"><div class="loader-spinner"></div><span>Загрузка границ регионов...</span></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // === Отладка ===
    function debugLog(msg) {
        const panel = document.getElementById('debugPanel');
        if (panel) {
            panel.innerHTML = msg + '<br>' + panel.innerHTML;
            if (panel.innerHTML.split('<br>').length > 8) panel.innerHTML = panel.innerHTML.split('<br>').slice(0, 8).join('<br>');
        }
        console.log(msg);
    }

    // === Карта ===
    const map = L.map('map').setView([61, 95], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    }).addTo(map);

    // === Цвета тревог ===
    const colors = { clear: "#6c757d", attention: "#28a745", droneDanger: "#ffc107", rocket: "#800020" };
    let currentAlerts = {};   // { regionName: level }
    let regionsLayer = null;

    // === Часы ===
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'long' });
    }
    updateClock(); setInterval(updateClock, 60000);

    function formatRegionName(name) {
        if (!name) return "";
        const words = name.split(' ');
        if (words.length === 1) return words[0];
        return `${words[0]}<br>${words.slice(1).join(' ')}`;
    }

    // === ПРЯМОЕ СООТВЕТСТВИЕ: названия в GeoJSON → наши ключи ===
    // Словарь: как называется регион в GeoJSON (то, что приходит из файла)
    // и каким ключом мы его обозначаем в allRegions (для поиска тревог)
    // Заполним автоматически при загрузке GeoJSON, но для надежности сделаем вручную основу.
    // В allRegions хранятся синонимы для поиска в тексте сообщений.
    const allRegions = {
        "Москва": ["москва", "мск", "г москва", "город москва"],
        "Московская область": ["московская область", "подмосковье", "мо обл"],
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб"],
        "Ленинградская область": ["ленинградская область", "ленобласть"],
        "Белгородская область": ["белгородская область", "белгород"],
        "Брянская область": ["брянская область", "брянск"],
        "Владимирская область": ["владимирская область", "владимир"],
        "Воронежская область": ["воронежская область", "воронеж"],
        "Ивановская область": ["ивановская область", "иваново"],
        "Калужская область": ["калужская область", "калуга"],
        "Костромская область": ["костромская область", "кострома"],
        "Курская область": ["курская область", "курск"],
        "Липецкая область": ["липецкая область", "липецк"],
        "Нижегородская область": ["нижегородская область", "нижний новгород"],
        "Орловская область": ["орловская область", "орел"],
        "Рязанская область": ["рязанская область", "рязань"],
        "Смоленская область": ["смоленская область", "смоленск"],
        "Тамбовская область": ["тамбовская область", "тамбов"],
        "Тверская область": ["тверская область", "тверь"],
        "Тульская область": ["тульская область", "тула"],
        "Ярославская область": ["ярославская область", "ярославль"],
        "Краснодарский край": ["краснодарский край", "кубань"],
        "Ставропольский край": ["ставропольский край", "ставрополь"],
        "Ростовская область": ["ростовская область", "ростов"],
        "Волгоградская область": ["волгоградская область", "волгоград"],
        "Астраханская область": ["астраханская область", "астрахань"],
        "Республика Татарстан": ["татарстан", "республика татарстан"],
        "Республика Башкортостан": ["башкортостан", "республика башкортостан"],
        "Республика Крым": ["крым", "республика крым"],
        "Калининградская область": ["калининградская область", "калининград"],
        "Свердловская область": ["свердловская область", "екатеринбург"],
        "Челябинская область": ["челябинская область", "челябинск"],
        "Новосибирская область": ["новосибирская область", "новосибирск"],
        "Омская область": ["омская область", "омск"],
        "Томская область": ["томская область", "томск"],
        "Кемеровская область": ["кемеровская область", "кемерово"],
        "Иркутская область": ["иркутская область", "иркутск"],
        "Красноярский край": ["красноярский край", "красноярск"],
        "Алтайский край": ["алтайский край", "барнаул"],
        "Приморский край": ["приморский край", "владивосток"],
        "Хабаровский край": ["хабаровский край", "хабаровск"],
        "Самарская область": ["самарская область", "самара"],
        "Саратовская область": ["саратовская область", "саратов"],
        "Пермский край": ["пермский край", "пермь"],
        "Ханты-Мансийский АО": ["хмао", "ханты-мансийский"],
        "Ямало-Ненецкий АО": ["янао", "ямало-ненецкий"],
        "Республика Дагестан": ["дагестан", "республика дагестан"],
        "Республика Карелия": ["карелия", "республика карелия"],
        "Архангельская область": ["архангельская область", "архангельск"],
        "Мурманская область": ["мурманская область", "мурманск"],
        "Чеченская Республика": ["чечня", "чеченская"],
        "Республика Адыгея": ["адыгея", "республика адыгея"],
        "Республика Бурятия": ["бурятия", "республика бурятия"],
        "Забайкальский край": ["забайкальский край", "чита"],
        "Камчатский край": ["камчатский край", "камчатка"],
        "Амурская область": ["амурская область", "благовещенск"],
        "Сахалинская область": ["сахалинская область", "сахалин"],
        "Магаданская область": ["магаданская область", "магадан"]
    };

    // Соответствие между именами в GeoJSON и ключами allRegions (заполнится позже)
    let geoToKey = {};

    // === Загрузка GeoJSON с границами ===
    const geojsonUrl = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
    const fallbackUrl = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";

    function loadGeoJSON(url, isFallback = false) {
        debugLog(`Загрузка GeoJSON: ${url}`);
        fetch(url)
            .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
            .then(data => {
                debugLog(`GeoJSON загружен, объектов: ${data.features.length}`);
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(err => {
                debugLog(`Ошибка ${url}: ${err.message}`);
                if (!isFallback) loadGeoJSON(fallbackUrl, true);
                else { document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки границ</span>'; setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 3000); }
            });
    }

    function initRegionsLayer(geoJsonData) {
        // Создаем словарь соответствия geo-имени -> ключ allRegions
        geoToKey = {};
        for (let feature of geoJsonData.features) {
            let geoName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
            if (!geoName) continue;
            // Нормализуем
            let normalizedGeo = geoName.trim().toLowerCase();
            // Ищем совпадение с ключами allRegions
            let matchedKey = null;
            for (let key of Object.keys(allRegions)) {
                if (normalizedGeo === key.toLowerCase() || 
                    normalizedGeo.includes(key.toLowerCase()) ||
                    key.toLowerCase().includes(normalizedGeo)) {
                    matchedKey = key;
                    break;
                }
            }
            // Если не нашли, пробуем по синонимам
            if (!matchedKey) {
                for (let [key, synonyms] of Object.entries(allRegions)) {
                    if (synonyms.some(s => normalizedGeo.includes(s) || s.includes(normalizedGeo))) {
                        matchedKey = key;
                        break;
                    }
                }
            }
            if (matchedKey) {
                geoToKey[geoName] = matchedKey;
                debugLog(`Сопоставлено: "${geoName}" → "${matchedKey}"`);
            } else {
                debugLog(`Не найдено соответствие для: "${geoName}"`);
            }
        }

        regionsLayer = L.geoJSON(geoJsonData, {
            style: function(feature) {
                let geoName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                let key = geoToKey[geoName];
                let level = (key && currentAlerts[key]) ? currentAlerts[key] : 0;
                let fillColor = (level === 0 ? colors.clear : (level === 1 ? colors.attention : (level === 2 ? colors.droneDanger : colors.rocket)));
                return { color: "#ffffff", weight: 2, fillColor: fillColor, fillOpacity: 0.7, smoothFactor: 0.5 };
            },
            onEachFeature: function(feature, layer) {
                let geoName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                let key = geoToKey[geoName];
                let level = (key && currentAlerts[key]) ? currentAlerts[key] : 0;
                let levelText = (level === 0 ? "⚪ Отбой / Спокойно" : (level === 1 ? "🟢 Внимание (начальная)" : (level === 2 ? "🟡 Опасность БПЛА" : "🔴 РАКЕТНАЯ ОПАСНОСТЬ")));
                let levelColor = (level === 0 ? "#adb5bd" : (level === 1 ? "#6fcf97" : (level === 2 ? "#ffc107" : "#c41e3a")));
                layer.bindPopup(`
                    <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                        <div style="font-size:1.1rem; border-bottom:1px solid #333; padding-bottom:5px;">${formatRegionName(geoName)}</div>
                        <span style="color:${levelColor};">${levelText}</span>
                    </div>
                `, { className: 'custom-popup' });
            }
        }).addTo(map);
        
        setTimeout(() => map.flyTo([61, 95], 4.2, { duration: 1.2 }), 200);
        fetchAndUpdateAlerts();
        setInterval(fetchAndUpdateAlerts, 35000);
    }

    function updateRegionColors() {
        if (!regionsLayer) return;
        regionsLayer.eachLayer(layer => {
            let geoName = layer.feature?.properties?.name || layer.feature?.properties?.NAME || layer.feature?.properties?.admin_name || "";
            let key = geoToKey[geoName];
            let level = (key && currentAlerts[key]) ? currentAlerts[key] : 0;
            let fillColor = (level === 0 ? colors.clear : (level === 1 ? colors.attention : (level === 2 ? colors.droneDanger : colors.rocket)));
            layer.setStyle({ fillColor: fillColor, fillOpacity: 0.7, color: "#ffffff", weight: 2 });
            if (layer.getPopup()) {
                let levelText = (level === 0 ? "⚪ Отбой / Спокойно" : (level === 1 ? "🟢 Внимание (начальная)" : (level === 2 ? "🟡 Опасность БПЛА" : "🔴 РАКЕТНАЯ ОПАСНОСТЬ")));
                let levelColor = (level === 0 ? "#adb5bd" : (level === 1 ? "#6fcf97" : (level === 2 ? "#ffc107" : "#c41e3a")));
                layer.getPopup().setContent(`
                    <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                        <div style="font-size:1.1rem; border-bottom:1px solid #333; padding-bottom:5px;">${formatRegionName(geoName)}</div>
                        <span style="color:${levelColor};">${levelText}</span>
                    </div>
                `);
            }
        });
        let alertCount = Object.values(currentAlerts).filter(l => l > 0).length;
        document.getElementById('statusBadge').innerHTML = alertCount ? `⚠️ Тревог: ${alertCount}` : `🟢 Мониторинг | ${new Date().toLocaleTimeString()}`;
    }

    // === Парсинг Telegram ===
    async function parseTelegramAlerts() {
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/radarrussiia";
        debugLog("Парсинг канала radarrussiia...");
        try {
            const resp = await fetch(proxyUrl + encodeURIComponent(channel));
            if (!resp.ok) throw new Error("HTTP " + resp.status);
            let html = await resp.text();
            debugLog(`Получено ${html.length} символов`);
            
            // Извлекаем посты
            const postRegex = /data-post="radarrussiia\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            let posts = [];
            let match;
            while ((match = postRegex.exec(html)) !== null) {
                posts.push({ id: parseInt(match[1]), text: match[2].replace(/<[^>]*>/g, ' ').toLowerCase() });
            }
            debugLog(`Найдено постов: ${posts.length}`);
            if (posts.length === 0) return {};
            
            posts.sort((a,b) => b.id - a.id);
            let tempLevels = {}; // key -> { level, postId }
            
            for (let post of posts) {
                let text = post.text;
                // Определяем регионы, упомянутые в посте
                let matchedKeys = new Set();
                for (let [key, synonyms] of Object.entries(allRegions)) {
                    if (synonyms.some(syn => text.includes(syn))) {
                        matchedKeys.add(key);
                    }
                }
                if (matchedKeys.size === 0) continue;
                
                // Определяем уровень тревоги
                let level = 0;
                let isOtboy = /\bотбой\b/i.test(text);
                let isRocket = /\b(ракет|ракетная|баллистич|крылат)\b/i.test(text);
                let isDrone = /\b(бпла|беспилот|дрон)\b/i.test(text);
                let isAttention = /\b(внимание|угроза|опасность|тревога)\b/i.test(text) && !isDrone && !isRocket;
                
                if (isOtboy) level = 0;
                else if (isRocket) level = 3;
                else if (isDrone) level = 2;
                else if (isAttention) level = 1;
                
                if (level === 0 && !isOtboy) continue; // не определяем как опасность
                
                debugLog(`Пост #${post.id}: уровень=${level}, регионы: ${Array.from(matchedKeys).join(',')}, текст: ${text.substring(0,80)}`);
                
                for (let key of matchedKeys) {
                    let existing = tempLevels[key];
                    if (!existing || existing.postId < post.id) {
                        tempLevels[key] = { level: level, postId: post.id };
                    }
                }
            }
            
            let result = {};
            for (let [key, data] of Object.entries(tempLevels)) {
                if (data.level > 0) result[key] = data.level;
            }
            debugLog(`Активные тревоги: ${JSON.stringify(result)}`);
            return result;
        } catch (err) {
            debugLog(`Ошибка парсинга: ${err.message}`);
            return {};
        }
    }

    async function fetchAndUpdateAlerts() {
        try {
            let newAlerts = await parseTelegramAlerts();
            let changed = false;
            // Обновляем только если изменилось
            for (let [key, lvl] of Object.entries(newAlerts)) {
                if (currentAlerts[key] !== lvl) {
                    currentAlerts[key] = lvl;
                    changed = true;
                }
            }
            // Удаляем старые, которых нет в новых
            for (let key of Object.keys(currentAlerts)) {
                if (!newAlerts[key] && currentAlerts[key] > 0) {
                    delete currentAlerts[key];
                    changed = true;
                }
            }
            if (changed) {
                updateRegionColors();
                localStorage.setItem("alertCache", JSON.stringify(currentAlerts));
            }
        } catch(e) {
            debugLog(`Ошибка обновления: ${e.message}`);
            let cached = localStorage.getItem("alertCache");
            if (cached && Object.keys(currentAlerts).length === 0) {
                currentAlerts = JSON.parse(cached);
                updateRegionColors();
            }
        }
    }

    loadGeoJSON(geojsonUrl);
    map.on('zoomend', () => { if (map.getZoom() > 7) map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 }); });
    document.addEventListener("visibilitychange", () => { if (!document.hidden && regionsLayer) fetchAndUpdateAlerts(); });
</script>
</body>
</html>
