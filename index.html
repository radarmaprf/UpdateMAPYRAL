<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — все регионы РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .clock {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 8px 18px; color: #e8eef2;
            font-family: 'JetBrains Mono', monospace; text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }
        
        .legend {
            position: fixed; bottom: 20px; left: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 12px; padding: 10px 16px; color: #e8eef2;
            font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 6px; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }
        
        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; gap: 12px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px); padding: 8px 16px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tool-btn {
            background: rgba(30,35,50,0.9); border: none; color: white;
            padding: 6px 16px; border-radius: 30px; font-size: 0.85rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace; letter-spacing: 0.5px;
        }
        .tool-btn.active { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .tool-btn:hover { background: #28a745; transform: scale(1.02); }
        .tool-btn.danger { background: #dc3545; }
        .tool-btn.danger:hover { background: #b02a37; }
        
        .update-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 10px 22px; color: white; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace;
        }
        .update-btn:hover { background: #28a745; border-color: #28a745; }
        
        .status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 4px 14px; color: #ccc;
            font-size: 0.7rem; font-family: monospace; white-space: nowrap;
        }
        
        .ruler-panel {
            position: fixed; top: 80px; left: 20px; z-index: 2100;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 12px 18px; width: 260px;
            border: 1px solid rgba(255,255,255,0.2); display: none;
            flex-direction: column; gap: 10px; font-family: monospace;
        }
        .ruler-panel.show { display: flex; }
        .ruler-panel h4 { margin: 0 0 5px 0; color: #ffc107; font-size: 1rem; }
        .threat-select {
            background: #1a1f2e; color: white; border: 1px solid #555;
            padding: 6px; border-radius: 8px; font-size: 0.8rem;
        }
        .distance-info { background: #00000055; padding: 8px; border-radius: 8px; margin-top: 5px; }
        .distance-info p { margin: 4px 0; font-size: 0.75rem; }
        .time-result { font-size: 1.1rem; font-weight: bold; color: #ffc107; text-align: center; }
        
        .alert-list-btn {
            position: fixed; top: 20px; left: 20px; z-index: 2000;
            background: rgba(220,53,69,0.9); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 8px 18px; color: white; font-size: 0.9rem;
            font-weight: bold; cursor: pointer;
        }
        
        .alerts-panel {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(12px);
            z-index: 3000; transition: left 0.3s ease; border-right: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column;
        }
        .alerts-panel.open { left: 0; }
        .panel-header {
            padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .close-panel { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .panel-content { flex: 1; overflow-y: auto; padding: 12px; }
        .alert-region-item { background: rgba(30,35,50,0.7); margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 4px solid; }
        .empty-message { text-align: center; color: #aaa; padding: 20px; }
        
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; }
        .leaflet-control-attribution { display: none !important; }
        
        .leaflet-interactive-off {
            pointer-events: none !important;
        }
        
        @media (max-width: 600px) {
            .ruler-panel { width: 220px; top: 70px; left: 10px; padding: 8px 12px; }
            .toolbar { top: 10px; gap: 6px; padding: 5px 12px; }
            .tool-btn { padding: 4px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>
<button class="alert-list-btn" id="openPanelBtn">⚠️ Список тревог</button>

<div class="toolbar">
    <button id="rulerBtn" class="tool-btn">📏 Линейка (on/off)</button>
    <button id="clearRulerBtn" class="tool-btn danger">🗑 Сбросить</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Ракетная опасность</span></div>
</div>
<button class="update-btn" id="updateBtn">🔄 Обновить</button>
<div class="status" id="status">Загрузка...</div>

<div id="rulerPanel" class="ruler-panel">
    <h4>📏 Измерение угрозы</h4>
    <select id="threatType" class="threat-select">
        <option value="drone">🛩 Обычный БПЛА (180 км/ч)</option>
        <option value="jet_drone">🚀 Реактивный БПЛА (450 км/ч)</option>
        <option value="cruise">✈️ Крылатая ракета (850 км/ч)</option>
        <option value="ballistic">💥 Баллистическая ракета (9000 км/ч)</option>
    </select>
    <div class="distance-info">
        <p>📏 Расстояние: <span id="distKm">0</span> км</p>
        <p>⏱ Время подлёта:</p>
        <div id="timeResult" class="time-result">—</div>
    </div>
    <small style="font-size:0.65rem; opacity:0.7;">★ Кликните по карте 2 раза — поставьте точки A и B</small>
</div>

<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header">
        <h3>🚨 Регионы с тревогой</h3>
        <button class="close-panel" id="closePanelBtn">&times;</button>
    </div>
    <div class="panel-content" id="panelContent">...</div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ===========================================
    // ОЧИСТКА КЭША ПРИ КАЖДОМ ЗАХОДЕ
    // ===========================================
    localStorage.removeItem("alertCache");
    
    // ===========================================
    // ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ===========================================
    const map = L.map('map').setView([61, 95], 4.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    }).addTo(map);

    let regionStatus = {};
    const colors = { clear: "#6c757d", drone: "#ffc107", rocket: "#dc3545" };
    let polygonsLayer = null;
    
    // ===========================================
    // ЛИНЕЙКА
    // ===========================================
    let rulerModeActive = false;
    let points = [];
    let lineLayer = null;
    let markersLayer = null;
    
    const speeds = { drone: 180, jet_drone: 450, cruise: 850, ballistic: 9000 };
    
    function calculateTime(distanceKm, speedKmh) {
        if (distanceKm <= 0) return "0 мин";
        const hours = distanceKm / speedKmh;
        const totalMinutes = hours * 60;
        if (totalMinutes < 1) return "< 1 мин";
        const hrs = Math.floor(totalMinutes / 60);
        const mins = Math.floor(totalMinutes % 60);
        if (hrs > 0) return `${hrs} ч ${mins} мин`;
        return `${mins} мин`;
    }
    
    function updateRulerDisplay() {
        if (points.length < 2) {
            document.getElementById('distKm').innerText = '0';
            document.getElementById('timeResult').innerHTML = '—';
            return;
        }
        const dist = points[0].getLatLng().distanceTo(points[1].getLatLng()) / 1000;
        document.getElementById('distKm').innerText = dist.toFixed(1);
        const threat = document.getElementById('threatType').value;
        const timeStr = calculateTime(dist, speeds[threat]);
        document.getElementById('timeResult').innerHTML = timeStr;
    }
    
    function updateRulerGraphics() {
        if (lineLayer) map.removeLayer(lineLayer);
        if (markersLayer) map.removeLayer(markersLayer);
        if (points.length === 0) return;
        markersLayer = L.layerGroup().addTo(map);
        points.forEach(m => markersLayer.addLayer(m));
        if (points.length === 2) {
            const latlngs = points.map(p => p.getLatLng());
            lineLayer = L.polyline(latlngs, { color: '#ffc107', weight: 4, dashArray: '8, 6' }).addTo(map);
        }
        updateRulerDisplay();
    }
    
    function addRulerPoint(e) {
        if (!rulerModeActive) return;
        if (points.length >= 2) clearRuler();
        const marker = L.marker(e.latlng, {
            draggable: true,
            icon: L.divIcon({ className: 'ruler-marker', html: `<div style="background:#ffc107; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`, iconSize: [12,12] })
        });
        marker.on('dragend', () => { updateRulerGraphics(); });
        points.push(marker);
        updateRulerGraphics();
    }
    
    function clearRuler() {
        if (lineLayer) map.removeLayer(lineLayer);
        if (markersLayer) map.removeLayer(markersLayer);
        points.forEach(m => m.remove());
        points = [];
        lineLayer = null;
        markersLayer = null;
        updateRulerDisplay();
    }
    
    function setRulerMode(active) {
        rulerModeActive = active;
        const rulerBtn = document.getElementById('rulerBtn');
        const panel = document.getElementById('rulerPanel');
        
        if (active) {
            rulerBtn.classList.add('active');
            panel.classList.add('show');
            map.getContainer().style.cursor = 'crosshair';
            if (polygonsLayer) {
                polygonsLayer.eachLayer(layer => {
                    if (layer._path) layer._path.classList.add('leaflet-interactive-off');
                });
            }
            map.on('click', addRulerPoint);
        } else {
            rulerBtn.classList.remove('active');
            panel.classList.remove('show');
            map.getContainer().style.cursor = '';
            map.off('click', addRulerPoint);
            if (polygonsLayer) {
                polygonsLayer.eachLayer(layer => {
                    if (layer._path) layer._path.classList.remove('leaflet-interactive-off');
                });
            }
            clearRuler();
        }
    }
    
    // ===========================================
    // ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock();
    setInterval(updateClock, 60000);
    
    function formatName(name) {
        if (!name) return '';
        const parts = name.split(' ');
        if (parts.length === 1) return parts[0];
        return parts[0] + '<br>' + parts.slice(1).join(' ');
    }
    
    function getPopupContent(regionName, drone, rocket) {
        const formatted = formatName(regionName);
        let text = "", color = "";
        if (rocket) { text = "🔴 РАКЕТНАЯ ОПАСНОСТЬ!"; color = "#ff8888"; }
        else if (drone) { text = "🟡 Опасность БПЛА"; color = "#ffc107"; }
        else { text = "⚪ Отбой"; color = "#adb5bd"; }
        return `<div><b>${formatted}</b><br><span style="color:${color}">${text}</span></div>`;
    }
    
    // ===========================================
    // ОБНОВЛЕНИЕ ЦВЕТОВ
    // ===========================================
    function updateAllPolygons() {
        if (!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const name = layer.regionName;
            if (name && regionStatus[name]) {
                const { drone, rocket } = regionStatus[name];
                let fillColor = colors.clear;
                if (rocket) fillColor = colors.rocket;
                else if (drone) fillColor = colors.drone;
                layer.setStyle({ fillColor, fillOpacity: 0.7 });
                layer.getPopup().setContent(getPopupContent(name, drone, rocket));
            }
        });
        updateAlertsPanel();
    }
    
    // ===========================================
    // ПАНЕЛЬ ТРЕВОГ
    // ===========================================
    function updateAlertsPanel() {
        const panelContent = document.getElementById('panelContent');
        const active = [];
        for (const [name, flags] of Object.entries(regionStatus)) {
            if (flags.rocket) active.push({ name, type: 'rocket', label: '🔴 Ракетная опасность' });
            else if (flags.drone) active.push({ name, type: 'drone', label: '🟡 Опасность БПЛА' });
        }
        if (active.length === 0) {
            panelContent.innerHTML = '<div class="empty-message">Нет активных тревог</div>';
            return;
        }
        active.sort((a,b) => {
            if (a.type === 'rocket' && b.type !== 'rocket') return -1;
            if (a.type !== 'rocket' && b.type === 'rocket') return 1;
            return a.name.localeCompare(b.name);
        });
        let html = '';
        for (const reg of active) {
            html += `<div class="alert-region-item" style="border-left-color: ${reg.type === 'rocket' ? '#dc3545' : '#ffc107'}">
                        <div class="region-name">${reg.name}</div>
                        <div class="alert-type">${reg.label}</div>
                    </div>`;
        }
        panelContent.innerHTML = html;
    }
    
    // ===========================================
    // ВСЕ РЕГИОНЫ РФ (более 85)
    // ===========================================
    const regionAliases = {
        "Москва": ["москва","мск","город москва"],
        "Московская область": ["московская область","подмосковье","мо обл","московской обл"],
        "Санкт-Петербург": ["санкт-петербург","питер","спб"],
        "Ленинградская область": ["ленинградская область","ленобласть"],
        "Белгородская область": ["белгород","белгородская область","белгородской обл"],
        "Брянская область": ["брянск","брянская область","брянской обл","брянщина"],
        "Владимирская область": ["владимир","владимирская область"],
        "Воронежская область": ["воронеж","воронежская область","воронежской обл"],
        "Ивановская область": ["иваново","ивановская область"],
        "Калужская область": ["калуга","калужская область"],
        "Костромская область": ["кострома","костромская область"],
        "Курская область": ["курск","курская область","курской обл"],
        "Липецкая область": ["липецк","липецкая область"],
        "Нижегородская область": ["нижний новгород","нижегородская область","нижегородской обл"],
        "Новгородская область": ["новгород","великий новгород","новгородская область"],
        "Орловская область": ["орел","орловская область"],
        "Пензенская область": ["пенза","пензенская область"],
        "Псковская область": ["псков","псковская область"],
        "Рязанская область": ["рязань","рязанская область"],
        "Смоленская область": ["смоленск","смоленская область"],
        "Тамбовская область": ["тамбов","тамбовская область"],
        "Тверская область": ["тверь","тверская область"],
        "Тульская область": ["тула","тульская область"],
        "Ярославская область": ["ярославль","ярославская область"],
        "Краснодарский край": ["краснодар","кубань","краснодарский край"],
        "Ставропольский край": ["ставрополь","ставропольский край"],
        "Ростовская область": ["ростов","ростов-на-дону","ростовская область"],
        "Волгоградская область": ["волгоград","волгоградская область"],
        "Астраханская область": ["астрахань","астраханская область"],
        "Республика Татарстан": ["татарстан","казань","Республика Татарстан"],

        "Архангельская область": ["архангельск","архангельская область"],
        "Вологодская область": ["вологда","вологодская область"],
        "Калининградская область": ["калининград","калининградская область"],
        "Республика Крым": ["крым","республика крым","симферополь"],
        "Республика Дагестан": ["дагестан","махачкала"],
        "Республика Карелия": ["карелия","петрозаводск"],

        "Республика Ингушетия": ["ингушетия","магас"],
        "Кабардино-Балкарская Республика": ["кабардино-балкария","налъчик"],
        "Карачаево-Черкесская Республика": ["карачаево-черкесия","черкесск"],
        "Республика Северная Осетия": ["северная осетия","владикавказ"],
        "Кировская область": ["киров","кировская область"],
        "Еврейская АО": ["еврейская автономная","биробиджан"],
        "Чукотский АО": ["чукотка","анадырь"],
        "Ненецкий АО": ["ненецкий","нарьян-мар"],
        "Республика Алтай": ["алтай","горно-алтайск"],
        "Республика Бурятия": ["бурятия","улан-удэ"],
        "Республика Хакасия": ["хакасия","абакан"],
        "Республика Тыва": ["тыва","кызыл"],
        "Тюменская область": ["тюмень","тюменская область"],
        "Ивановская область": ["иваново","ивановская область"],
        "Костромская область": ["кострома","костромская область"]
    };
    const allRegionNames = Object.keys(regionAliases);
    
    // ===========================================
    // ПАРСИНГ TELEGRAM
    // ===========================================
    async function fetchWithProxy(url) {
        const proxies = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?", "https://cors-anywhere.herokuapp.com/"];
        for (let proxy of proxies) {
            try {
                const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
                if (res.ok) {
                    const txt = await res.text();
                    if (txt && txt.length > 2000) return txt;
                }
            } catch(e) {}
        }
        throw new Error("Нет прокси");
    }
    
    async function refreshAlerts() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '🔄 Обновление...';
        try {
            let html = null;
            try {
                html = await fetchWithProxy("https://t.me/s/locatorru");
            } catch(e) {
                html = await fetchWithProxy("https://t.me/s/radarrussiia");
            }
            if (!html) throw new Error("Нет данных");
            const regex = /data-post="(?:locatorru|radarrussiia)\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            let posts = [];
            let m;
            while ((m = regex.exec(html)) !== null) {
                posts.push({ id: parseInt(m[1]), text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase() });
            }
            posts.sort((a,b) => b.id - a.id);
            const fresh = posts.slice(0, 40);
            const newStatus = JSON.parse(JSON.stringify(regionStatus));
            for (let post of fresh) {
                const text = post.text;
                const isAll = /все регионы|по всей россии/i.test(text);
                let matched = isAll ? allRegionNames : [];
                if (!isAll) {
                    for (const [official, keys] of Object.entries(regionAliases)) {
                        if (keys.some(kw => text.includes(kw))) matched.push(official);
                    }
                }
                if (matched.length === 0) continue;
                const isOtboy = /отбой|снята/i.test(text);
                const isRocket = /ракетная опасность|ракетная тревога/i.test(text);
                const isDrone = /бпла|беспилот/i.test(text);
                for (let reg of matched) {
                    if (!newStatus[reg]) newStatus[reg] = { drone: false, rocket: false };
                    if (isOtboy) {
                        if (isRocket) newStatus[reg].rocket = false;
                        else if (isDrone) newStatus[reg].drone = false;
                        else { newStatus[reg].drone = false; newStatus[reg].rocket = false; }
                    } else {
                        if (isRocket) newStatus[reg].rocket = true;
                        else if (isDrone) newStatus[reg].drone = true;
                    }
                }
            }
            regionStatus = newStatus;
            updateAllPolygons();
            localStorage.setItem("alertCache", JSON.stringify(regionStatus));
            statusDiv.innerHTML = '✅ Готово';
            setTimeout(() => statusDiv.innerHTML = 'Актуально', 1500);
        } catch(err) {
            console.error(err);
            statusDiv.innerHTML = '⚠️ Ошибка';
        }
    }
    
    // ===========================================
    // ЗАГРУЗКА ГРАНИЦ С GITHUB
    // ===========================================
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url).then(res => res.ok ? res.json() : Promise.reject())
          .then(data => applyPolygons(data))
          .catch(() => fetch(fallback).then(r => r.json()).then(applyPolygons));
    }
    
    function applyPolygons(geoData) {
        if (polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || "";
                let d = false, r = false;
                if (regionStatus[name]) { d = regionStatus[name].drone; r = regionStatus[name].rocket; }
                let fillColor = colors.clear;
                if (r) fillColor = colors.rocket;
                else if (d) fillColor = colors.drone;
                return { color: "#fff", weight: 2.2, fillColor, fillOpacity: 0.7 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || "";
                if (name) {
                    layer.regionName = name;
                    if (!regionStatus[name]) regionStatus[name] = { drone: false, rocket: false };
                    const { drone, rocket } = regionStatus[name];
                    layer.bindPopup(getPopupContent(name, drone, rocket), { className: 'custom-popup' });
                    layer.off('click');
                    layer.on('click', (e) => { e.target.openPopup(); });
                }
            }
        }).addTo(map);
        
        if (rulerModeActive) {
            polygonsLayer.eachLayer(layer => {
                if (layer._path) layer._path.classList.add('leaflet-interactive-off');
            });
        }
        
        document.getElementById('status').innerHTML = 'Границы загружены';
        updateAlertsPanel();
    }
    
    // ===========================================
    // ЗАПУСК
    // ===========================================
    loadPolygons();
    setTimeout(() => {
        refreshAlerts();
        setInterval(refreshAlerts, 35000);
    }, 2000);
    
    document.getElementById('updateBtn').addEventListener('click', () => refreshAlerts());
    document.getElementById('rulerBtn').addEventListener('click', () => setRulerMode(!rulerModeActive));
    document.getElementById('clearRulerBtn').addEventListener('click', () => clearRuler());
    document.getElementById('threatType').addEventListener('change', () => updateRulerDisplay());
    
    const panel = document.getElementById('alertsPanel');
    document.getElementById('openPanelBtn').addEventListener('click', () => panel.classList.add('open'));
    document.getElementById('closePanelBtn').addEventListener('click', () => panel.classList.remove('open'));
    document.addEventListener('click', (e) => {
        if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== document.getElementById('openPanelBtn')) {
            panel.classList.remove('open');
        }
    });
    
    window.addEventListener('resize', () => map.invalidateSize());
    setTimeout(() => map.invalidateSize(), 200);
    map.on('zoomend', () => { if (map.getZoom() > 7) map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 }); });
</script>
