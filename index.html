<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — locatorru</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .clock {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 8px 18px; color: #e8eef2;
            font-family: 'JetBrains Mono', monospace; text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }
        .legend {
            position: fixed; bottom: 20px; left: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 12px; padding: 10px 16px; color: #e8eef2;
            font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 6px; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }
        .update-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 10px 22px; color: white; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace; letter-spacing: 0.5px;
        }
        .update-btn:hover { background: #28a745; border-color: #28a745; transform: scale(1.02); }
        .status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 4px 14px; color: #ccc;
            font-size: 0.7rem; font-family: monospace; white-space: nowrap;
        }
        .alerts-panel {
            position: fixed; top: 20px; left: 20px; z-index: 2100;
            background: rgba(10,14,26,0.92); backdrop-filter: blur(12px);
            border-radius: 16px; color: #e8eef2; border: 1px solid rgba(255,255,255,0.2);
            width: 280px; max-width: calc(100% - 40px); transition: all 0.2s ease;
            font-family: 'Segoe UI', monospace; font-size: 0.85rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); pointer-events: auto;
        }
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; cursor: pointer; user-select: none;
            border-radius: 16px; transition: background 0.1s;
        }
        .panel-header:hover { background: rgba(255,255,255,0.05); }
        .panel-header h3 { font-size: 0.9rem; margin: 0; display: flex; align-items: baseline; gap: 6px; }
        .panel-header h3 span { font-size: 0.75rem; opacity: 0.8; font-weight: normal; }
        .toggle-icon { font-size: 1.2rem; transition: transform 0.2s; width: 24px; text-align: center; }
        .panel-content { max-height: 0; overflow: hidden; transition: max-height 0.25s ease-out; padding: 0 16px; }
        .panel-content.open { max-height: 60vh; overflow-y: auto; padding: 0 16px 12px 16px; }
        .alert-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.8rem; }
        .alert-level-badge { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
        .alert-region { flex-grow: 1; font-weight: 500; white-space: normal; word-break: break-word; }
        .alert-desc { font-size: 0.7rem; opacity: 0.8; }
        .no-alerts { text-align: center; padding: 12px 5px; color: #aaa; font-style: italic; }
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid; }
        .leaflet-control-attribution { display: none !important; }
        @media (max-width: 600px) {
            .time-main { font-size: 1.2rem; }
            .clock { padding: 4px 12px; top: 10px; right: 10px; }
            .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
            .legend-color { width: 20px; height: 14px; }
            .update-btn { bottom: 10px; right: 10px; padding: 8px 16px; font-size: 0.85rem; }
            .status { bottom: 10px; font-size: 0.6rem; }
            .alerts-panel { top: 10px; left: 10px; width: calc(100% - 20px); max-width: 280px; }
        }
    </style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="alerts-panel" id="alertsPanel">
    <div class="panel-header" id="panelHeader">
        <h3>⚠️ Активные угрозы <span id="alertsCount"></span></h3>
        <div class="toggle-icon" id="toggleIcon">▼</div>
    </div>
    <div class="panel-content" id="panelContent">
        <div id="alertsList">Загрузка...</div>
    </div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #2ecc71;"></div> <span>🟢 Внимание</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Фиксация</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #8B4513;"></div> <span>🏴‍☠️ Ракетная опасность</span></div>
</div>
<button class="update-btn" id="updateBtn">🔄 Обновить</button>
<div class="status" id="status">Загрузка...</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ===========================================
    // 1. КАРТА
    // ===========================================
    const map = L.map('map').setView([61, 95], 4.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    }).addTo(map);

    // ===========================================
    // 2. ЦВЕТА (0 - отбой, 1 - внимание, 2 - опасность БПЛА, 3 - фиксация, 4 - ракетная)
    // ===========================================
    const colors = {
        clear: "#6c757d",
        attention: "#2ecc71",
        danger: "#ffc107",
        fixation: "#dc3545",
        rocket: "#8B4513"
    };
    let currentLevels = {};
    let circlesLayer = null;
    let polygonsLayer = null;

    // ===========================================
    // 3. ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock();
    setInterval(updateClock, 60000);

    function formatName(name) {
        if (!name) return '';
        const parts = name.split(' ');
        if (parts.length === 1) return parts[0];
        return parts[0] + '<br>' + parts.slice(1).join(' ');
    }

    // ===========================================
    // 4. УПРАВЛЕНИЕ ПАНЕЛЬЮ
    // ===========================================
    const panelContent = document.getElementById('panelContent');
    const toggleIcon = document.getElementById('toggleIcon');
    let isOpen = false;
    function togglePanel() {
        isOpen = !isOpen;
        if (isOpen) { panelContent.classList.add('open'); toggleIcon.innerHTML = '▲'; }
        else { panelContent.classList.remove('open'); toggleIcon.innerHTML = '▼'; }
    }
    document.getElementById('panelHeader').addEventListener('click', togglePanel);

    const levelToText = {
        1: { text: "Внимание", color: "#2ecc71" },
        2: { text: "Опасность БПЛА", color: "#ffc107" },
        3: { text: "Фиксация", color: "#dc3545" },
        4: { text: "Ракетная опасность", color: "#8B4513" }
    };

    function updateSidebar() {
        const container = document.getElementById('alertsList');
        const countSpan = document.getElementById('alertsCount');
        const active = [];
        for (const [region, level] of Object.entries(currentLevels)) {
            if (level > 0) active.push({ region, level });
        }
        active.sort((a,b) => b.level - a.level);
        countSpan.innerText = active.length ? `(${active.length})` : '';
        if (active.length === 0) {
            container.innerHTML = '<div class="no-alerts">✨ Нет активных тревог</div>';
            return;
        }
        let html = '';
        for (const item of active) {
            const info = levelToText[item.level] || { text: "Неизвестно", color: "#fff" };
            html += `<div class="alert-item"><div class="alert-level-badge" style="background: ${info.color};"></div><div class="alert-region">${item.region}</div><div class="alert-desc">${info.text}</div></div>`;
        }
        container.innerHTML = html;
    }

    // ===========================================
    // 5. КРУГИ (быстрая визуализация)
    // ===========================================
    const quickRegions = [
        { name:"Московская область", lat:55.7558, lng:37.6173 },
        { name:"Санкт-Петербург", lat:59.94, lng:30.31 },
        { name:"Ленинградская область", lat:59.94, lng:30.31 },
        { name:"Белгородская область", lat:50.6, lng:36.58 },
        { name:"Брянская область", lat:53.24, lng:34.36 },
        { name:"Воронежская область", lat:51.66, lng:39.2 },
        { name:"Курская область", lat:51.73, lng:36.18 },
        { name:"Краснодарский край", lat:45.04, lng:38.97 },
        { name:"Ростовская область", lat:47.23, lng:39.7 },
        { name:"Татарстан", lat:55.8, lng:49.12 },
        { name:"Республика Крым", lat:44.95, lng:34.1 },
        { name:"Калининградская область", lat:54.72, lng:20.5 },
        { name:"Свердловская область", lat:56.84, lng:60.6 },
        { name:"Челябинская область", lat:55.15, lng:61.4 },
        { name:"Новосибирская область", lat:55.03, lng:82.92 },
        { name:"Самарская область", lat:53.2, lng:50.15 },
        { name:"Нижегородская область", lat:56.33, lng:44.0 }
    ];

    function getPopupContent(regionName, level) {
        const formatted = formatName(regionName);
        let text = "", color = "";
        if (level === 0) { text = "⚪ Отбой / Спокойно"; color = "#adb5bd"; }
        else if (level === 1) { text = "🟢 Внимание"; color = "#2ecc71"; }
        else if (level === 2) { text = "🟡 Опасность БПЛА"; color = "#ffc107"; }
        else if (level === 3) { text = "🔴 Фиксация"; color = "#ff8888"; }
        else { text = "🏴‍☠️ РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; color = "#c47e3a"; }
        return `<div style="font-family:'Segoe UI';min-width:140px;"><b style="font-size:1rem;">${formatted}</b><br><span style="color:${color}">${text}</span></div>`;
    }

    function createCircles() {
        const group = L.layerGroup();
        quickRegions.forEach(r => {
            const level = currentLevels[r.name] || 0;
            let fill = colors.clear;
            if (level === 1) fill = colors.attention;
            else if (level === 2) fill = colors.danger;
            else if (level === 3) fill = colors.fixation;
            else if (level === 4) fill = colors.rocket;
            const circle = L.circle([r.lat, r.lng], {
                radius: 85000, color: "#fff", weight: 2.2,
                fillColor: fill, fillOpacity: 0.7
            });
            circle.bindPopup(getPopupContent(r.name, level), { className: 'custom-popup' });
            group.addLayer(circle);
        });
        return group;
    }

    function updateCircles() {
        if (!circlesLayer) return;
        circlesLayer.eachLayer(circle => {
            const center = circle.getLatLng();
            const reg = quickRegions.find(r => Math.abs(r.lat - center.lat) < 0.01 && Math.abs(r.lng - center.lng) < 0.01);
            if (reg) {
                const level = currentLevels[reg.name] || 0;
                let fill = colors.clear;
                if (level === 1) fill = colors.attention;
                else if (level === 2) fill = colors.danger;
                else if (level === 3) fill = colors.fixation;
                else if (level === 4) fill = colors.rocket;
                circle.setStyle({ fillColor: fill });
                circle.getPopup().setContent(getPopupContent(reg.name, level));
            }
        });
        updateSidebar();
    }

    // ===========================================
    // 6. РАСШИРЕННЫЙ СПИСОК РЕГИОНОВ ДЛЯ ПАРСИНГА + обратное отображение для нормализации
    // ===========================================
    const regionAliases = {
        "Московская область": ["московская область","подмосковье","мо обл","московской обл","московская обл","москва","мск","московской области","московская область"],
        "Санкт-Петербург": ["санкт-петербург","питер","спб","ленинград","санкт-петербурга"],
        "Ленинградская область": ["ленинградская область","ленобласть","ленинградской обл","ленинградской области"],
        "Белгородская область": ["белгород","белгородская область","белгородской обл","белгородской области"],
        "Брянская область": ["брянск","брянская область","брянской обл","брянской области"],
        "Воронежская область": ["воронеж","воронежская область","воронежской обл","воронежской области"],
        "Курская область": ["курск","курская область","курской обл","курской области"],
        "Краснодарский край": ["краснодар","кубань","краснодарский край","краснодарского края","краснодарском крае"],
        "Ростовская область": ["ростов","ростов-на-дону","ростовская область","ростовской обл","ростовской области"],
        "Татарстан": ["татарстан","казань","республика татарстан","татарстана"],
        "Республика Крым": ["крым","республика крым","крыму","крыма"],
        "Калининградская область": ["калининград","калининградская область","калининградской обл","калининградской области"],
        "Свердловская область": ["свердловская область","екатеринбург","свердловской обл","свердловской области"],
        "Челябинская область": ["челябинск","челябинская область","челябинской обл","челябинской области"],
        "Новосибирская область": ["новосибирск","новосибирская область","новосибирской обл","новосибирской области"],
        "Самарская область": ["самара","самарская область","самарской обл","самарской области"],
        "Нижегородская область": ["нижний новгород","нижегородская область","нижегородской обл","нижегородской области"],
        "Волгоградская область": ["волгоград","волгоградская область","волгоградской обл","волгоградской области"],
        "Саратовская область": ["саратов","саратовская область","саратовской обл","саратовской области"],
        "Пермский край": ["пермь","пермский край","пермского края","пермском крае"],
        "Омская область": ["омск","омская область","омской обл","омской области"],
        "Томская область": ["томск","томская область","томской обл","томской области"],
        "Кемеровская область": ["кемерово","кемеровская область","кузбасс","кемеровской обл","кемеровской области"],
        "Иркутская область": ["иркутск","иркутская область","иркутской обл","иркутской области"],
        "Красноярский край": ["красноярск","красноярский край","красноярского края","красноярском крае"],
        "Алтайский край": ["барнаул","алтайский край","алтайского края","алтайском крае"],
        "Приморский край": ["владивосток","приморский край","приморья","приморском крае"],
        "Хабаровский край": ["хабаровск","хабаровский край","хабаровского края"],
        "Амурская область": ["амурская область","благовещенск","амурской обл","амурской области"],
        "Архангельская область": ["архангельск","архангельская область","архангельской обл","архангельской области"],
        "Мурманская область": ["мурманск","мурманская область","мурманской обл","мурманской области"],
        "Республика Карелия": ["карелия","петрозаводск","республика карелия"],
        "Республика Коми": ["коми","сыктывкар","республика коми"],
        "Ханты-Мансийский АО": ["хмао","ханты-мансийск","сургут","ханты-мансийский автономный округ"],
        "Ямало-Ненецкий АО": ["янао","ямал","новый уренгой","ямало-ненецкий автономный округ"],
        "Чеченская Республика": ["чечня","грозный","чеченская республика"],
        "Дагестан": ["дагестан","махачкала","республика дагестан"],
        "Башкортостан": ["башкортостан","уфа","республика башкортостан"],
        "Удмуртская Республика": ["удмуртия","ижевск","республика удмуртия"],
        "Чувашия": ["чувашия","чебоксары","чувашская республика"],
        "Марий Эл": ["марий эл","йошкар-ола","республика марий эл"],
        "Республика Мордовия": ["мордовия","саранск","республика мордовия"],
        "Кировская область": ["киров","кировская область","кировской обл","кировской области"],
        "Ульяновская область": ["ульяновск","ульяновская область","ульяновской обл","ульяновской области"],
        "Пензенская область": ["пенза","пензенская область","пензенской обл","пензенской области"],
        "Тамбовская область": ["тамбов","тамбовская область","тамбовской обл","тамбовской области"],
        "Рязанская область": ["рязань","рязанская область","рязанской обл","рязанской области"],
        "Тульская область": ["тула","тульская область","тульской обл","тульской области"],
        "Калужская область": ["калуга","калужская область","калужской обл","калужской области"],
        "Смоленская область": ["смоленск","смоленская область","смоленской обл","смоленской области"],
        "Тверская область": ["тверь","тверская область","тверской обл","тверской области"],
        "Владимирская область": ["владимир","владимирская область","владимирской обл","владимирской области"],
        "Ивановская область": ["иваново","ивановская область","ивановской обл","ивановской области"],
        "Костромская область": ["кострома","костромская область","костромской обл","костромской области"],
        "Орловская область": ["орел","орловская область","орловской обл","орловской области"],
        "Липецкая область": ["липецк","липецкая область","липецкой обл","липецкой области"],
        "Псковская область": ["псков","псковская область","псковской обл","псковской области"],
        "Новгородская область": ["новгород","великий новгород","новгородская область","новгородской обл","новгородской области"],
        "Ярославская область": ["ярославль","ярославская область","ярославской обл","ярославской области"],
        "Забайкальский край": ["забайкалье","чита","забайкальский край","забайкальского края"],
        "Камчатский край": ["камчатка","петропавловск-камчатский","камчатский край"],
        "Магаданская область": ["магадан","магаданская область","магаданской обл","магаданской области"],
