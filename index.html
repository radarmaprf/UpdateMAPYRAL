<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — линейка угроз</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .clock {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 8px 18px; color: #e8eef2;
            font-family: 'JetBrains Mono', monospace; text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }
        
        .legend {
            position: fixed; bottom: 20px; left: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 12px; padding: 10px 16px; color: #e8eef2;
            font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 6px; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }
        
        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; gap: 12px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px); padding: 8px 16px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tool-btn {
            background: rgba(30,35,50,0.9); border: none; color: white;
            padding: 6px 16px; border-radius: 30px; font-size: 0.85rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace; letter-spacing: 0.5px;
        }
        .tool-btn.active { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .tool-btn:hover { background: #28a745; transform: scale(1.02); }
        .tool-btn.danger { background: #dc3545; }
        .tool-btn.danger:hover { background: #b02a37; }
        
        .update-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 10px 22px; color: white; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace;
        }
        .update-btn:hover { background: #28a745; border-color: #28a745; }
        
        .status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 4px 14px; color: #ccc;
            font-size: 0.7rem; font-family: monospace; white-space: nowrap;
        }
        
        .ruler-panel {
            position: fixed; top: 80px; left: 20px; z-index: 2100;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 12px 18px; width: 260px;
            border: 1px solid rgba(255,255,255,0.2); display: none;
            flex-direction: column; gap: 10px; font-family: monospace;
        }
        .ruler-panel.show { display: flex; }
        .ruler-panel h4 { margin: 0 0 5px 0; color: #ffc107; font-size: 1rem; }
        .threat-select {
            background: #1a1f2e; color: white; border: 1px solid #555;
            padding: 6px; border-radius: 8px; font-size: 0.8rem;
        }
        .distance-info { background: #00000055; padding: 8px; border-radius: 8px; margin-top: 5px; }
        .distance-info p { margin: 4px 0; font-size: 0.75rem; }
        .time-result { font-size: 1.1rem; font-weight: bold; color: #ffc107; text-align: center; }
        
        .alert-list-btn {
            position: fixed; top: 20px; left: 20px; z-index: 2000;
            background: rgba(220,53,69,0.9); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 8px 18px; color: white; font-size: 0.9rem;
            font-weight: bold; cursor: pointer;
        }
        
        .alerts-panel {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(12px);
            z-index: 3000; transition: left 0.3s ease; border-right: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column;
        }
        .alerts-panel.open { left: 0; }
        .panel-header {
            padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .close-panel { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .panel-content { flex: 1; overflow-y: auto; padding: 12px; }
        .alert-region-item { background: rgba(30,35,50,0.7); margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 4px solid; }
        
        .copy-btn {
            background: #28a745; border: none; color: white; padding: 6px 14px;
            border-radius: 30px; font-size: 0.8rem; font-weight: bold; cursor: pointer;
            transition: 0.2s; margin-right: 10px; font-family: monospace;
        }
        .copy-btn:hover { background: #218838; transform: scale(1.02); }
        .toast-msg {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(40,167,69,0.95); color: white; padding: 8px 20px;
            border-radius: 30px; font-size: 0.8rem; z-index: 4000;
            animation: fadeOut 2s ease forwards; pointer-events: none;
            white-space: nowrap; font-family: monospace;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; }
        .leaflet-control-attribution { display: none !important; }
        
        @media (max-width: 600px) {
            .ruler-panel { width: 220px; top: 70px; left: 10px; padding: 8px 12px; }
            .toolbar { top: 10px; gap: 6px; padding: 5px 12px; }
            .tool-btn { padding: 4px 12px; font-size: 0.7rem; }
            .toast-msg { font-size: 0.7rem; bottom: 70px; }
        }
    </style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>
<button class="alert-list-btn" id="openPanelBtn">⚠️ Список тревог</button>

<div class="toolbar">
    <button id="rulerBtn" class="tool-btn">📏 Линейка (on/off)</button>
    <button id="clearRulerBtn" class="tool-btn danger">🗑 Сбросить</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Ракетная опасность</span></div>
</div>
<button class="update-btn" id="updateBtn">🔄 Обновить</button>
<div class="status" id="status">Загрузка...</div>

<div id="rulerPanel" class="ruler-panel">
    <h4>📏 Измерение угрозы</h4>
    <select id="threatType" class="threat-select">
        <option value="drone">🛩 Обычный БПЛА (180 км/ч)</option>
        <option value="jet_drone">🚀 Реактивный БПЛА (450 км/ч)</option>
        <option value="cruise">✈️ Крылатая ракета (850 км/ч)</option>
        <option value="ballistic">💥 Баллистическая ракета (9000 км/ч)</option>
    </select>
    <div class="distance-info" id="distanceInfo">
        <p>📏 Расстояние: <span id="distKm">0</span> км</p>
        <p>⏱ Время подлёта:</p>
        <div id="timeResult" class="time-result">—</div>
    </div>
    <small style="font-size:0.65rem; opacity:0.7;">★ Кликните по карте 2 раза — поставьте точки A и B</small>
</div>

<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header">
        <h3>🚨 Регионы с тревогой</h3>
        <div>
            <button id="copyAlertsBtn" class="copy-btn">📋 Копировать список</button>
            <button class="close-panel" id="closePanelBtn">&times;</button>
        </div>
    </div>
    <div class="panel-content" id="panelContent">...</div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ===========================================
    // 0. РЕГИОН, КОТОРЫЙ НИКОГДА НЕ ПОДСВЕЧИВАЕТСЯ
    // ===========================================
    const IGNORED_REGIONS = ["Архангельская область"];
    
    // ===========================================
    // 1. ОТОБРАЖАЕМЫЕ НАЗВАНИЯ
    // ===========================================
    const displayNames = {
        "Чувашская Республика": "Чувашия",
        "Республика Татарстан": "Татарстан",
        "Республика Башкортостан": "Башкортостан",
        "Республика Дагестан": "Дагестан",
        "Республика Крым": "Крым",
        "Республика Карелия": "Карелия",
        "Республика Коми": "Коми",
        "Республика Марий Эл": "Марий Эл",
        "Республика Мордовия": "Мордовия",
        "Удмуртская Республика": "Удмуртия",
        "Чеченская Республика": "Чечня",
        "Республика Адыгея": "Адыгея",
        "Республика Алтай": "Алтай",
        "Республика Бурятия": "Бурятия",
        "Республика Тыва": "Тыва",
        "Республика Хакасия": "Хакасия",
        "Республика Саха (Якутия)": "Якутия",
        "Ханты-Мансийский АО": "ХМАО",
        "Ямало-Ненецкий АО": "ЯНАО",
        "Ненецкий АО": "Ненецкий АО",
        "Чукотский АО": "Чукотка",
        "Еврейская АО": "ЕАО",
        "Московская область": "Подмосковье",
        "Ленинградская область": "Ленобласть",
        "Санкт-Петербург": "СПб",
        "Краснодарский край": "Краснодарский край",
        "Ставропольский край": "Ставрополье",
        "Пермский край": "Пермский край",
        "Камчатский край": "Камчатка",
        "Приморский край": "Приморье",
        "Забайкальский край": "Забайкалье",
        "Хабаровский край": "Хабаровский край",
        "Алтайский край": "Алтайский край",
        "Красноярский край": "Красноярский край",
    };
    
    function getDisplayName(geoName) {
        return displayNames[geoName] || geoName;
    }
    
    // ===========================================
    // 2. КАРТА
    // ===========================================
    const map = L.map('map').setView([61, 95], 4.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    }).addTo(map);

    let regionStatus = {};
    const colors = { clear: "#6c757d", drone: "#ffc107", rocket: "#dc3545" };
    let polygonsLayer = null;

    // ===========================================
    // 3. ЛИНЕЙКА
    // ===========================================
    let rulerModeActive = false;
    let points = [];
    let markersLayer = null;
    let lineLayer = null;
    
    const speeds = {
        drone: 180,
        jet_drone: 450,
        cruise: 850,
        ballistic: 9000
    };
    
    function calculateTime(distanceKm, speedKmh) {
        if (distanceKm <= 0) return "0 мин";
        const hours = distanceKm / speedKmh;
        const totalMinutes = hours * 60;
        if (totalMinutes < 1) return "< 1 мин";
        const hrs = Math.floor(totalMinutes / 60);
        const mins = Math.floor(totalMinutes % 60);
        if (hrs > 0) return `${hrs} ч ${mins} мин`;
        return `${mins} мин`;
    }
    
    function updateRulerDisplay() {
        if (points.length < 2) {
            document.getElementById('distKm').innerText = '0';
            document.getElementById('timeResult').innerHTML = '—';
            return;
        }
        const latlngA = points[0].getLatLng();
        const latlngB = points[1].getLatLng();
        const distance = latlngA.distanceTo(latlngB) / 1000;
        document.getElementById('distKm').innerText = distance.toFixed(1);
        const threatType = document.getElementById('threatType').value;
        const speed = speeds[threatType];
        const timeStr = calculateTime(distance, speed);
        document.getElementById('timeResult').innerHTML = timeStr;
    }
    
    function updateRulerGraphics() {
        if (lineLayer) map.removeLayer(lineLayer);
        if (markersLayer) map.removeLayer(markersLayer);
        if (points.length === 0) return;
        markersLayer = L.layerGroup().addTo(map);
        points.forEach(m => markersLayer.addLayer(m));
        if (points.length === 2) {
            const latlngs = points.map(p => p.getLatLng());
            lineLayer = L.polyline(latlngs, { color: '#ffc107', weight: 4, dashArray: '8, 6', opacity: 0.9 }).addTo(map);
        }
        updateRulerDisplay();
    }
    
    function addRulerPoint(e) {
        if (!rulerModeActive) return;
        if (points.length >= 2) clearRuler();
        const marker = L.marker(e.latlng, { 
            draggable: true, 
            icon: L.divIcon({ 
                className: 'ruler-marker', 
                html: `<div style="background:#ffc107; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`, 
                iconSize: [12,12] 
            }) 
        });
        marker.on('dragend', () => {
            if (points.length === 2) updateRulerGraphics();
            else updateRulerDisplay();
        });
        points.push(marker);
        updateRulerGraphics();
    }
    
    function clearRuler() {
        if (lineLayer) map.removeLayer(lineLayer);
        if (markersLayer) map.removeLayer(markersLayer);
        points.forEach(m => { if (m) m.remove(); });
        points = [];
        lineLayer = null;
        markersLayer = null;
        updateRulerDisplay();
    }
    
    function setRulerMode(active) {
        rulerModeActive = active;
        const rulerBtn = document.getElementById('rulerBtn');
        const panel = document.getElementById('rulerPanel');
        
        if (active) {
            rulerBtn.classList.add('active');
            panel.classList.add('show');
            map.getContainer().style.cursor = 'crosshair';
            if (polygonsLayer) {
                polygonsLayer.eachLayer(layer => layer.off('click'));
            }
            map.on('click', addRulerPoint);
        } else {
            rulerBtn.classList.remove('active');
            panel.classList.remove('show');
            map.getContainer().style.cursor = '';
            map.off('click', addRulerPoint);
            if (polygonsLayer) {
                polygonsLayer.eachLayer(layer => {
                    layer.off('click');
                    layer.on('click', (e) => { e.target.openPopup(); });
                });
            }
            clearRuler();
        }
    }
    
    // ===========================================
    // 4. ЧАСЫ И ПОПАПЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock();
    setInterval(updateClock, 60000);
    
    function formatName(name) {
        const display = getDisplayName(name);
        const words = display.split(' ');
        if (words.length === 1) return display;
        return words[0] + '<br>' + words.slice(1).join(' ');
    }
    
    function getPopupContent(regionName, drone, rocket) {
        const formatted = formatName(regionName);
        let text = "", color = "";
        if (rocket) { text = "🔴 РАКЕТНАЯ ОПАСНОСТЬ!"; color = "#ff8888"; }
        else if (drone) { text = "🟡 Опасность БПЛА"; color = "#ffc107"; }
        else { text = "⚪ Отбой"; color = "#adb5bd"; }
        return `<div><b>${formatted}</b><br><span style="color:${color}">${text}</span></div>`;
    }
    
    // ===========================================
    // 5. ОБНОВЛЕНИЕ КАРТЫ И ПАНЕЛИ
    // ===========================================
    function updateAllPolygons() {
        if (!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const name = layer.regionName;
            if (!name) return;
            if (IGNORED_REGIONS.includes(name)) {
                layer.setStyle({ fillColor: colors.clear, fillOpacity: 0.7 });
                layer.getPopup().setContent(getPopupContent(name, false, false));
                return;
            }
            if (regionStatus[name]) {
                const drone = regionStatus[name].drone;
                const rocket = regionStatus[name].rocket;
                let fillColor = colors.clear;
                if (rocket) fillColor = colors.rocket;
                else if (drone) fillColor = colors.drone;
                layer.setStyle({ fillColor, fillOpacity: 0.7 });
                layer.getPopup().setContent(getPopupContent(name, drone, rocket));
            } else {
                layer.setStyle({ fillColor: colors.clear, fillOpacity: 0.7 });
                layer.getPopup().setContent(getPopupContent(name, false, false));
            }
        });
        updateAlertsPanel();
    }
    
    function getActiveAlertsList() {
        const active = [];
        for (const [name, flags] of Object.entries(regionStatus)) {
            if (IGNORED_REGIONS.includes(name)) continue;
            if (flags.rocket) active.push({ name, type: 'rocket', label: '🔴 Ракетная опасность' });
            else if (flags.drone) active.push({ name, type: 'drone', label: '🟡 Опасность БПЛА' });
        }
        active.sort((a,b) => {
            if (a.type === 'rocket' && b.type !== 'rocket') return -1;
            if (a.type !== 'rocket' && b.type === 'rocket') return 1;
            return getDisplayName(a.name).localeCompare(getDisplayName(b.name));
        });
        return active;
    }
    
    function updateAlertsPanel() {
        const panelContent = document.getElementById('panelContent');
        const active = getActiveAlertsList();
        if (active.length === 0) {
            panelContent.innerHTML = '<div class="empty-message">Нет активных тревог</div>';
            return;
        }
        let html = '';
        for (const reg of active) {
            const display = getDisplayName(reg.name);
            html += `<div class="alert-region-item" style="border-left-color: ${reg.type === 'rocket' ? '#dc3545' : '#ffc107'}">
                        <div class="region-name">${display}</div>
                        <div class="alert-type">${reg.label}</div>
                    </div>`;
        }
        panelContent.innerHTML = html;
    }
    
    async function copyAlertsToClipboard() {
        const active = getActiveAlertsList();
        if (active.length === 0) {
            showToast("⚠️ Нет активных тревог для копирования");
            return;
        }
        let text = "🚨 АКТИВНЫЕ ТРЕВОГИ 🚨\n\n";
        for (const reg of active) {
            const display = getDisplayName(reg.name);
            text += `${reg.label} — ${display}\n`;
        }
        text += `\n📅 ${new Date().toLocaleString('ru-RU')}`;
        
        try {
            await navigator.clipboard.writeText(text);
            showToast(`✅ Скопировано ${active.length} тревог`);
        } catch (err) {
            showToast("❌ Не удалось скопировать");
        }
    }
    
    function showToast(message) {
        const oldToast = document.querySelector('.toast-msg');
        if (oldToast) oldToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // ===========================================
    // 6. ПАРСИНГ TELEGRAM (УЛУЧШЕННЫЙ, С ГЛУБОКОЙ ДОЗАГРУЗКОЙ)
    // ===========================================
    const regionAliases = {
        "Москва": ["москва","мск","город москва","московская область","подмосковье","мо обл","московской обл","московская обл"],
        "Московская область": ["московская область","подмосковье"],
        "Санкт-Петербург": ["санкт-петербург","питер","спб","ленинград"],
        "Ленинградская область": ["ленинградская область","ленобласть","ленинградской обл"],
        "Белгородская область": ["белгород","белгородская область","белгородской обл","белгородская обл"],
        "Брянская область": ["брянск","брянская область","брянской обл","брянская обл","брянщина"],
        "Воронежская область": ["воронеж","воронежская область","воронежской обл"],
        "Курская область": ["курск","курская область","курской обл"],
        "Краснодарский край": ["краснодар","кубань","краснодарский край","краснодарского края"],
        "Ростовская область": ["ростов","ростов-на-дону","ростовская область","ростовской обл"],
        "Республика Татарстан": ["татарстан","казань","республика татарстан"],
        "Республика Крым": ["крым","республика крым","крыму"],
        "Калининградская область": ["калининград","калининградская область","калининградской обл"],
        "Свердловская область": ["свердловская область","екатеринбург","свердловской обл"],
        "Челябинская область": ["челябинск","челябинская область","челябинской обл"],

    // Функция извлечения регионов из текста с учётом перечислений
    function extractRegionsFromText(text, regionMap) {
        const found = new Set();
        // Проверяем каждое официальное название по ключевым словам
        for (const [official, keywords] of Object.entries(regionMap)) {
            if (keywords.some(kw => text.includes(kw))) {
                found.add(official);
            }
        }
        return Array.from(found);
    }
    
    async function fetchWithProxy(url, retries = 2) {
        const proxies = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?", "https://cors-anywhere.herokuapp.com/"];
        for (let proxy of proxies) {
            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
                    if (res.ok) {
                        const txt = await res.text();
                        if (txt && txt.length > 2000) return txt;
                    }
                } catch(e) {}
            }
        }
        throw new Error("Нет данных после всех прокси");
    }
    
    async function refreshAlerts() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '🔄 Обновление (загрузка сообщений)...';
        try {
            // Пытаемся загрузить несколько страниц канала, чтобы охватить больше сообщений
            let allHtml = '';
            let nextUrl = "https://t.me/s/locatorru";
            let loadedPages = 0;
            const maxPages = 5; // загружаем до 5 страниц (около 100+ сообщений)
            let oldestPostId = null;
            
            for (let page = 0; page < maxPages; page++) {
                const html = await fetchWithProxy(nextUrl);
                allHtml += html;
                // Извлекаем ID постов, чтобы узнать самый старый
                const ids = [...html.matchAll(/data-post="locatorru\/(\d+)"/g)].map(m => parseInt(m[1]));
                if (ids.length === 0) break;
                const minId = Math.min(...ids);
                if (oldestPostId === minId) break; // достигли конца
                oldestPostId = minId;
                nextUrl = `https://t.me/s/locatorru?before=${oldestPostId}`;
                loadedPages++;
                // Небольшая пауза, чтобы не забанили
                await new Promise(r => setTimeout(r, 300));
            }
            
            // Если locatorru не дал результатов, пробуем radarrussiia
            if (allHtml.length < 5000) {
                nextUrl = "https://t.me/s/radarrussiia";
                for (let page = 0; page < maxPages; page++) {
                    const html = await fetchWithProxy(nextUrl);
                    allHtml += html;
                    const ids = [...html.matchAll(/data-post="radarrussiia\/(\d+)"/g)].map(m => parseInt(m[1]));
                    if (ids.length === 0) break;
                    const minId = Math.min(...ids);
                    if (oldestPostId === minId) break;
                    oldestPostId = minId;
                    nextUrl = `https://t.me/s/radarrussiia?before=${oldestPostId}`;
                    await new Promise(r => setTimeout(r, 300));
                }
            }
            
            if (!allHtml) throw new Error("Нет данных");
            
            // Регулярка для извлечения постов из обоих каналов
            const regex = /data-post="(?:locatorru|radarrussiia)\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            let posts = [];
            let m;
            while ((m = regex.exec(allHtml)) !== null) {
                posts.push({
                    id: parseInt(m[1]),
                    text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
                });
            }
            // Уникальные посты по id (если дублируются из-за двух каналов)
            const unique = new Map();
            for (const p of posts) {
                if (!unique.has(p.id) || p.id > unique.get(p.id).id) unique.set(p.id, p);
            }
            posts = Array.from(unique.values());
            posts.sort((a,b) => b.id - a.id);
            
            console.log(`Загружено ${posts.length} уникальных сообщений`);
            statusDiv.innerHTML = `🔄 Обработка ${posts.length} сообщений...`;
            
            const newStatus = JSON.parse(JSON.stringify(regionStatus));
            
            for (let post of posts) {
                const text = post.text;
                if (/все регионы|по всей россии/i.test(text)) continue;
                
                // Извлекаем регионы из текста
                const matched = extractRegionsFromText(text, regionAliases);
                if (matched.length === 0) continue;
                
                const isOtboy = /отбой|снята|отбой опасности/i.test(text);
                const isRocket = /ракетная опасность|ракетная тревога/i.test(text);
                const isDrone = /бпла|беспилот|угроза бпла/i.test(text);
                
                for (let reg of matched) {
                    if (IGNORED_REGIONS.includes(reg)) continue;
                    if (!newStatus[reg]) newStatus[reg] = { drone: false, rocket: false };
                    
                    if (isOtboy) {
                        // Отбой: сбрасываем оба флага (или только соответствующий, но безопаснее сбросить оба)
                        newStatus[reg].drone = false;
                        newStatus[reg].rocket = false;
                    } else {
                        if (isRocket) newStatus[reg].rocket = true;
                        else if (isDrone) newStatus[reg].drone = true;
                    }
                }
            }
            
            // Принудительно обнуляем игнорируемый регион
            for (let ignored of IGNORED_REGIONS) {
                newStatus[ignored] = { drone: false, rocket: false };
            }
            
            regionStatus = newStatus;
            updateAllPolygons();
            localStorage.setItem("alertCache", JSON.stringify(regionStatus));
            statusDiv.innerHTML = '✅ Готово';
            setTimeout(() => statusDiv.innerHTML = 'Актуально', 2000);
        } catch(err) {
            console.error(err);
            statusDiv.innerHTML = '⚠️ Ошибка обновления';
        }
    }
    
    // ===========================================
    // 7. ЗАГРУЗКА ГРАНИЦ
    // ===========================================
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url).then(res => res.ok ? res.json() : Promise.reject())
          .then(data => applyPolygons(data))
          .catch(() => fetch(fallback).then(r => r.json()).then(applyPolygons));
    }
    
    function applyPolygons(geoData) {
        if (polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || "";
                if (IGNORED_REGIONS.includes(name)) {
                    return { color: "#fff", weight: 2.2, fillColor: colors.clear, fillOpacity: 0.7 };
                }
                let d = false, r = false;
                if (regionStatus[name]) { d = regionStatus[name].drone; r = regionStatus[name].rocket; }
                let fillColor = colors.clear;
                if (r) fillColor = colors.rocket;
                else if (d) fillColor = colors.drone;
                return { color: "#fff", weight: 2.2, fillColor, fillOpacity: 0.7 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || "";
                if (name) {
                    layer.regionName = name;
                    if (!regionStatus[name]) regionStatus[name] = { drone: false, rocket: false };
                    if (IGNORED_REGIONS.includes(name)) {
                        layer.bindPopup(getPopupContent(name, false, false), { className: 'custom-popup' });
                    } else {
                        const drone = regionStatus[name].drone;
                        const rocket = regionStatus[name].rocket;
                        layer.bindPopup(getPopupContent(name, drone, rocket), { className: 'custom-popup' });
                    }
                }
            }
        }).addTo(map);
        
        if (rulerModeActive) {
            polygonsLayer.eachLayer(layer => layer.off('click'));
        } else {
            polygonsLayer.eachLayer(layer => {
                layer.off('click');
                layer.on('click', (e) => { e.target.openPopup(); });
            });
        }
        document.getElementById('status').innerHTML = 'Границы загружены';
        updateAlertsPanel();
    }
    
    // ===========================================
    // 8. ИНИЦИАЛИЗАЦИЯ
    // ===========================================
    const cached = localStorage.getItem("alertCache");
    if (cached) {
        try { 
            regionStatus = JSON.parse(cached);
            for (let ignored of IGNORED_REGIONS) {
                if (regionStatus[ignored]) regionStatus[ignored] = { drone: false, rocket: false };
            }
        } catch(e) {}
    }
    loadPolygons();
    setTimeout(() => {
        refreshAlerts();
        setInterval(refreshAlerts, 45000); // обновление каждые 45 секунд
    }, 2000);
    
    document.getElementById('updateBtn').addEventListener('click', () => refreshAlerts());
    document.getElementById('rulerBtn').addEventListener('click', () => setRulerMode(!rulerModeActive));
    document.getElementById('clearRulerBtn').addEventListener('click', () => clearRuler());
    document.getElementById('threatType').addEventListener('change', () => updateRulerDisplay());
    document.getElementById('copyAlertsBtn').addEventListener('click', () => copyAlertsToClipboard());
    
    const panel = document.getElementById('alertsPanel');
    document.getElementById('openPanelBtn').addEventListener('click', () => panel.classList.add('open'));
    document.getElementById('closePanelBtn').addEventListener('click', () => panel.classList.remove('open'));
    document.addEventListener('click', (e) => {
        if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== document.getElementById('openPanelBtn')) {
            panel.classList.remove('open');
        }
    });
    
    window.addEventListener('resize', () => map.invalidateSize());
    setTimeout(() => map.invalidateSize(), 200);
    map.on('zoomend', () => { if (map.getZoom() > 7) map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 }); });
