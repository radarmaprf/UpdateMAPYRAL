<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — Тревоги РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .clock { position: fixed; top: 20px; right: 20px; z-index: 2000; background: rgba(10,14,26,0.85); backdrop-filter: blur(8px); border-radius: 20px; padding: 8px 18px; color: #e8eef2; font-family: monospace; text-align: center; border: 1px solid rgba(255,255,255,0.15); }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }
        .legend { position: fixed; bottom: 20px; left: 20px; z-index: 2000; background: rgba(10,14,26,0.85); backdrop-filter: blur(8px); border-radius: 12px; padding: 10px 16px; color: #e8eef2; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }
        .update-btn { position: fixed; bottom: 20px; right: 20px; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); border-radius: 40px; padding: 10px 22px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; font-family: monospace; }
        .update-btn:hover { background: #28a745; border-color: #28a745; }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 20px; padding: 4px 14px; color: #ccc; font-size: 0.7rem; font-family: monospace; white-space: nowrap; text-align: center; }
        .alert-list-btn { position: fixed; top: 20px; left: 20px; z-index: 2000; background: rgba(220,53,69,0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); border-radius: 40px; padding: 8px 18px; color: white; font-size: 0.9rem; font-weight: bold; cursor: pointer; font-family: monospace; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .alert-list-btn:hover { background: #b02a37; transform: scale(1.02); }
        
        /* Панель линейки */
        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; gap: 12px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px); padding: 8px 16px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tool-btn {
            background: rgba(30,35,50,0.9); border: none; color: white;
            padding: 6px 16px; border-radius: 30px; font-size: 0.85rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace; letter-spacing: 0.5px;
        }
        .tool-btn.active { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .tool-btn:hover { background: #28a745; transform: scale(1.02); }
        .tool-btn.danger { background: #dc3545; }
        .tool-btn.danger:hover { background: #b02a37; }
        
        .ruler-panel {
            position: fixed; top: 80px; left: 20px; z-index: 2100;
            background: rgba(10,14,26,0.95); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 12px 18px; width: 260px;
            border: 1px solid rgba(255,255,255,0.2); display: none;
            flex-direction: column; gap: 10px; font-family: monospace;
        }
        .ruler-panel.show { display: flex; }
        .ruler-panel h4 { margin: 0 0 5px 0; color: #ffc107; font-size: 1rem; }
        .threat-select {
            background: #1a1f2e; color: white; border: 1px solid #555;
            padding: 6px; border-radius: 8px; font-size: 0.8rem;
        }
        .distance-info { background: #00000055; padding: 8px; border-radius: 8px; margin-top: 5px; }
        .distance-info p { margin: 4px 0; font-size: 0.75rem; }
        .time-result { font-size: 1.1rem; font-weight: bold; color: #ffc107; text-align: center; }
        
        .alerts-panel { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: rgba(10,14,26,0.95); backdrop-filter: blur(12px); z-index: 3000; transition: left 0.3s ease; border-right: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; font-family: monospace; box-shadow: 2px 0 20px rgba(0,0,0,0.5); }
        .alerts-panel.open { left: 0; }
        .panel-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); }
        .panel-header h3 { color: #ffc107; font-size: 1.2rem; margin: 0; }
        .panel-actions { display: flex; gap: 12px; }
        .copy-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 1.1rem; cursor: pointer; padding: 4px 10px; border-radius: 20px; transition: 0.2s; font-family: monospace; }
        .copy-btn:hover { background: #28a745; }
        .close-panel { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; line-height: 1; }
        .close-panel:hover { color: #ff6b6b; }
        .panel-content { flex: 1; overflow-y: auto; padding: 12px 8px; }
        .alert-region-item { background: rgba(30,35,50,0.7); margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 4px solid; }
        .alert-region-item.droneAlert { border-left-color: #dc3545; }
        .alert-region-item.rocket { border-left-color: #8B0000; }
        .alert-region-item.droneDanger { border-left-color: #ffc107; }
        .region-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; color: #fff; }
        .alert-type { font-size: 0.8rem; display: inline-block; padding: 2px 8px; border-radius: 20px; }
        .alert-type.droneAlert { background: #dc354520; color: #ff8888; border: 1px solid #dc3545; }
        .alert-type.rocket { background: #8B000030; color: #ffaaaa; border: 1px solid #8B0000; }
        .alert-type.droneDanger { background: #ffc10720; color: #ffc107; border: 1px solid #ffc107; }
        .empty-message { color: #aaa; text-align: center; padding: 30px 20px; font-style: italic; }
        .copy-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; z-index: 4000; font-family: monospace; animation: fadeOut 2s forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid; }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-interactive-off {
            pointer-events: none !important;
        }
        @media (max-width: 600px) {
            .time-main { font-size: 1.2rem; }
            .clock { padding: 4px 12px; top: 10px; right: 10px; }
            .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
            .update-btn { bottom: 10px; right: 10px; padding: 8px 16px; font-size: 0.85rem; }
            .alert-list-btn { top: 10px; left: 10px; padding: 5px 14px; font-size: 0.8rem; }
            .alerts-panel { width: 85%; left: -85%; }
            .copy-btn { font-size: 0.9rem; padding: 2px 8px; }
            .toolbar { top: 70px; padding: 4px 10px; gap: 6px; }
            .tool-btn { padding: 4px 12px; font-size: 0.7rem; }
            .ruler-panel { width: 220px; top: 110px; left: 10px; }
        }
    </style>
</head>
<body>
<div class="clock"><div class="time-main" id="liveTime">--:--</div><div class="date" id="liveDate">--</div></div>
<button class="alert-list-btn" id="openPanelBtn">⚠️ Список тревог</button>

<!-- Панель инструментов линейки -->
<div class="toolbar">
    <button id="rulerBtn" class="tool-btn">📏 Линейка (on/off)</button>
    <button id="clearRulerBtn" class="tool-btn danger">🗑 Сбросить</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Тревога БПЛА (фиксация/ПВО)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #8B0000;"></div> <span>🟤 Ракетная опасность</span></div>
</div>
<button class="update-btn" id="updateBtn">🔄 Обновить</button>
<div class="status" id="status">Загрузка...</div>

<!-- Панель линейки -->
<div id="rulerPanel" class="ruler-panel">
    <h4>📏 Измерение угрозы</h4>
    <select id="threatType" class="threat-select">
        <option value="drone">🛩 Обычный БПЛА (180 км/ч)</option>
        <option value="jet_drone">🚀 Реактивный БПЛА (450 км/ч)</option>
        <option value="cruise">✈️ Крылатая ракета (850 км/ч)</option>
        <option value="ballistic">💥 Баллистическая ракета (9000 км/ч)</option>
    </select>
    <div class="distance-info">
        <p>📏 Расстояние: <span id="distKm">0</span> км</p>
        <p>⏱ Время подлёта:</p>
        <div id="timeResult" class="time-result">—</div>
    </div>
    <small style="font-size:0.65rem; opacity:0.7;">★ Кликните по карте 2 раза — поставьте точки A и B</small>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>
<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header"><h3>🚨 Регионы с тревогами</h3><div class="panel-actions"><button class="copy-btn" id="copyAlertsBtn">📋 Копировать</button><button class="close-panel" id="closePanelBtn">&times;</button></div></div>
    <div class="panel-content" id="panelContent"><div class="empty-message">Нет активных тревог</div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    (function(){
        // ---------------------- КАРТА --------------------------
        const map = L.map('map').setView([62, 105], 3.8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2 }).addTo(map);
        
        // ---------------------- ЛИНЕЙКА --------------------------
        let rulerModeActive = false;
        let points = [];
        let lineLayer = null;
        let markersLayer = null;
        
        const speeds = { drone: 180, jet_drone: 450, cruise: 850, ballistic: 9000 };
        
        function calculateTime(distanceKm, speedKmh) {
            if (distanceKm <= 0) return "0 мин";
            const hours = distanceKm / speedKmh;
            const totalMinutes = hours * 60;
            if (totalMinutes < 1) return "< 1 мин";
            const hrs = Math.floor(totalMinutes / 60);
            const mins = Math.floor(totalMinutes % 60);
            if (hrs > 0) return `${hrs} ч ${mins} мин`;
            return `${mins} мин`;
        }
        
        function updateRulerDisplay() {
            if (points.length < 2) {
                document.getElementById('distKm').innerText = '0';
                document.getElementById('timeResult').innerHTML = '—';
                return;
            }
            const dist = points[0].getLatLng().distanceTo(points[1].getLatLng()) / 1000;
            document.getElementById('distKm').innerText = dist.toFixed(1);
            const threat = document.getElementById('threatType').value;
            const timeStr = calculateTime(dist, speeds[threat]);
            document.getElementById('timeResult').innerHTML = timeStr;
        }
        
        function updateRulerGraphics() {
            if (lineLayer) map.removeLayer(lineLayer);
            if (markersLayer) map.removeLayer(markersLayer);
            if (points.length === 0) return;
            markersLayer = L.layerGroup().addTo(map);
            points.forEach(m => markersLayer.addLayer(m));
            if (points.length === 2) {
                const latlngs = points.map(p => p.getLatLng());
                lineLayer = L.polyline(latlngs, { color: '#ffc107', weight: 4, dashArray: '8, 6' }).addTo(map);
            }
            updateRulerDisplay();
        }
        
        function addRulerPoint(e) {
            if (!rulerModeActive) return;
            if (points.length >= 2) clearRuler();
            const marker = L.marker(e.latlng, {
                draggable: true,
                icon: L.divIcon({ className: 'ruler-marker', html: `<div style="background:#ffc107; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`, iconSize: [12,12] })
            });
            marker.on('dragend', () => { updateRulerGraphics(); });
            points.push(marker);
            updateRulerGraphics();
        }
        
        function clearRuler() {
            if (lineLayer) map.removeLayer(lineLayer);
            if (markersLayer) map.removeLayer(markersLayer);
            points.forEach(m => m.remove());
            points = [];
            lineLayer = null;
            markersLayer = null;
            updateRulerDisplay();
        }
        
        function setRulerMode(active) {
            rulerModeActive = active;
            const rulerBtn = document.getElementById('rulerBtn');
            const panel = document.getElementById('rulerPanel');
            
            if (active) {
                rulerBtn.classList.add('active');
                panel.classList.add('show');
                map.getContainer().style.cursor = 'crosshair';
                // Отключаем клики по полигонам
                if (polygonsLayer) {
                    polygonsLayer.eachLayer(layer => {
                        if (layer._path) layer._path.classList.add('leaflet-interactive-off');
                    });
                }
                map.on('click', addRulerPoint);
            } else {
                rulerBtn.classList.remove('active');
                panel.classList.remove('show');
                map.getContainer().style.cursor = '';
                map.off('click', addRulerPoint);
                // Восстанавливаем клики по полигонам
                if (polygonsLayer) {
                    polygonsLayer.eachLayer(layer => {
                        if (layer._path) layer._path.classList.remove('leaflet-interactive-off');
                    });
                }
                clearRuler();
            }
        }
        
        // ---------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ------------------
        let polygonsLayer = null;
        let regionStatus = {};          // regionStatus[region][channel] = { droneDanger, droneAlert, rocketDanger, explicitCancel }
        let lastPostId = { locatorru: 0, radarrussiia: 0 };
        const channels = [
            { name: 'locatorru', url: 'https://t.me/s/locatorru', rss: true },
            { name: 'radarrussiia', url: 'https://t.me/s/radarrussiia', rss: true }
        ];
        const colors = { clear: "#6c757d", droneDanger: "#ffc107", droneAlert: "#dc3545", rocket: "#8B0000" };
        let lastUpdateTime = null;
        
        // Прокси для CORS (RSS тоже нужен прокси из-за политики)
        const proxies = [
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?",
            "https://cors-anywhere.herokuapp.com/",
            "https://thingproxy.freeboard.io/fetch/"
        ];
        
        // ---------------------- НОРМАЛИЗАЦИЯ ИМЁН РЕГИОНОВ ------------------
        const geoNameMapping = {
            "Чувашская Республика": "Чувашия",
            "Республика Татарстан": "Татарстан",
            "Татарстан": "Республика Татарстан",
            "Республика Крым": "Крым",
            "Республика Башкортостан": "Башкортостан",
            "Башкортостан": "Республика Башкортостан",
            "Удмуртская Республика": "Удмуртия",

            "Карачаево-Черкесская Республика": "Карачаево-Черкесия",
            "Кабардино-Балкарская Республика": "Кабардино-Балкария",
            "Республика Северная Осетия-Алания": "Северная Осетия",
            "Республика Ингушетия": "Ингушетия",
            "Республика Калмыкия": "Калмыкия",
            "Республика Адыгея": "Адыгея",
            "Республика Карелия": "Карелия",
            "Республика Коми": "Коми",
            "Ямало-Ненецкий АО": "Ямало-Ненецкий АО",
            "Ханты-Мансийский АО": "Ханты-Мансийский АО",
            "Ненецкий АО": "Ненецкий АО",
            "Чукотский АО": "Чукотский АО",
            "Еврейская АО": "Еврейская АО",
            "г. Москва": "Московская область",
            "Москва": "Московская область",
            "Санкт-Петербург": "Ленинградская область"
        };
        function normalizeRegionName(geoName) {
            return geoNameMapping[geoName] || geoName;
        }
        
        // Все возможные официальные имена (алиасы для поиска в тексте)
        const regionAliases = {
            "Московская область": ["москва","мск","московская область","подмосковье"],
            "Ленинградская область": ["ленинградская область","ленобласть","спб","санкт-петербург"],
            "Белгородская область": ["белгород","белгородская область","белгородщина"],
            "Брянская область": ["брянск","брянская область","брянщина"],
            "Воронежская область": ["воронеж","воронежская область"],
            "Курская область": ["курск","курская область"],
            "Краснодарский край": ["краснодар","кубань","краснодарский край"],
            "Ростовская область": ["ростов","ростов-на-дону","ростовская область"],
            "Татарстан": ["татарстан","казань"],
            "Крым": ["крым","республика крым"],
            "Калининградская область": ["калининград","калининградская область"],
            "Свердловская область": ["свердловская область","екатеринбург"],
            "Челябинская область": ["челябинск","челябинская область"],
            "Новосибирская область": ["новосибирск","новосибирская область"],
            "Самарская область": ["самара","самарская область"],

            "Волгоградская область": ["волгоград","волгоградская область"],
            "Саратовская область": ["саратов","саратовская область"],

            "Ярославская область": ["ярославль","ярославская область"],
            "Забайкальский край": ["забайкалье","чита"],
            "Камчатский край": ["камчатка","петропавловск-камчатский"],
            "Магаданская область": ["магадан","магаданская область"],
            "Сахалинская область": ["сахалин","южно-сахалинск"],
            "Ханты-Мансийский АО": ["хмао","ханты-мансийск","сургут"],
            "Ямало-Ненецкий АО": ["янао","ямал","новый уренгой"],
            "Чукотский АО": ["чукотка","анадырь"],
            "Еврейская АО": ["еврейская автономная","биробиджан"]
        };
        const allRegionNames = Object.keys(regionAliases);
        
        // ---------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ------------------
        function initialChannelStatus() {
            return { droneDanger: false, droneAlert: false, rocketDanger: false, explicitCancel: false };
        }
        
        async function fetchWithProxy(url, proxyList) {
            for (let proxy of proxyList) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    const proxyUrl = proxy + encodeURIComponent(url);
                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (response.ok) {
                        const text = await response.text();
                        if (text && text.length > 500) return text;
                    }
                } catch(e) { console.warn(`Прокси ${proxy} не сработал`, e); }
            }
            throw new Error("Все прокси недоступны");
        }
        
        // Получение RSS ленты канала
        async function fetchRSS(channelUrl) {
            const rssUrl = channelUrl + '?embed=1&mode=rss';
            const xmlText = await fetchWithProxy(rssUrl, proxies);
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlText, 'text/xml');
            const items = doc.querySelectorAll('item');
            const posts = [];
            for (let item of items) {
                const guid = item.querySelector('guid')?.textContent || '';
                const idMatch = guid.match(/\d+$/);
                if (!idMatch) continue;
                const id = parseInt(idMatch[0]);
                const title = item.querySelector('title')?.textContent || '';
                const description = item.querySelector('description')?.textContent || '';
                const text = (title + ' ' + description).toLowerCase();
                posts.push({ id, text });
            }
            posts.sort((a,b) => a.id - b.id);
            return posts;
        }
        
        function extractRegions(text, allNames) {
            if (/все регионы|по всей россии|всех регионах|везде|повсеместно|во всех регионах/i.test(text)) {
                return allNames.slice();
            }
            const found = new Set();
            for (const [official, keywords] of Object.entries(regionAliases)) {
                if (keywords.some(kw => text.includes(kw))) {
                    found.add(official);
                }
            }
            return Array.from(found);
        }
        
        function classifyEvent(text) {
            const lower = text;
            // Расширенные шаблоны глобального отбоя БПЛА
            const isGlobalDroneCancel = /отбой.*бпла.*(всех|всех ранее|всех регионах|везде|повсеместно)/i.test(lower) ||
                                        /снята угроза бпла во всех регионах/i.test(lower) ||
                                        /опасность бпла отменена повсеместно/i.test(lower);
            if (isGlobalDroneCancel) return { type: 'globalCancelDrone' };
            
            const isRocket = /ракетн(?:ая|ую|ой|ая)\s*(?:опасность|тревога)|баллистическ(?:ая|ую)|крылат(?:ая|ую)/i.test(lower);
            const isDroneDanger = /бпла|беспилотн(?:ик|ый|ая)|опасность\s*бпла|угроза\s*бпла/i.test(lower);
            const isFixation = /фиксаци[яи]|работа\s*пво|пво\s*работает|заходит группа|сбитие|тревога\s*бпла/i.test(lower);
            const isCancel = /отбой|снят[ао]|завершен[ао]|отменен[ао]|нет\s*угрозы|угроза\s*снят[ао]/i.test(lower);
            
            if (isCancel) {
                const cancelRocket = /отбой\s*ракетн|снят[ао]\s*ракетн|ракетн(?:ая|ую)\s*опасность\s*отменен/i.test(lower);
                const cancelDrone = /отбой\s*бпла|снят[ао]\s*бпла|отбой\s*опасности\s*бпла/i.test(lower);
                if (cancelRocket) return { type: 'cancel', danger: 'rocket' };
                if (cancelDrone) return { type: 'cancel', danger: 'drone' };
                return { type: 'cancel', danger: 'both' };
            }
            
            if (isRocket) return { type: 'alert', danger: 'rocket' };
            // Тревога БПЛА (фиксация/ПВО) должна включать и опасность, и тревогу
            if (isFixation) return { type: 'droneAlert' };
            if (isDroneDanger) return { type: 'alert', danger: 'drone' };
            return null;
        }
        
        function applyEvent(regions, event, channelStatus, channelName) {
            if (event.type === 'globalCancelDrone') {
                for (const reg of allRegionNames) {
                    if (!channelStatus[reg]) channelStatus[reg] = initialChannelStatus();
                    channelStatus[reg].droneDanger = false;
                    channelStatus[reg].droneAlert = false;
                    channelStatus[reg].explicitCancel = true;
                }
                return;
            }
            if (event.type === 'cancel') {
                for (const reg of regions) {
                    if (!channelStatus[reg]) channelStatus[reg] = initialChannelStatus();
                    if (event.danger === 'rocket') channelStatus[reg].rocketDanger = false;
                    if (event.danger === 'drone') {
                        channelStatus[reg].droneDanger = false;
                        channelStatus[reg].droneAlert = false;
                    }
                    if (event.danger === 'both') {
                        channelStatus[reg].rocketDanger = false;
                        channelStatus[reg].droneDanger = false;
                        channelStatus[reg].droneAlert = false;
                    }
                    channelStatus[reg].explicitCancel = true;
                }
                return;
            }
            // Обычное оповещение или тревога БПЛА
            for (const reg of regions) {
                if (!channelStatus[reg]) channelStatus[reg] = initialChannelStatus();
                // Любое новое оповещение снимает флаг явного отбоя
                channelStatus[reg].explicitCancel = false;
                if (event.type === 'alert') {
                    if (event.danger === 'rocket') channelStatus[reg].rocketDanger = true;
                    if (event.danger === 'drone') channelStatus[reg].droneDanger = true;
                }
                if (event.type === 'droneAlert') {
                    channelStatus[reg].droneDanger = true;
                    channelStatus[reg].droneAlert = true;
                }
            }
        }
        
        // Вычисление итогового статуса по каналам с учётом explicitCancel
        function getEffectiveStatus(regionObj) {
            let hasRocket = false, hasDroneAlert = false, hasDroneDanger = false;
            let hasExplicitCancel = false;
            for (const chanStatus of Object.values(regionObj)) {
                if (chanStatus.rocketDanger) hasRocket = true;
                if (chanStatus.droneAlert) hasDroneAlert = true;
                if (chanStatus.droneDanger) hasDroneDanger = true;
                if (chanStatus.explicitCancel) hasExplicitCancel = true;
            }
            // Конфликт: есть тревога и явный отбой хотя бы от одного канала -> отбой
            if (hasExplicitCancel && (hasRocket || hasDroneAlert || hasDroneDanger)) {
                return { rocketDanger: false, droneAlert: false, droneDanger: false };
            }
            return { rocketDanger: hasRocket, droneAlert: hasDroneAlert, droneDanger: hasDroneDanger };
        }
        
        // ---------------------- ОБНОВЛЕНИЕ КАРТЫ И ПОПАПОВ ------------------
        function updateMapAndPanel() {
            if (!polygonsLayer) return;
            polygonsLayer.eachLayer(layer => {
                const geoName = layer.regionName;
                if (!geoName) return;
                const normName = normalizeRegionName(geoName);
                const regObj = regionStatus[normName];
                if (regObj) {
                    const effective = getEffectiveStatus(regObj);
                    layer.setStyle({ fillColor: getFillColor(effective), fillOpacity: 0.7 });
                    const popup = layer.getPopup();
                    if (popup) popup.setContent(getPopupContent(normName, effective));
                } else {
                    // регион есть в GeoJSON, но нет в алиасах – оставляем серым
                    layer.setStyle({ fillColor: colors.clear, fillOpacity: 0.7 });
                }
            });
            updateAlertsPanel();
        }
        
        function getFillColor(effective) {
            if (effective.rocketDanger) return colors.rocket;
            if (effective.droneAlert) return colors.droneAlert;
            if (effective.droneDanger) return colors.droneDanger;
            return colors.clear;
        }
        
        function getPopupContent(regionName, effective) {
            let text = "", color = "";
            if (effective.rocketDanger) { text = "🟤 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; color = "#ffaaaa"; }
            else if (effective.droneAlert) { text = "🔴 ТРЕВОГА БПЛА! Фиксация / Работа ПВО"; color = "#ff8888"; }
            else if (effective.droneDanger) { text = "🟡 Опасность БПЛА в регионе"; color = "#ffc107"; }
            else { text = "⚪ Отбой / Спокойно"; color = "#adb5bd"; }
            return `<div style="font-family:'Segoe UI';min-width:160px;"><b>${regionName}</b><br><span style="color:${color}">${text}</span></div>`;
        }
        
        function updateAlertsPanel() {
            const panelDiv = document.getElementById('panelContent');
            const active = [];
            for (const [region, chanObj] of Object.entries(regionStatus)) {
                const eff = getEffectiveStatus(chanObj);
                if (eff.rocketDanger) active.push({ name: region, type: 'rocket', label: '🟤 Ракетная опасность', priority: 1 });
                else if (eff.droneAlert) active.push({ name: region, type: 'droneAlert', label: '🔴 Тревога БПЛА (фиксация/ПВО)', priority: 2 });
                else if (eff.droneDanger) active.push({ name: region, type: 'droneDanger', label: '🟡 Опасность БПЛА', priority: 3 });
            }
            if (active.length === 0) {
                panelDiv.innerHTML = '<div class="empty-message">✨ Нет активных тревог</div>';
                return;
            }
            active.sort((a,b) => a.priority - b.priority);
            panelDiv.innerHTML = active.map(r => `
                <div class="alert-region-item ${r.type}">
                    <div class="region-name">${r.name}</div>
                    <div class="alert-type ${r.type}">${r.label}</div>
                </div>
            `).join('');
        }
        
        // ---------------------- КОПИРОВАНИЕ СПИСКА ------------------
        function getCurrentDateTimeString() {
            const now = new Date();
            return `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        }
        async function copyAlertsList() {
            const active = [];
            for (const [region, chanObj] of Object.entries(regionStatus)) {
                const eff = getEffectiveStatus(chanObj);
                if (eff.rocketDanger) active.push({ name: region, label: '🟤 Ракетная опасность', priority: 1 });
                else if (eff.droneAlert) active.push({ name: region, label: '🔴 Тревога БПЛА (фиксация/работа ПВО)', priority: 2 });
                else if (eff.droneDanger) active.push({ name: region, label: '🟡 Опасность БПЛА', priority: 3 });
            }
            if (active.length === 0) { showToast("✨ Нет активных тревог"); return; }
            active.sort((a,b) => a.priority - b.priority);
            const lines = active.map(a => `${a.label}: ${a.name}`);
            const text = `📅 Активные тревоги на ${getCurrentDateTimeString()}\n${lines.join('\n')}`;
            try { await navigator.clipboard.writeText(text); showToast(`📋 Скопировано ${active.length} тревог`); }
            catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(`📋 Скопировано ${active.length} тревог`); }
        }
        function showToast(msg) {
            const old = document.querySelector('.copy-toast');
            if (old) old.remove();
            const toast = document.createElement('div'); toast.className = 'copy-toast'; toast.textContent = msg;
            document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000);
        }
        
        // ---------------------- ИНКРЕМЕНТАЛЬНОЕ ОБНОВЛЕНИЕ ------------------
        async function refreshAlerts() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔄 Обновление...';
            try {
                // Создаём новую пустую структуру regionStatus (но сохраняем существующие данные для not-fallbacks?)
                // Но мы будем обновлять инкрементально, поэтому сначала копируем старые статусы, но сбрасываем explicitCancel?
                // Лучше: загружаем для каждого канала новые посты и обновляем channelStatus.
                // Для начала копируем старые статусы (глубокое копирование)
                let newRegionStatus = JSON.parse(JSON.stringify(regionStatus));
                for (const ch of channels) {
                    try {
                        const posts = await fetchRSS(ch.url);
                        if (posts.length === 0) continue;
                        const savedId = lastPostId[ch.name] || 0;
                        const newPosts = posts.filter(p => p.id > savedId);
                        if (newPosts.length === 0) continue;
                        lastPostId[ch.name] = posts[posts.length-1].id;
                        // Создаём временный объект статусов для этого канала на основе текущего состояния
                        let channelStatus = {};
                        for (const reg of allRegionNames) {
                            channelStatus[reg] = newRegionStatus[reg]?.[ch.name] ? JSON.parse(JSON.stringify(newRegionStatus[reg][ch.name])) : initialChannelStatus();
                        }
                        // Применяем новые посты
                        for (const post of newPosts) {
                            const regions = extractRegions(post.text, allRegionNames);
                            const event = classifyEvent(post.text);
                            if (!event) continue;
                            if (event.type === 'globalCancelDrone') {
                                applyEvent([], event, channelStatus, ch.name);
                                console.log(`[${ch.name}] Глобальный отбой БПЛА`);
                            } else {
                                if (regions.length === 0) continue;
                                applyEvent(regions, event, channelStatus, ch.name);
                                console.log(`[${ch.name}] Пост ${post.id}: ${JSON.stringify(event)} для [${regions.join(',')}]`);
                            }
                        }
                        // Сохраняем обновлённые статусы канала в новую общую структуру
                        for (const reg of allRegionNames) {
                            if (!newRegionStatus[reg]) newRegionStatus[reg] = {};
                            newRegionStatus[reg][ch.name] = channelStatus[reg];
                        }
                    } catch(e) {
                        console.warn(`Ошибка при обработке канала ${ch.name}:`, e);
                    }
                }
                regionStatus = newRegionStatus;
                updateMapAndPanel();
                lastUpdateTime = new Date();
                localStorage.setItem('regionStatus', JSON.stringify(regionStatus));
                localStorage.setItem('lastPostId', JSON.stringify(lastPostId));
                statusDiv.innerHTML = `✅ Готово (${lastUpdateTime.toLocaleTimeString()})`;
                setTimeout(() => { if (statusDiv.innerHTML.startsWith('✅')) statusDiv.innerHTML = `Актуально на ${lastUpdateTime.toLocaleTimeString()}`; }, 3000);
            } catch(err) {
                console.error(err);
                statusDiv.innerHTML = `⚠️ Ошибка${lastUpdateTime ? ` (последнее ${lastUpdateTime.toLocaleTimeString()})` : ''}`;
                setTimeout(() => { if (statusDiv.innerHTML.includes('⚠️')) statusDiv.innerHTML = lastUpdateTime ? `Актуально на ${lastUpdateTime.toLocaleTimeString()}` : 'Повторите'; }, 3000);
            }
        }
        
        // ---------------------- ЗАГРУЗКА ГЕОДАННЫХ ------------------
        function loadPolygons() {
            const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
            const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
            fetch(url).then(r => r.ok ? r.json() : Promise.reject()).then(data => applyPolygons(data))
                .catch(() => fetch(fallback).then(r => r.json()).then(data => applyPolygons(data)).catch(e => console.warn("Границы не загружены", e)));
        }
        
        function applyPolygons(geoData) {
            if (polygonsLayer) map.removeLayer(polygonsLayer);
            polygonsLayer = L.geoJSON(geoData, {
                style: () => ({ color: "#fff", weight: 2.2, fillColor: colors.clear, fillOpacity: 0.7, smoothFactor: 0.5 }),
                onEachFeature: (f, layer) => {
                    let name = f.properties?.name || f.properties?.NAME || f.properties?.admin_name || "";
                    if (name) {
                        const norm = normalizeRegionName(name);
                        layer.regionName = norm;
                        if (!regionStatus[norm]) {
                            regionStatus[norm] = {};
                            for (const ch of channels) regionStatus[norm][ch.name] = initialChannelStatus();
                        }
                        const effective = getEffectiveStatus(regionStatus[norm]);
                        layer.bindPopup(getPopupContent(norm, effective), { className: 'custom-popup' });
                    }
                }
            }).addTo(map);
            // Центрируем карту по границам загруженных данных
            try {
                map.fitBounds(polygonsLayer.getBounds());
            } catch(e) { map.setView([62, 105], 3.8); }
            document.getElementById('status').innerHTML = 'Границы загружены';
            updateMapAndPanel();
        }
        
        // ---------------------- ЧАСЫ И ИНИЦИАЛИЗАЦИЯ ------------------
        function updateClock() {
            const now = new Date();
            document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' });
            document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru', { day:'numeric', month:'long', weekday:'long' });
        }
        updateClock(); setInterval(updateClock, 60000);
        
        // Восстановление кэша
        const savedStatus = localStorage.getItem('regionStatus');
        if (savedStatus) {
            try {
                const parsed = JSON.parse(savedStatus);
                for (let reg in parsed) {
                    if (!regionStatus[reg]) regionStatus[reg] = {};
                    for (let ch in parsed[reg]) {
                        regionStatus[reg][ch] = parsed[reg][ch];
                    }
                }
            } catch(e) {}
        }
        const savedIds = localStorage.getItem('lastPostId');
        if (savedIds) { try { const p = JSON.parse(savedIds); if (p.locatorru) lastPostId.locatorru = p.locatorru; if (p.radarrussiia) lastPostId.radarrussiia = p.radarrussiia; } catch(e){} }
        
        loadPolygons();
        setTimeout(() => {
            refreshAlerts();
            setInterval(refreshAlerts, 45000);
        }, 2000);
        
        document.getElementById('updateBtn').addEventListener('click', () => refreshAlerts());
        document.getElementById('rulerBtn').addEventListener('click', () => setRulerMode(!rulerModeActive));
        document.getElementById('clearRulerBtn').addEventListener('click', () => clearRuler());
        document.getElementById('threatType').addEventListener('change', () => updateRulerDisplay());
        
        const panel = document.getElementById('alertsPanel');
        document.getElementById('openPanelBtn').addEventListener('click', () => { panel.classList.add('open'); updateAlertsPanel(); });
        document.getElementById('closePanelBtn').addEventListener('click', () => panel.classList.remove('open'));
        document.getElementById('copyAlertsBtn').addEventListener('click', () => copyAlertsList());
        document.addEventListener('click', (e) => { if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== document.getElementById('openPanelBtn')) panel.classList.remove('open'); });
        window.addEventListener('resize', () => map.invalidateSize());
    })();
</script>
