<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — locatorru</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .clock {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 8px 18px; color: #e8eef2;
            font-family: 'JetBrains Mono', monospace; text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }
        .legend {
            position: fixed; bottom: 20px; left: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 12px; padding: 10px 16px; color: #e8eef2;
            font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 6px; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }
        .update-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 10px 22px; color: white; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace; letter-spacing: 0.5px;
        }
        .update-btn:hover { background: #28a745; border-color: #28a745; transform: scale(1.02); }
        .status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 4px 14px; color: #ccc;
            font-size: 0.7rem; font-family: monospace; white-space: nowrap;
        }
        .alerts-panel {
            position: fixed; top: 20px; left: 20px; z-index: 2100;
            background: rgba(10,14,26,0.92); backdrop-filter: blur(12px);
            border-radius: 16px;
            color: #e8eef2; border: 1px solid rgba(255,255,255,0.2);
            width: 280px;
            max-width: calc(100% - 40px);
            transition: all 0.2s ease;
            font-family: 'Segoe UI', monospace;
            font-size: 0.85rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: auto;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
            border-radius: 16px;
            transition: background 0.1s;
        }
        .panel-header:hover { background: rgba(255,255,255,0.05); }
        .panel-header h3 { font-size: 0.9rem; margin: 0; display: flex; align-items: baseline; gap: 6px; }
        .toggle-icon { font-size: 1.2rem; transition: transform 0.2s; width: 24px; text-align: center; }
        .panel-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            padding: 0 16px;
        }
        .panel-content.open {
            max-height: 60vh;
            overflow-y: auto;
            padding: 0 16px 12px 16px;
        }
        .alert-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.8rem;
        }
        .alert-level-badge {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .alert-region { flex-grow: 1; font-weight: 500; }
        .alert-desc { font-size: 0.7rem; opacity: 0.8; }
        .no-alerts { text-align: center; padding: 12px 5px; color: #aaa; font-style: italic; }
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid;
        }
        .leaflet-control-attribution { display: none !important; }
        @media (max-width: 600px) {
            .time-main { font-size: 1.2rem; }
            .clock { padding: 4px 12px; top: 10px; right: 10px; }
            .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
            .legend-color { width: 20px; height: 14px; }
            .update-btn { bottom: 10px; right: 10px; padding: 8px 16px; font-size: 0.85rem; }
            .status { bottom: 10px; font-size: 0.6rem; }
            .alerts-panel { top: 10px; left: 10px; width: calc(100% - 20px); max-width: 280px; }
        }
    </style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="alerts-panel" id="alertsPanel">
    <div class="panel-header" id="panelHeader">
        <h3>⚠️ Активные угрозы <span id="alertsCount"></span></h3>
        <div class="toggle-icon" id="toggleIcon">▼</div>
    </div>
    <div class="panel-content" id="panelContent">
        <div id="alertsList">Загрузка...</div>
    </div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #2ecc71;"></div> <span>🟢 Внимание</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Фиксация</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #8B4513;"></div> <span>🏴‍☠️ Ракетная опасность</span></div>
</div>
<button class="update-btn" id="updateBtn">🔄 Обновить</button>
<div class="status" id="status">Загрузка...</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ===========================================
    // 1. КАРТА
    // ===========================================
    const map = L.map('map').setView([61, 95], 4.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    }).addTo(map);

    // ===========================================
    // 2. ЦВЕТА (приоритет по возрастанию: 1–4)
    // ===========================================
    const colorsMap = {
        1: "#2ecc71",   // внимание
        2: "#ffc107",   // опасность БПЛА
        3: "#dc3545",   // фиксация
        4: "#8B4513"    // ракетная
    };
    
    // Структура хранения активных тревог для каждого региона
    let regionThreats = {}; // { "Регион": { rocket: bool, fixation: bool, drone: bool, attention: bool } }
    let polygonsLayer = null;   // слой с границами регионов

    // ===========================================
    // 3. ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock();
    setInterval(updateClock, 60000);

    function formatName(name) {
        if (!name) return '';
        const parts = name.split(' ');
        if (parts.length === 1) return parts[0];
        return parts[0] + '<br>' + parts.slice(1).join(' ');
    }

    // Получить итоговый уровень для региона (наивысший приоритет)
    function getRegionLevel(region) {
        const t = regionThreats[region];
        if (!t) return 0;
        if (t.rocket) return 4;
        if (t.fixation) return 3;
        if (t.drone) return 2;
        if (t.attention) return 1;
        return 0;
    }

    // ===========================================
    // 4. БОКОВАЯ ПАНЕЛЬ (список активных угроз)
    // ===========================================
    const threatNames = { rocket: "Ракетная опасность", fixation: "Фиксация", drone: "Опасность БПЛА", attention: "Внимание" };
    function updateSidebar() {
        const container = document.getElementById('alertsList');
        const countSpan = document.getElementById('alertsCount');
        const activeList = [];
        for (const [region, threats] of Object.entries(regionThreats)) {
            const level = getRegionLevel(region);
            if (level > 0) {
                activeList.push({ region, level, threats });
            }
        }
        activeList.sort((a,b) => b.level - a.level);
        countSpan.innerText = activeList.length ? `(${activeList.length})` : '';
        if (activeList.length === 0) {
            container.innerHTML = '<div class="no-alerts">✨ Нет активных тревог</div>';
            return;
        }
        let html = '';
        for (const item of activeList) {
            let threatText = '';
            if (item.threats.rocket) threatText = "Ракетная";
            else if (item.threats.fixation) threatText = "Фиксация";
            else if (item.threats.drone) threatText = "БПЛА";
            else if (item.threats.attention) threatText = "Внимание";
            html += `
                <div class="alert-item">
                    <div class="alert-level-badge" style="background: ${colorsMap[item.level]};"></div>
                    <div class="alert-region">${item.region}</div>
                    <div class="alert-desc">${threatText}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // Получить содержимое всплывающего окна для региона
    function getPopupContent(regionName) {
        const level = getRegionLevel(regionName);
        const formatted = formatName(regionName);
        let text = "", color = "";
        if (level === 0) { text = "⚪ Отбой / Спокойно"; color = "#adb5bd"; }
        else if (level === 1) { text = "🟢 Внимание"; color = "#2ecc71"; }
        else if (level === 2) { text = "🟡 Опасность БПЛА"; color = "#ffc107"; }
        else if (level === 3) { text = "🔴 Фиксация"; color = "#ff8888"; }
        else { text = "🏴‍☠️ РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; color = "#c47e3a"; }
        return `<div style="font-family:'Segoe UI';min-width:140px;"><b style="font-size:1rem;">${formatted}</b><br><span style="color:${color}">${text}</span></div>`;
    }

    // Обновление стилей полигонов (цвет заливки)
    function updatePolygons() {
        if (!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const name = layer.regionName;
            if (name) {
                const level = getRegionLevel(name);
                const fill = colorsMap[level] || "#6c757d";
                layer.setStyle({ fillColor: fill, fillOpacity: 0.7 });
                if (layer.getPopup()) {
                    layer.getPopup().setContent(getPopupContent(name));
                }
            }
        });
        updateSidebar();
    }

    // ===========================================
    // 5. СИНОНИМЫ РЕГИОНОВ (расширенный, с Астраханской областью)
    // ===========================================
    const regionAliases = {
        "Московская область": ["московская область","подмосковье","мо обл","московской обл","московская обл"],
        "Санкт-Петербург": ["санкт-петербург","питер","спб","ленинград"],
        "Ленинградская область": ["ленинградская область","ленобласть","ленинградской обл"],
        "Белгородская область": ["белгород","белгородская область","белгородской обл"],
        "Брянская область": ["брянск","брянская область","брянской обл"],
        "Воронежская область": ["воронеж","воронежская область","воронежской обл"],
        "Курская область": ["курск","курская область","курской обл"],
        "Краснодарский край": ["краснодар","кубань","краснодарский край","краснодарского края"],
        "Ростовская область": ["ростов","ростов-на-дону","ростовская область","ростовской обл"],
        "Астраханская область": ["астрахань","астраханская область","астраханской обл"],
        "Татарстан": ["татарстан","казань","республика татарстан"],
        "Республика Крым": ["крым","республика крым","крыму"],
        "Калининградская область": ["калининград","калининградская область","калининградской обл"],
        "Свердловская область": ["свердловская область","екатеринбург","свердловской обл"],
        "Челябинская область": ["челябинск","челябинская область","челябинской обл"],
        "Новосибирская область": ["новосибирск","новосибирская область","новосибирской обл"],
        "Самарская область": ["самара","самарская область","самарской обл"],
        "Нижегородская область": ["нижний новгород","нижегородская область","нижегородской обл"],
        "Волгоградская область": ["волгоград","волгоградская область","волгоградской обл"],
        "Саратовская область": ["саратов","саратовская область","саратовской обл"],
        "Пермский край": ["пермь","пермский край","пермского края"],
        "Омская область": ["омск","омская область","омской обл"],
        "Томская область": ["томск","томская область","томской обл"],
        "Кемеровская область": ["кемерово","кемеровская область","кузбасс"],
        "Иркутская область": ["иркутск","иркутская область","иркутской обл"],
        "Красноярский край": ["красноярск","красноярский край","красноярского края"],
        "Алтайский край": ["барнаул","алтайский край","алтайского края"],
        "Приморский край": ["владивосток","приморский край","приморья"],
        "Хабаровский край": ["хабаровск","хабаровский край"],
        "Амурская область": ["амурская область","благовещенск","амурской обл"],
        "Архангельская область": ["архангельск","архангельская область"],
        "Мурманская область": ["мурманск","мурманская область"],
        "Республика Карелия": ["карелия","петрозаводск"],
        "Республика Коми": ["коми","сыктывкар"],
        "Ханты-Мансийский АО": ["хмао","ханты-мансийск","сургут"],
        "Ямало-Ненецкий АО": ["янао","ямал","новый уренгой"],
        "Чеченская Республика": ["чечня","грозный","чеченская республика"],
        "Дагестан": ["дагестан","махачкала"],
        "Башкортостан": ["башкортостан","уфа","республика башкортостан"],
        "Удмуртская Республика": ["удмуртия","ижевск"],
        "Чувашия": ["чувашия","чебоксары"],
        "Марий Эл": ["марий эл","йошкар-ола"],
        "Республика Мордовия": ["мордовия","саранск"],
        "Кировская область": ["киров","кировская область"],
        "Ульяновская область": ["ульяновск","ульяновская область"],
        "Пензенская область": ["пенза","пензенская область"],
        "Тамбовская область": ["тамбов","тамбовская область"],
        "Рязанская область": ["рязань","рязанская область"],
        "Тульская область": ["тула","тульская область"],
        "Калужская область": ["калуга","калужская область"],
        "Смоленская область": ["смоленск","смоленская область"],
        "Тверская область": ["тверь","тверская область"],
        "Владимирская область": ["владимир","владимирская область"],
        "Ивановская область": ["иваново","ивановская область"],
        "Костромская область": ["кострома","костромская область"],
        "Орловская область": ["орел","орловская область"],
        "Липецкая область": ["липецк","липецкая область"],
        "Псковская область": ["псков","псковская область"],
        "Новгородская область": ["новгород","великий новгород","новгородская область"],
        "Ярославская область": ["ярославль","ярославская область"],
        "Забайкальский край": ["забайкалье","чита","забайкальский край"],
        "Камчатский край": ["камчатка","петропавловск-камчатский"],
        "Магаданская область": ["магадан","магаданская область"],
        "Сахалинская область": ["сахалин","южно-сахалинск"],
        "Еврейская АО": ["еврейская автономная","биробиджан"],
        "Чукотский АО": ["чукотка","анадырь"]
    };

    // ===========================================
    // 6. ПАРСИНГ TELEGRAM С ПОДДЕРЖКОЙ НЕЗАВИСИМЫХ ТИПОВ УГРОЗ
    // ===========================================
    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://cors-anywhere.herokuapp.com/",
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
    ];
    const channel = "https://t.me/s/locatorru";
    const fallbackChannel = "https://t.me/s/radarrussiia";

    async function fetchWithProxy(url, proxyList) {
        for (let proxy of proxyList) {
            try {
                const proxyUrl = proxy + encodeURIComponent(url);
                const response = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
                if (response.ok) {
                    const text = await response.text();
                    if (text && text.length > 2000) return text;
                }
            } catch (e) { console.warn(`Прокси ${proxy} не сработал`, e); }
        }
        throw new Error("Все прокси недоступны");
    }

    function getCancelType(text) {
        if (/(ракетная опасность|ракетная тревога|ракетную опасность).*?(отбой|снята|отменена)/i.test(text)) return "rocket";
        if (/(фиксация|зафиксирована).*?(отбой|снята)/i.test(text)) return "fixation";
        if (/(бпла|беспилот|дрон).*?(отбой|снята|отменена)/i.test(text)) return "drone";
        if (/(внимание|угроза).*?(отбой|снята)/i.test(text)) return "attention";
        return null;
    }

    function isGlobalClear(text) {
        const patterns = [
            /отбой опасности бпла по всем ранее регионам/i,
            /отбой по всем регионам/i,
            /все тревоги сняты/i,
            /снятие всех тревог/i,
            /глобальный отбой/i,
            /полная отмена тревог/i,
            /все угрозы сняты/i,
            /отбой для всех регионов/i
        ];
        return patterns.some(p => p.test(text));
    }

    async function parseTelegramAlerts() {
        let html = null;
        try {
            html = await fetchWithProxy(channel, proxies);
        } catch(e) {
            console.warn("Основной канал не загрузился, пробуем резервный");
            html = await fetchWithProxy(fallbackChannel, proxies);
        }
        if (!html) return {};

        const regex = /data-post="(?:locatorru|radarrussiia|radaryral)\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
        let posts = [];
        let m;
        while ((m = regex.exec(html)) !== null) {
            posts.push({
                id: parseInt(m[1]),
                text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
            });
        }
        posts.sort((a,b) => a.id - b.id);
        const fresh = posts.slice(-60);
        console.log(`Постов получено: ${posts.length}, анализируем ${fresh.length}`);

        let newThreats = JSON.parse(JSON.stringify(regionThreats));

        for (const post of fresh) {
            let text = post.text.replace(/\s+/g, ' ').trim();
            if (isGlobalClear(text)) {
                console.log("Глобальный отбой! Сброс всех тревог.");
                newThreats = {};
                continue;
            }

            let matchedRegions = [];
            for (const [official, keys] of Object.entries(regionAliases)) {
                if (keys.some(kw => text.includes(kw))) {
                    matchedRegions.push(official);
                }
            }
            if (matchedRegions.length === 0) continue;

            const cancelType = getCancelType(text);
            if (cancelType) {
                for (const reg of matchedRegions) {
                    if (!newThreats[reg]) newThreats[reg] = { rocket: false, fixation: false, drone: false, attention: false };
                    newThreats[reg][cancelType] = false;
                }
                continue;
            }

            const isRocket = /ракетная опасность|ракетная тревога|баллистическая ракета|крылатая ракета|авиационная ракетная опасность/i.test(text);
            const isFixation = /\bфиксация\b|\bзафиксирована\b|\bзафиксирован\b/i.test(text);
            const isDrone = /\bбпла?\b|беспилот|дрон|опасность по бпла|атака бпла/i.test(text);
            const isAttention = /внимание|угроза бпла|внимание! бпла/i.test(text);

            let threatType = null;
            if (isRocket) threatType = "rocket";
            else if (isFixation) threatType = "fixation";
            else if (isDrone) threatType = "drone";
            else if (isAttention) threatType = "attention";
            else continue;

            for (const reg of matchedRegions) {
                if (!newThreats[reg]) newThreats[reg] = { rocket: false, fixation: false, drone: false, attention: false };
                newThreats[reg][threatType] = true;
            }
        }
        return newThreats;
    }

    // ===========================================
    // 7. ОБНОВЛЕНИЕ ТРЕВОГ
    // ===========================================
    async function refreshAlerts() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '🔄 Обновление...';
        try {
            const newThreats = await parseTelegramAlerts();
            let changed = false;
            const allRegions = new Set([...Object.keys(regionThreats), ...Object.keys(newThreats)]);
            for (const reg of allRegions) {
                const old = regionThreats[reg] || { rocket: false, fixation: false, drone: false, attention: false };
                const newT = newThreats[reg] || { rocket: false, fixation: false, drone: false, attention: false };
                if (old.rocket !== newT.rocket || old.fixation !== newT.fixation || old.drone !== newT.drone || old.attention !== newT.attention) {
                    changed = true;
                    break;
                }
            }
            if (changed) {
                regionThreats = newThreats;
                updatePolygons();
                updateSidebar();
                localStorage.setItem("alertCache", JSON.stringify(regionThreats));
                statusDiv.innerHTML = '✅ Готово';
                setTimeout(() => { if (statusDiv.innerHTML === '✅ Готово') statusDiv.innerHTML = 'Актуально'; }, 1500);
            } else {
                statusDiv.innerHTML = 'Без изменений';
                setTimeout(() => { if (statusDiv.innerHTML === 'Без изменений') statusDiv.innerHTML = 'Актуально'; }, 1000);
            }
        } catch(err) {
            console.error(err);
            statusDiv.innerHTML = '⚠️ Ошибка';
            setTimeout(() => { if (statusDiv.innerHTML === '⚠️ Ошибка') statusDiv.innerHTML = 'Повторите'; }, 2000);
        }
    }

    // ===========================================
    // 8. ЗАГРУЗКА ГРАНИЦ (полигонов) — основной слой, без кругов
    // ===========================================
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url)
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(data => applyPolygons(data))
            .catch(() => fetch(fallback).then(res => res.json()).then(data => applyPolygons(data)).catch(e => console.warn("Границы не загружены", e)));
    }

    function applyPolygons(geoData) {
        if (polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                const level = getRegionLevel(name);
                const fill = colorsMap[level] || "#6c757d";
                return { color: "#fff", weight: 2.2, fillColor: fill, fillOpacity: 0.7, smoothFactor: 0.5 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || f.properties?.admin_name || "";
                if (name) {
                    layer.regionName = name;
                    layer.bindPopup(getPopupContent(name), { className: 'custom-popup' });
                }
            }
        }).addTo(map);
        document.getElementById('status').innerHTML = 'Границы загружены';
        setTimeout(() => map.invalidateSize(), 100);
        updateSidebar();
    }

    // ===========================================
    // 9. ПАНЕЛЬ (раскрывающаяся)
    // ===========================================
    const panelContent = document.getElementById('panelContent');
    const toggleIcon = document.getElementById('toggleIcon');
    let isOpen = false;
    function togglePanel() {
        isOpen = !isOpen;
        if (isOpen) {
            panelContent.classList.add('open');
            toggleIcon.innerHTML = '▲';
        } else {
            panelContent.classList.remove('open');
            toggleIcon.innerHTML = '▼';
        }
    }
    document.getElementById('panelHeader').addEventListener('click', togglePanel);

    // ===========================================
    // 10. СТАРТ
    // ===========================================
    // Загружаем кэш, если есть
    const cached = localStorage.getItem("alertCache");
    if (cached) {
        try {
            const parsed = JSON.parse(cached);
            if (typeof parsed === 'object' && parsed !== null) {
                regionThreats = parsed;
            }
        } catch(e) {}
    }
    // Сначала загружаем границы, потом запускаем обновление тревог
    loadPolygons();
    setTimeout(() => {
        refreshAlerts();
        setInterval(refreshAlerts, 30000);
    }, 1000);
    
    document.getElementById('updateBtn').addEventListener('click', () => refreshAlerts());
    window.addEventListener('resize', () => map.invalidateSize());
    setTimeout(() => map.invalidateSize(), 200);
    map.on('zoomend', () => { if (map.getZoom() > 7) map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 }); });
</script>
</body>
