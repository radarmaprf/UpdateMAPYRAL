<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Alert Map - Все регионы РФ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0e1a;
        font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
        overflow: hidden;
    }

    .clock {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 10px 20px;
        color: #e8eef2;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .time-main {
        font-size: 2rem;
        font-weight: 600;
        line-height: 1;
    }

    .date {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 18px;
        color: #e8eef2;
        font-size: 0.8rem;
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .legend-color {
        width: 28px;
        height: 18px;
        border-radius: 4px;
    }

    .status-badge {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(8px);
        border-radius: 30px;
        padding: 6px 16px;
        color: #0f0;
        font-size: 0.7rem;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        pointer-events: none;
    }

    .custom-popup .leaflet-popup-content-wrapper {
        background: #1a1f2e;
        color: #e8eef2;
        border-radius: 12px;
        border-left: 4px solid;
    }

    .leaflet-control-attribution {
        display: none !important;
    }

    .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3000;
        background: rgba(0,0,0,0.95);
        padding: 20px 30px;
        border-radius: 12px;
        color: white;
        text-align: center;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .loader-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .time-main { font-size: 1.2rem; }
        .clock { padding: 5px 12px; top: 10px; right: 10px; }
        .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
        .legend-color { width: 20px; height: 14px; }
        .status-badge { font-size: 0.55rem; bottom: 10px; right: 10px; }
    }
</style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="status-badge" id="statusBadge">🟢 Мониторинг</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #28a745;"></div> <span>🟢 Внимание / Угроза</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #800020;"></div> <span>🏴‍☠️ Ракетная опасность</span></div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <span>Загрузка границ регионов...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ===========================================
    // ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ===========================================
    const map = L.map('map').setView([61, 95], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 10,
        minZoom: 2
    }).addTo(map);

    // ===========================================
    // ЦВЕТА ТРЕВОГ
    // ===========================================
    const colors = {
        clear: "#6c757d",
        attention: "#28a745",
        droneDanger: "#ffc107",
        rocket: "#800020"
    };

    let currentAlertLevels = {};
    let regionsLayer = null;
    let regionNameMapping = {}; // Для маппинга GeoJSON имен к нашим ключам

    // ===========================================
    // ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('liveTime').innerHTML = `${hours}:${minutes}`;
        const options = { day: 'numeric', month: 'long', weekday: 'long' };
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', options);
    }
    updateClock();
    setInterval(updateClock, 60000);

    function formatRegionName(name) {
        if (!name) return "";
        const words = name.split(' ');
        if (words.length === 1) return words[0];
        if (words.length === 2) return `${words[0]}<br>${words[1]}`;
        return `${words[0]}<br>${words.slice(1).join(' ')}`;
    }

    // ===========================================
    // ВСЕ РЕГИОНЫ РФ (ключ -> название для отображения)
    // ===========================================
    const regionKeys = {
        "Москва": "Москва",
        "Московская область": "Московская область",
        "Санкт-Петербург": "Санкт-Петербург",
        "Ленинградская область": "Ленинградская область",
        "Белгородская область": "Белгородская область",
        "Брянская область": "Брянская область",
        "Владимирская область": "Владимирская область",
        "Воронежская область": "Воронежская область",
        "Ивановская область": "Ивановская область",
        "Калужская область": "Калужская область",
        "Костромская область": "Костромская область",
        "Курская область": "Курская область",
        "Липецкая область": "Липецкая область",
        "Нижегородская область": "Нижегородская область",
        "Новгородская область": "Новгородская область",
        "Орловская область": "Орловская область",
        "Пензенская область": "Пензенская область",
        "Псковская область": "Псковская область",
        "Рязанская область": "Рязанская область",
        "Смоленская область": "Смоленская область",
        "Тамбовская область": "Тамбовская область",
        "Тверская область": "Тверская область",
        "Тульская область": "Тульская область",
        "Ярославская область": "Ярославская область",
        "Краснодарский край": "Краснодарский край",
        "Ставропольский край": "Ставропольский край",
        "Ростовская область": "Ростовская область",
        "Волгоградская область": "Волгоградская область",
        "Астраханская область": "Астраханская область",
        "Республика Татарстан": "Татарстан",
        "Республика Башкортостан": "Башкортостан",
        "Республика Крым": "Крым",
        "Калининградская область": "Калининградская область",
        "Свердловская область": "Свердловская область",
        "Челябинская область": "Челябинская область",
        "Новосибирская область": "Новосибирская область",
        "Омская область": "Омская область",
        "Томская область": "Томская область",
        "Кемеровская область": "Кемеровская область",
        "Иркутская область": "Иркутская область",
        "Красноярский край": "Красноярский край",
        "Алтайский край": "Алтайский край",
        "Забайкальский край": "Забайкальский край",
        "Приморский край": "Приморский край",
        "Хабаровский край": "Хабаровский край",
        "Амурская область": "Амурская область",
        "Сахалинская область": "Сахалинская область",
        "Магаданская область": "Магаданская область",
        "Камчатский край": "Камчатский край",
        "Архангельская область": "Архангельская область",
        "Мурманская область": "Мурманская область",
        "Республика Карелия": "Карелия",
        "Республика Коми": "Коми",
        "Пермский край": "Пермский край",
        "Ханты-Мансийский АО": "ХМАО",
        "Ямало-Ненецкий АО": "ЯНАО",
        "Республика Дагестан": "Дагестан",
        "Чеченская Республика": "Чечня",
        "Республика Адыгея": "Адыгея",
        "Республика Бурятия": "Бурятия",
        "Республика Саха (Якутия)": "Якутия",
        "Республика Алтай": "Алтай"
    };

    // Синонимы для поиска в сообщениях
    const regionAliases = {
        "Москва": ["москва", "мск", "г москва", "москве"],
        "Московская область": ["московская область", "подмосковье", "мо обл", "московская обл"],
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб", "петербург"],
        "Ленинградская область": ["ленинградская область", "ленобласть"],
        "Белгородская область": ["белгородская область", "белгород", "белгороде"],
        "Брянская область": ["брянская область", "брянск", "брянске"],
        "Воронежская область": ["воронежская область", "воронеж", "воронеже"],
        "Курская область": ["курская область", "курск", "курске"],
        "Краснодарский край": ["краснодарский край", "кубань", "краснодар", "краснодаре"],
        "Ростовская область": ["ростовская область", "ростов", "ростове"],
        "Республика Татарстан": ["татарстан", "казань", "республика татарстан"],
        "Республика Крым": ["крым", "республика крым", "крыму"],
        "Калининградская область": ["калининградская область", "калининград"],
        "Свердловская область": ["свердловская область", "екатеринбург"],
        "Челябинская область": ["челябинская область", "челябинск"],
        "Новосибирская область": ["новосибирская область", "новосибирск"],
        "Самарская область": ["самарская область", "самара"],
        "Нижегородская область": ["нижегородская область", "нижний новгород"],
        "Волгоградская область": ["волгоградская область", "волгоград"],
        "Саратовская область": ["саратовская область", "саратов"],
        "Пермский край": ["пермский край", "пермь"],
        "Красноярский край": ["красноярский край", "красноярск"],
        "Иркутская область": ["иркутская область", "иркутск"],
        "Хабаровский край": ["хабаровский край", "хабаровск"],
        "Приморский край": ["приморский край", "владивосток", "приморье"],
        "Республика Дагестан": ["дагестан", "республика дагестан"],
        "Республика Башкортостан": ["башкортостан", "уфа"],
        "Республика Карелия": ["карелия", "республика карелия"]
    };

    // ===========================================
    // ЗАГРУЗКА ГРАНИЦ С GITHUB
    // ===========================================
    const geojsonUrl = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
    
    function loadGeoJSON() {
        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log("GeoJSON загружен");
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(error => {
                console.error("Ошибка загрузки:", error);
                document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки границ. Использую запасной вариант...</span>';
                loadFallbackGeoJSON();
            });
    }

    function loadFallbackGeoJSON() {
        const fallbackUrl = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(fallbackUrl)
            .then(response => response.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(err => {
                document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки. Карта может работать некорректно.</span>';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                }, 3000);
            });
    }

    function initRegionsLayer(geoJsonData) {
        // Создаем маппинг GeoJSON имен к нашим ключам
        geoJsonData.features.forEach(feature => {
            let geoName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
            if (geoName) {
                geoName = geoName.toLowerCase();
                for (const [key, displayName] of Object.entries(regionKeys)) {
                    if (geoName.includes(key.toLowerCase()) || key.toLowerCase().includes(geoName)) {
                        regionNameMapping[geoName] = key;
                        break;
                    }
                }
                // Прямое сопоставление
                if (!regionNameMapping[geoName]) {
                    for (const alias of Object.keys(regionAliases)) {
                        if (geoName.includes(alias.toLowerCase())) {
                            regionNameMapping[geoName] = alias;
                            break;
                        }
                    }
                }
            }
        });
        
        console.log("Маппинг регионов:", regionNameMapping);

        regionsLayer = L.geoJSON(geoJsonData, {
            style: function(feature) {
                let geoName = (feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "").toLowerCase();
                let regionKey = regionNameMapping[geoName];
                let level = regionKey ? (currentAlertLevels[regionKey] || 0) : 0;
                
                let fillColor;
                if (level === 0) fillColor = colors.clear;
                else if (level === 1) fillColor = colors.attention;
                else if (level === 2) fillColor = colors.droneDanger;
                else fillColor = colors.rocket;
                
                return {
                    color: "#ffffff",
                    weight: 2,
                    fillColor: fillColor,
                    fillOpacity: 0.7,
                    smoothFactor: 0.5,
                    opacity: 0.9
                };
            },
            onEachFeature: function(feature, layer) {
                let geoName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                let regionKey = regionNameMapping[geoName.toLowerCase()] || geoName;
                let displayName = regionKeys[regionKey] || geoName;
                
                if (displayName) {
                    const formattedName = formatRegionName(displayName);
                    let level = regionKey ? (currentAlertLevels[regionKey] || 0) : 0;
                    
                    let levelText = "";
                    let levelColor = "";
                    if (level === 0) {
                        levelText = "⚪ Отбой / Спокойно";
                        levelColor = "#adb5bd";
                    } else if (level === 1) {
                        levelText = "🟢 Внимание / Угроза";
                        levelColor = "#6fcf97";
                    } else if (level === 2) {
                        levelText = "🟡 Опасность БПЛА";
                        levelColor = "#ffc107";
                    } else {
                        levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ!";
                        levelColor = "#c41e3a";
                    }
                    
                    layer.bindPopup(`
                        <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                            <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                                ${formattedName}
                            </div>
                            <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                        </div>
                    `, { className: 'custom-popup' });
                    
                    // Сохраняем ключ региона для быстрого доступа
                    layer.regionKey = regionKey;
                }
            }
        }).addTo(map);
        
        setTimeout(() => {
            map.flyTo([61, 95], 4.2, { duration: 1.2 });
        }, 200);
        
        fetchAndUpdateAlerts();
        setInterval(fetchAndUpdateAlerts, 30000);
    }

    function updateRegionColors() {
        if (!regionsLayer) return;
        
        regionsLayer.eachLayer(layer => {
            let regionKey = layer.regionKey;
            if (!regionKey) return;
            
            let level = currentAlertLevels[regionKey] || 0;
            
            let fillColor;
            if (level === 0) fillColor = colors.clear;
            else if (level === 1) fillColor = colors.attention;
            else if (level === 2) fillColor = colors.droneDanger;
            else fillColor = colors.rocket;
            
            layer.setStyle({
                fillColor: fillColor,
                fillOpacity: 0.7,
                color: "#ffffff",
                weight: 2
            });
            
            if (layer.getPopup()) {
                let displayName = regionKeys[regionKey] || regionKey;
                const formattedName = formatRegionName(displayName);
                let levelText = "";
                let levelColor = "";
                if (level === 0) {
                    levelText = "⚪ Отбой / Спокойно";
                    levelColor = "#adb5bd";
                } else if (level === 1) {
                    levelText = "🟢 Внимание / Угроза";
                    levelColor = "#6fcf97";
                } else if (level === 2) {
                    levelText = "🟡 Опасность БПЛА";
                    levelColor = "#ffc107";
                } else {
                    levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ!";
                    levelColor = "#c41e3a";
                }
                
                layer.getPopup().setContent(`
                    <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                        <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                            ${formattedName}
                        </div>
                        <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                    </div>
                `);
            }
        });
        
        const alertCount = Object.values(currentAlertLevels).filter(l => l > 0).length;
        const badge = document.getElementById('statusBadge');
        if (alertCount > 0) {
            badge.innerHTML = `⚠️ Тревог: ${alertCount}`;
            badge.style.color = "#ffc107";
        } else {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            badge.innerHTML = `🟢 Мониторинг | ${timeStr}`;
            badge.style.color = "#0f0";
        }
    }

    // ===========================================
    // ПАРСИНГ TELEGRAM
    // ===========================================
    async function parseTelegramAlerts() {
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/radarrussiia";
        
        try {
            console.log("Парсинг канала:", channel);
            const resp = await fetch(proxyUrl + encodeURIComponent(channel));
            if (!resp.ok) throw new Error("Ошибка загрузки");
            let html = await resp.text();
            
            // Ищем все сообщения
            const postRegex = /data-post="radarrussiia\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            const posts = [];
            let m;
            while ((m = postRegex.exec(html)) !== null) {
                posts.push({
                    id: parseInt(m[1]),
                    text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
                });
            }
            
            console.log("Найдено постов:", posts.length);
            
            // Показываем первые 5 сообщений для отладки
            posts.slice(0, 5).forEach((p, i) => {
                console.log(`Пост ${i+1}:`, p.text.substring(0, 200));
            });
            
            posts.sort((a,b) => b.id - a.id);
            
            const tempLevels = {};
            
            for (const post of posts) {
                const text = post.text;
                
                // Ищем регионы в тексте
                let matchedRegions = [];
                for (const [region, aliases] of Object.entries(regionAliases)) {
                    for (const alias of aliases) {
                        if (text.includes(alias)) {
                            matchedRegions.push(region);
                            break;
                        }
                    }
                }
                
                if (matchedRegions.length === 0) continue;
                
                console.log("Найдены регионы:", matchedRegions, "в посте:", text.substring(0, 100));
                
                // Определяем уровень тревоги
                let level = 0;
                const isOtboy = /\b(отбой|отменен|отменена|снята)\b/i.test(text);
                const isRocket = /\b(ракет|ракетная|баллистич|крылат)\b/i.test(text);
                const isDrone = /\b(бпла|беспилот|дрон|баражиру|шахед)\b/i.test(text);
                const isAttention = /\b(внимание|угроза|опасность|тревога|атака)\b/i.test(text);
                
                if (isOtboy) {
                    level = 0;
                } else if (isRocket) {
                    level = 3;
                } else if (isDrone) {
                    level = 2;
                } else if (isAttention) {
                    level = 1;
                }
                
                console.log("Уровень:", level);
                
                for (const region of matchedRegions) {
                    const existing = tempLevels[region];
                    if (!existing || existing.postId < post.id) {
                        tempLevels[region] = { level, postId: post.id };
                    }
                }
            }
            
            const finalAlerts = {};
            for (const [region, data] of Object.entries(tempLevels)) {
                if (data.level > 0) {
                    finalAlerts[region] = data.level;
                }
            }
            
            console.log("Активные тревоги:", finalAlerts);
            return finalAlerts;
        } catch (err) {
            console.error("Парсинг ошибка:", err);
            return {};
        }
    }
    
    async function fetchAndUpdateAlerts() {
        try {
            const levels = await parseTelegramAlerts();
            let changed = false;
            
            for (const [reg, lvl] of Object.entries(levels)) {
                if (currentAlertLevels[reg] !== lvl) {
                    currentAlertLevels[reg] = lvl;
                    changed = true;
                }
            }
            
            // Удаляем старые тревоги, которых нет в новых данных
            for (const reg of Object.keys(currentAlertLevels)) {
                if (currentAlertLevels[reg] > 0 && !levels[reg]) {
                    delete currentAlertLevels[reg];
                    changed = true;
                }
            }
            
            if (changed) {
                console.log("Обновление цветов регионов");
                updateRegionColors();
                localStorage.setItem("alertCache", JSON.stringify(currentAlertLevels));
            }
        } catch(e) {
            console.warn("Ошибка обновления", e);
            const cached = localStorage.getItem("alertCache");
            if (cached && Object.keys(currentAlertLevels).length === 0) {
                currentAlertLevels = JSON.parse(cached);
                updateRegionColors();
            }
        }
    }
    
    loadGeoJSON();
    
    map.on('zoomend', function() {
        if (map.getZoom() > 7) {
            map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 });
        }
    });
    
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && regionsLayer) {
            fetchAndUpdateAlerts();
        }
    });
</script>
