<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — locatorru</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Верхняя панель */
        .top-bar {
            position: fixed; top: 12px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 12px;
            z-index: 2100; pointer-events: none;
        }
        .online-counter, .clock {
            background: rgba(10,14,26,0.75); backdrop-filter: blur(8px);
            border-radius: 40px; padding: 4px 14px;
            color: #e8eef2; font-family: monospace; font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: auto;
        }
        .clock { text-align: center; }
        .time-main { font-size: 1.2rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.55rem; opacity: 0.7; }
        .online-count { font-weight: 800; color: #2ecc71; min-width: 30px; display: inline-block; text-align: center; }

        /* Легенда — компактная */
        .legend {
            position: fixed; bottom: 12px; left: 12px; z-index: 2000;
            background: rgba(10,14,26,0.7); backdrop-filter: blur(8px);
            border-radius: 10px; padding: 6px 12px;
            color: #e8eef2; font-size: 0.7rem;
            display: flex; flex-direction: column; gap: 4px;
            pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 18px; height: 12px; border-radius: 3px; }

        /* Кнопка обновления */
        .update-btn {
            position: fixed; bottom: 12px; right: 12px; z-index: 2000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 30px;
            padding: 6px 18px; color: white; font-size: 0.75rem;
            font-weight: bold; cursor: pointer; font-family: monospace;
        }
        .update-btn:hover { background: #28a745; }

        .status {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 2px 10px; color: #ccc;
            font-size: 0.6rem; font-family: monospace;
        }

        /* Боковая панель */
        .drawer-btn {
            position: fixed; top: 12px; left: 12px; z-index: 2100;
            background: rgba(10,14,26,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; color: white;
        }
        .drawer {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: rgba(15, 20, 30, 0.96); backdrop-filter: blur(12px);
            z-index: 2200; transition: left 0.25s ease; border-right: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column;
        }
        .drawer.open { left: 0; }
        .drawer-header {
            padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: space-between; align-items: center;
            color: white; font-weight: bold; font-size: 1rem;
        }
        .drawer-close { background: none; border: none; color: #ff8888; font-size: 24px; cursor: pointer; }
        .drawer-content { flex: 1; overflow-y: auto; padding: 10px; }
        .region-item {
            background: rgba(255,255,255,0.08); margin-bottom: 8px;
            border-radius: 8px; padding: 8px 10px; border-left: 3px solid;
        }
        .region-name { font-weight: bold; font-size: 0.85rem; }
        .region-level { font-size: 0.7rem; opacity: 0.8; }
        .empty-state { color: #aaa; text-align: center; padding: 20px; font-size: 0.8rem; }

        /* Стили попапов */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1a1f2e; color: #e8eef2; border-radius: 8px;
            padding: 4px 8px; font-size: 0.75rem;
        }
        .leaflet-control-attribution { display: none !important; }

        @media (max-width: 600px) {
            .drawer { width: 240px; left: -250px; }
            .drawer-btn { width: 32px; height: 32px; font-size: 18px; top: 8px; left: 8px; }
            .online-counter, .clock { font-size: 0.7rem; padding: 3px 10px; }
            .time-main { font-size: 1rem; }
            .legend { font-size: 0.6rem; padding: 4px 10px; }
            .update-btn { padding: 5px 14px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="online-counter">
        👁️ <span class="online-count" id="onlineCount">---</span>
    </div>
    <div class="clock">
        <div class="time-main" id="liveTime">--:--</div>
        <div class="date" id="liveDate">--</div>
    </div>
</div>

<div class="drawer-btn" id="drawerBtn">☰</div>
<div class="drawer" id="drawer">
    <div class="drawer-header">
        <span>⚠️ Тревоги</span>
        <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-content" id="drawerContent">
        <div class="empty-state">Загрузка...</div>
    </div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>БПЛА опасность</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>Ракетная опасность</span></div>
</div>
<button class="update-btn" id="updateBtn">🔄</button>
<div class="status" id="status">Загрузка...</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ===========================================
    // КАРТА — тонкая, без лишних наложений
    // ===========================================
    const map = L.map('map').setView([61, 95], 4.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 8, minZoom: 2
    }).addTo(map);

    // Цвета (только 3 уровня)
    const colors = { clear: "#6c757d", drone: "#ffc107", rocket: "#dc3545" };
    let regionStates = {};
    let polygonsLayer = null;

    // Часы
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
    }
    updateClock();
    setInterval(updateClock, 60000);

    // Онлайн счётчик (имитация)
    function updateOnlineCounter() {
        const viewers = Math.floor(Math.random() * 5) + 1;
        document.getElementById('onlineCount').innerText = viewers;
    }
    updateOnlineCounter();
    setInterval(updateOnlineCounter, 20000);

    // Форматирование имени (коротко)
    function formatShort(name) {
        if (!name) return '';
        // Убираем "Республика", "область" и т.п. для компактности
        let short = name.replace(/республика\s+/i, '').replace(/область/i, 'обл').replace(/край/i, '');
        if (short.length > 15) short = short.slice(0, 12) + '…';
        return short;
    }

    function getLevel(state) {
        if (!state) return 0;
        if (state.rocket) return 3;
        if (state.drone) return 2;
        return 0;
    }

    function getColor(level) {
        if (level === 2) return colors.drone;
        if (level === 3) return colors.rocket;
        return colors.clear;
    }

    function getPopupContent(name, level) {
        const levelText = level === 2 ? "🟡 БПЛА" : (level === 3 ? "🔴 Ракетная" : "⚪ Спокойно");
        return `<b style="font-size:0.85rem">${formatShort(name)}</b><br><span style="color:${getColor(level)}">${levelText}</span>`;
    }

    // ===========================================
    // ПАРСИНГ TELEGRAM (канал locatorru)
    // ===========================================
    const regionAliases = {
        "Москва": ["москва","мск"], "Московская область": ["подмосковье","мо обл"],
        "Санкт-Петербург": ["питер","спб"], "Ленинградская область": ["ленобласть"],
        "Белгородская область": ["белгород"], "Брянская область": ["брянск"],
        "Курская область": ["курск"], "Воронежская область": ["воронеж"],
        "Краснодарский край": ["кубань","краснодар"], "Ростовская область": ["ростов"],
        "Республика Татарстан": ["татарстан","казань"], "Калининградская область": ["калининград"],
        "Свердловская область": ["екатеринбург"], "Челябинская область": ["челябинск"],
        "Новосибирская область": ["новосибирск"], "Самарская область": ["самара"],
        "Нижегородская область": ["нижний новгород"], "Волгоградская область": ["волгоград"],
        "Пермский край": ["пермь"], "Республика Крым": ["крым"],
        "Ханты-Мансийский АО": ["хмао","сургут"], "Ямало-Ненецкий АО": ["янао","ямал"],
        "Республика Башкортостан": ["башкортостан","уфа"], "Республика Дагестан": ["дагестан"]
    };

    async function fetchTelegram() {
        const proxy = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/locatorru";
        try {
            const resp = await fetch(proxy + encodeURIComponent(channel), { signal: AbortSignal.timeout(8000) });
            if (!resp.ok) throw new Error();
            return await resp.text();
        } catch {
            // fallback
            const fallback = await fetch(proxy + encodeURIComponent("https://t.me/s/radarrussiia"));
            return await fallback.text();
        }
    }

    function isGlobalClear(text) {
        return /отбой по всем|все тревоги сняты|глобальный отбой|полная отмена/i.test(text);
    }

    async function parseAlerts() {
        let html = await fetchTelegram();
        if (!html) return {};
        const regex = /data-post="(?:locatorru|radarrussiia)\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
        let posts = [];
        let m;
        while ((m = regex.exec(html)) !== null) {
            posts.push({ id: parseInt(m[1]), text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase() });
        }
        posts.sort((a,b) => a.id - b.id);
        const fresh = posts.slice(-40);
        let updates = {};
        let globalClear = false;

        for (let post of fresh) {
            let text = post.text;
            if (isGlobalClear(text)) {
                globalClear = true;
                continue;
            }
            let matched = [];
            for (let [official, keys] of Object.entries(regionAliases)) {
                if (keys.some(k => text.includes(k))) matched.push(official);
            }
            if (matched.length === 0) continue;

            const isRocket = /ракетная опасность|ракетная тревога/i.test(text);
            const isDrone = /\bбпла?\b|беспилот|дрон/i.test(text);
            const isOtboyRocket = /отбой ракетной/i.test(text);
            const isOtboyDrone = /отбой бпла|отбой опасности/i.test(text);
            const isSimpleOtboy = /отбой/i.test(text) && !isOtboyRocket && !isOtboyDrone;

            for (let region of matched) {
                if (!updates[region]) updates[region] = { drone: false, rocket: false };
                if (isRocket) updates[region].rocket = true;
                if (isDrone) updates[region].drone = true;
                if (isOtboyRocket) updates[region].rocket = false;
                if (isOtboyDrone) updates[region].drone = false;
                if (isSimpleOtboy) { updates[region].drone = false; updates[region].rocket = false; }
            }
        }

        if (globalClear) {
            let cleared = {};
            for (let reg of Object.keys(regionAliases)) cleared[reg] = { drone: false, rocket: false };
            return cleared;
        }
        return updates;
    }

    // ===========================================
    // ЗАГРУЗКА ПОЛИГОНОВ (ТОНКИЕ ГРАНИЦЫ)
    // ===========================================
    function loadBoundaries() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url)
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => applyBoundaries(data))
            .catch(() => fetch(fallback).then(r => r.json()).then(data => applyBoundaries(data)))
            .catch(e => console.warn("Границы не загружены", e));
    }

    function applyBoundaries(geoData) {
        if (polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || "";
                let level = getLevel(regionStates[name]);
                return {
                    color: "#aaa",          // светлая рамка, но не жирная
                    weight: 1.2,
                    fillColor: getColor(level),
                    fillOpacity: 0.5,
                    smoothFactor: 0.8
                };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || "";
                if (name) {
                    layer.regionName = name;
                    let level = getLevel(regionStates[name]);
                    layer.bindPopup(getPopupContent(name, level), { className: 'custom-popup', offset: [0, -10] });
                }
            }
        }).addTo(map);
        document.getElementById('status').innerHTML = 'Готово';
        updateSidebar();
    }

    function updatePolygons() {
        if (!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            let name = layer.regionName;
            if (name) {
                let level = getLevel(regionStates[name]);
                layer.setStyle({ fillColor: getColor(level), fillOpacity: 0.5, color: "#aaa", weight: 1.2 });
                layer.getPopup().setContent(getPopupContent(name, level));
            }
        });
    }

    function updateSidebar() {
        const container = document.getElementById('drawerContent');
        let active = [];
        for (let [name, state] of Object.entries(regionStates)) {
            let level = getLevel(state);
            if (level > 0) active.push({ name, level, text: level === 2 ? "🟡 БПЛА" : "🔴 Ракетная" });
        }
        active.sort((a,b) => b.level - a.level);
        if (active.length === 0) {
            container.innerHTML = '<div class="empty-state">✅ Нет тревог</div>';
            return;
        }
        let html = '';
        for (let a of active) {
            html += `<div class="region-item" style="border-left-color: ${getColor(a.level)}">
                        <div class="region-name">${formatShort(a.name)}</div>
                        <div class="region-level">${a.text}</div>
                    </div>`;
        }
        container.innerHTML = html;
    }

    async function refresh() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '🔄 ...';
        try {
            const updates = await parseAlerts();
            let changed = false;
            for (let [reg, newState] of Object.entries(updates)) {
                const old = regionStates[reg] || { drone: false, rocket: false };
                if (old.drone !== newState.drone || old.rocket !== newState.rocket) {
                    regionStates[reg] = { drone: newState.drone, rocket: newState.rocket };
                    changed = true;
                }
            }
            if (changed || Object.keys(updates).length > 0) {
                updatePolygons();
                updateSidebar();
                localStorage.setItem("regionStates", JSON.stringify(regionStates));
                statusDiv.innerHTML = '✅ Обновлено';
            } else {
                statusDiv.innerHTML = 'Актуально';
            }
            setTimeout(() => { if (statusDiv.innerHTML !== '🔄 ...') statusDiv.innerHTML = 'Готово'; }, 1500);
        } catch(e) {
            console.error(e);
            statusDiv.innerHTML = '⚠️ Ошибка';
        }
    }

    // Восстановление кэша
    const saved = localStorage.getItem("regionStates");
    if (saved) {
        try { regionStates = JSON.parse(saved); } catch(e) {}
    }
    refresh();
    setInterval(refresh, 35000);
    loadBoundaries();

    document.getElementById('updateBtn').addEventListener('click', () => refresh());
    window.addEventListener('resize', () => map.invalidateSize());
    map.on('zoomend', () => { if (map.getZoom() > 7) map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 }); });

    // Боковая панель
    const drawer = document.getElementById('drawer');
    document.getElementById('drawerBtn').addEventListener('click', () => drawer.classList.add('open'));
    document.getElementById('drawerClose').addEventListener('click', () => drawer.classList.remove('open'));
    document.addEventListener('click', (e) => {
        if (drawer.classList.contains('open') && !drawer.contains(e.target) && !document.getElementById('drawerBtn').contains(e.target))
            drawer.classList.remove('open');
    });
</script>
</body>
</html>
