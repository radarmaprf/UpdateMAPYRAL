<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — locatorru с линейкой</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Онлайн-счётчик */
        .online-counter {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2100;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 18px;
            color: #e8eef2;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }
        .online-count { font-weight: 800; color: #2ecc71; text-shadow: 0 0 4px rgba(46,204,113,0.3); min-width: 30px; text-align: center; }

        /* Часы */
        .clock {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 8px 18px; color: #e8eef2;
            font-family: 'JetBrains Mono', monospace; text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }

        /* Легенда */
        .legend {
            position: fixed; bottom: 20px; left: 20px; z-index: 2000;
            background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
            border-radius: 12px; padding: 10px 16px; color: #e8eef2;
            font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 6px; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }

        /* Кнопка обновления */
        .update-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            padding: 10px 22px; color: white; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-family: monospace;
        }
        .update-btn:hover { background: #28a745; border-color: #28a745; transform: scale(1.02); }

        /* Панель линейки */
        .ruler-panel {
            position: fixed;
            bottom: 90px;
            right: 20px;
            z-index: 2100;
            background: rgba(10,14,26,0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: monospace;
            transition: all 0.2s;
        }
        .ruler-panel .title {
            font-weight: bold;
            color: #ffc107;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .ruler-panel button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .ruler-panel button.active {
            background: #28a745;
            border-color: #28a745;
        }
        .ruler-panel select {
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 5px 10px;
            font-family: monospace;
            cursor: pointer;
        }
        .result {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            font-size: 0.75rem;
            text-align: center;
        }
        .result span {
            color: #ffc107;
            font-weight: bold;
        }
        .clear-ruler {
            background: #dc3545 !important;
            border-color: #dc3545 !important;
            margin-top: 5px;
        }
        .status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 4px 14px; color: #ccc;
            font-size: 0.7rem; font-family: monospace; white-space: nowrap;
        }

        /* Попап */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid;
        }
        .leaflet-control-attribution { display: none !important; }

        /* Боковое меню */
        .drawer-btn {
            position: fixed; top: 20px; left: 20px; z-index: 2100;
            background: rgba(10,14,26,0.9); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 26px; color: white;
        }
        .drawer {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(15,20,30,0.96); backdrop-filter: blur(12px);
            z-index: 2200; transition: left 0.3s; border-right: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column;
        }
        .drawer.open { left: 0; }
        .drawer-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; color: #e8eef2; font-weight: bold; }
        .drawer-close { background: none; border: none; color: #ff8888; font-size: 28px; cursor: pointer; }
        .drawer-content { flex: 1; overflow-y: auto; padding: 15px; }
        .region-item { background: rgba(255,255,255,0.08); margin-bottom: 10px; border-radius: 10px; padding: 12px; border-left: 4px solid; }
        .region-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; }
        .region-level { font-size: 0.75rem; opacity: 0.8; }
        .empty-state { color: #aaa; text-align: center; padding: 30px 15px; }

        @media (max-width: 600px) {
            .ruler-panel { width: 200px; bottom: 80px; right: 10px; padding: 8px 12px; }
            .drawer-btn { width: 40px; height: 40px; font-size: 22px; top: 10px; left: 10px; }
            .time-main { font-size: 1.2rem; }
            .clock { padding: 4px 12px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

<div class="online-counter">
    <span>Онлайн:</span>
    <span class="online-count" id="onlineCount">---</span>
</div>

<div class="drawer-btn" id="drawerBtn">☰</div>
<div class="drawer" id="drawer">
    <div class="drawer-header">
        <span>⚠️ Регионы с тревогой</span>
        <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-content" id="drawerContent">...</div>
</div>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Ракетная опасность</span></div>
</div>

<!-- Панель линейки -->
<div class="ruler-panel" id="rulerPanel">
    <div class="title">
        📏 Линейка
        <button id="rulerToggleBtn">Вкл</button>
    </div>
    <select id="targetType">
        <option value="120">🛸 Обычный БПЛА (120 км/ч)</option>
        <option value="600">⚡ Реактивный БПЛА (600 км/ч)</option>
        <option value="2500">🚀 Ракета (2500 км/ч)</option>
    </select>
    <div class="result" id="rulerResult">
        Расстояние: -- км<br>
        Время: -- мин -- с
    </div>
    <button id="clearRulerBtn" class="clear-ruler">🧹 Сбросить</button>
</div>

<button class="update-btn" id="updateBtn">🔄 Обновить</button>
<div class="status" id="status">Загрузка...</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ===========================================
    // КАРТА
    // ===========================================
    const map = L.map('map').setView([61, 95], 4.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2
    }).addTo(map);

    // ===========================================
    // ЦВЕТА ТРЕВОГ
    // ===========================================
    const colors = {
        clear: "#6c757d",
        droneDanger: "#ffc107",
        rocket: "#dc3545"
    };

    let regionStates = {};
    let polygonsLayer = null;

    // ===========================================
    // ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock();
    setInterval(updateClock, 60000);

    function formatName(name) {
        if (!name) return '';
        const parts = name.split(' ');
        if (parts.length === 1) return parts[0];
        return parts[0] + '<br>' + parts.slice(1).join(' ');
    }

    // ===========================================
    // ОНЛАЙН СЧЁТЧИК
    // ===========================================
    function updateOnlineCounter() {
        const viewers = Math.floor(Math.random() * 5) + 1;
        const el = document.getElementById('onlineCount');
        if (el) {
            el.textContent = viewers;
            el.style.transform = 'scale(1.1)';
            setTimeout(() => { if (el) el.style.transform = 'scale(1)'; }, 200);
        }
    }
    updateOnlineCounter();
    setInterval(updateOnlineCounter, 15000);

    // ===========================================
    // ЛОГИКА ТРЕВОГ
    // ===========================================
    function getCurrentLevel(state) {
        if (!state) return 0;
        if (state.rocket) return 3;
        if (state.droneDanger) return 2;
        return 0;
    }

    function getLevelText(level) {
        if (level === 2) return "🟡 Опасность БПЛА";
        if (level === 3) return "🔴 Ракетная опасность";
        return "⚪ Отбой / Спокойно";
    }

    function getLevelColor(level) {
        if (level === 2) return "#ffc107";
        if (level === 3) return "#dc3545";
        return "#adb5bd";
    }

    function getPopupContent(regionName, level) {
        return `<div style="font-family:'Segoe UI';min-width:140px;"><b style="font-size:1rem;">${formatName(regionName)}</b><br><span style="color:${getLevelColor(level)}">${getLevelText(level)}</span></div>`;
    }

    // ===========================================
    // СИНОНИМЫ РЕГИОНОВ
    // ===========================================
    const regionAliases = {
        "Московская область": ["московская область","подмосковье","мо обл","москва","мск"],
        "Санкт-Петербург": ["санкт-петербург","питер","спб","ленинград"],
        "Ленинградская область": ["ленинградская область","ленобласть"],
        "Белгородская область": ["белгород","белгородская область"],
        "Брянская область": ["брянск","брянская область"],
        "Воронежская область": ["воронеж","воронежская область"],
        "Курская область": ["курск","курская область"],
        "Краснодарский край": ["краснодар","кубань","краснодарский край"],
        "Ростовская область": ["ростов","ростов-на-дону","ростовская область"],
        "Республика Татарстан": ["татарстан","казань","республика татарстан"],
        "Республика Крым": ["крым","республика крым"],
        "Калининградская область": ["калининград","калининградская область"],
        "Свердловская область": ["свердловская область","екатеринбург"],
        "Челябинская область": ["челябинск","челябинская область"],
        "Новосибирская область": ["новосибирск","новосибирская область"],
        "Самарская область": ["самара","самарская область"],
        "Нижегородская область": ["нижний новгород","нижегородская область"],
        "Волгоградская область": ["волгоград","волгоградская область"],
        "Саратовская область": ["саратов","саратовская область"],
        "Пермский край": ["пермь","пермский край"],
        "Омская область": ["омск","омская область"],
        "Томская область": ["томск","томская область"],
        "Кемеровская область": ["кемерово","кузбасс"],
        "Иркутская область": ["иркутск","иркутская область"],
        "Красноярский край": ["красноярск","красноярский край"],
        "Алтайский край": ["барнаул","алтайский край"],
        "Приморский край": ["владивосток","приморский край"],
        "Хабаровский край": ["хабаровск","хабаровский край"],
        "Амурская область": ["амурская область","благовещенск"],
        "Архангельская область": ["архангельск","архангельская область"],
        "Мурманская область": ["мурманск","мурманская область"],
        "Республика Карелия": ["карелия","петрозаводск"],
        "Республика Коми": ["коми","сыктывкар"],
        "Ханты-Мансийский АО": ["хмао","ханты-мансийск","сургут"],
        "Ямало-Ненецкий АО": ["янао","ямал"],
        "Чеченская Республика": ["чечня","грозный"],
        "Республика Дагестан": ["дагестан","махачкала"],
        "Республика Башкортостан": ["башкортостан","уфа"],
        "Удмуртская Республика": ["удмуртия","ижевск"],
        "Чувашия": ["чувашская республика","чебоксары"],
        "Марий Эл": ["республика марий эл","йошкар-ола"],
        "Республика Мордовия": ["мордовия","саранск"],
        "Кировская область": ["киров","кировская область"],
        "Ульяновская область": ["ульяновск","ульяновская область"],
        "Пензенская область": ["пенза","пензенская область"],
        "Тамбовская область": ["тамбов","тамбовская область"],
        "Рязанская область": ["рязань","рязанская область"],
        "Тульская область": ["тула","тульская область"],
        "Калужская область": ["калуга","калужская область"],
        "Смоленская область": ["смоленск","смоленская область"],
        "Тверская область": ["тверь","тверская область"],
        "Владимирская область": ["владимир","владимирская область"],
        "Ивановская область": ["иваново","ивановская область"],
        "Костромская область": ["кострома","костромская область"],
        "Орловская область": ["орел","орловская область"],
        "Липецкая область": ["липецк","липецкая область"],
        "Псковская область": ["псков","псковская область"],
        "Новгородская область": ["новгород","великий новгород"],
        "Ярославская область": ["ярославль","ярославская область"],
        "Забайкальский край": ["забайкалье","чита"],
        "Камчатский край": ["камчатка","петропавловск-камчатский"],
        "Магаданская область": ["магадан","магаданская область"],
        "Сахалинская область": ["сахалин","южно-сахалинск"],
        "Еврейская АО": ["еврейская автономная","биробиджан"],
        "Чукотский АО": ["чукотка","анадырь"]
    };

    // ===========================================
    // ПАРСИНГ TELEGRAM (без изменений)
    // ===========================================
    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://cors-anywhere.herokuapp.com/",
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
    ];
    const channel = "https://t.me/s/locatorru";
    const fallbackChannel = "https://t.me/s/radarrussiia";

    async function fetchWithProxy(url, proxyList) {
        for (let proxy of proxyList) {
            try {
                const proxyUrl = proxy + encodeURIComponent(url);
                const response = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
                if (response.ok) {
                    const text = await response.text();
                    if (text && text.length > 2000) return text;
                }
            } catch (e) { console.warn(`Прокси ${proxy} не сработал`, e); }
        }
        throw new Error("Все прокси недоступны");
    }

    function isGlobalClear(text) {
        const patterns = [
            /отбой опасности бпла по всем ранее регионам/i,
            /отбой по всем регионам/i,
            /все тревоги сняты/i,
            /снятие всех тревог/i,
            /отбой по всем/i,
            /глобальный отбой/i,
            /полная отмена тревог/i,
            /все угрозы сняты/i,
            /отбой для всех регионов/i
        ];
        return patterns.some(p => p.test(text));
    }

    async function parseTelegramAlerts() {
        let html = null;
        try {
            html = await fetchWithProxy(channel, proxies);
        } catch(e) {
            console.warn("Основной канал не загрузился, пробуем резервный");
            html = await fetchWithProxy(fallbackChannel, proxies);
        }
        if (!html) return {};

        const regex = /data-post="(?:locatorru|radarrussiia|radaryral)\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
        let posts = [];
        let m;
        while ((m = regex.exec(html)) !== null) {
            posts.push({
                id: parseInt(m[1]),
                text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
            });
        }
        posts.sort((a,b) => a.id - b.id);
        const fresh = posts.slice(-60);
        console.log(`Постов получено: ${posts.length}, анализируем ${fresh.length}`);

        const updates = {};

        for (const post of fresh) {
            let text = post.text.replace(/\s+/g, ' ').trim();
            if (isGlobalClear(text)) {
                console.log("Глобальный отбой! Сброс всех тревог.");
                const allRegions = Object.keys(regionAliases);
                for (let reg of allRegions) {
                    if (!updates[reg]) updates[reg] = {};
                    updates[reg].droneDanger = false;
                    updates[reg].rocket = false;
                }
                continue;
            }

            let matched = [];
            for (const [official, keys] of Object.entries(regionAliases)) {
                if (keys.some(kw => text.includes(kw))) {
                    matched.push(official);
                }
            }
            if (matched.length === 0) continue;

            const isRocket = /ракетная опасность|ракетная тревога|баллистическая ракета|крылатая ракета|авиационная ракетная опасность/i.test(text);
            const isDroneDanger = /\bбпла?\b|беспилот|дрон|опасность по бпла|атака бпла/i.test(text);
            
            const isOtboyRocket = /отбой ракетной опасности|снята ракетная|ракетная опасность отбой/i.test(text);
            const isOtboyDrone = /отбой опасности бпла|отбой бпла|бпла отбой|отбой по бпла/i.test(text);
            const isGeneralOtboy = /отбой/i.test(text) && !isOtboyRocket && !isOtboyDrone;

            for (const region of matched) {
                if (!updates[region]) updates[region] = {};

                if (isRocket) updates[region].rocket = true;
                if (isDroneDanger) updates[region].droneDanger = true;

                if (isOtboyRocket) updates[region].rocket = false;
                if (isOtboyDrone) updates[region].droneDanger = false;
                if (isGeneralOtboy) {
                    updates[region].droneDanger = false;
                    updates[region].rocket = false;
                }
            }
        }

        const newStates = { ...regionStates };
        for (const [region, upd] of Object.entries(updates)) {
            if (!newStates[region]) newStates[region] = { droneDanger: false, rocket: false };
            if (upd.droneDanger !== undefined) newStates[region].droneDanger = upd.droneDanger;
            if (upd.rocket !== undefined) newStates[region].rocket = upd.rocket;
        }
        return newStates;
    }

    // ===========================================
    // ОБНОВЛЕНИЕ КАРТЫ ТРЕВОГ
    // ===========================================
    function updateAlertList() {
        const container = document.getElementById('drawerContent');
        if (!container) return;
        const activeRegions = [];
        for (const [region, state] of Object.entries(regionStates)) {
            const level = getCurrentLevel(state);
            if (level > 0) {
                activeRegions.push({ name: region, level, levelText: getLevelText(level) });
            }
        }
        activeRegions.sort((a,b) => b.level - a.level);
        if (activeRegions.length === 0) {
            container.innerHTML = '<div class="empty-state">✅ Нет активных тревог</div>';
            return;
        }
        let html = '';
        activeRegions.forEach(r => {
            html += `
                <div class="region-item" style="border-left-color: ${getLevelColor(r.level)};">
                    <div class="region-name">${formatName(r.name)}</div>
                    <div class="region-level">${r.levelText}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function updatePolygons() {
        if (!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const name = layer.regionName;
            if (name) {
                const state = regionStates[name] || { droneDanger: false, rocket: false };
                const level = getCurrentLevel(state);
                let fill = colors.clear;
                if (level === 2) fill = colors.droneDanger;
                else if (level === 3) fill = colors.rocket;
                layer.setStyle({ fillColor: fill, fillOpacity: 0.7 });
                layer.getPopup().setContent(getPopupContent(name, level));
            }
        });
    }

    async function refreshAlerts() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '🔄 Обновление...';
        try {
            const newStates = await parseTelegramAlerts();
            let changed = false;
            for (const [reg, newState] of Object.entries(newStates)) {
                const oldState = regionStates[reg];
                if (!oldState ||
                    oldState.droneDanger !== newState.droneDanger ||
                    oldState.rocket !== newState.rocket) {
                    regionStates[reg] = { ...newState };
                    changed = true;
                }
            }
            if (changed) {
                updatePolygons();
                updateAlertList();
                localStorage.setItem("regionStates", JSON.stringify(regionStates));
                statusDiv.innerHTML = '✅ Готово';
                setTimeout(() => { if (statusDiv.innerHTML === '✅ Готово') statusDiv.innerHTML = 'Актуально'; }, 1500);
            } else {
                statusDiv.innerHTML = 'Без изменений';
                setTimeout(() => { if (statusDiv.innerHTML === 'Без изменений') statusDiv.innerHTML = 'Актуально'; }, 1000);
            }
        } catch(err) {
            console.error(err);
            statusDiv.innerHTML = '⚠️ Ошибка';
            setTimeout(() => { if (statusDiv.innerHTML === '⚠️ Ошибка') statusDiv.innerHTML = 'Повторите'; }, 2000);
        }
    }

    // ===========================================
    // ЗАГРУЗКА ПОЛИГОНОВ
    // ===========================================
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url)
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(data => applyPolygons(data))
            .catch(() => fetch(fallback).then(res => res.json()).then(data => applyPolygons(data)).catch(e => console.warn("Границы не загружены", e)));
    }

    function applyPolygons(geoData) {
        if (polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                const state = regionStates[name] || { droneDanger: false, rocket: false };
                const level = getCurrentLevel(state);
                let fill = colors.clear;
                if (level === 2) fill = colors.droneDanger;
                else if (level === 3) fill = colors.rocket;
                return { color: "#fff", weight: 2.2, fillColor: fill, fillOpacity: 0.7, smoothFactor: 0.5 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || f.properties?.admin_name || "";
                if (name) {
                    layer.regionName = name;
                    const state = regionStates[name] || { droneDanger: false, rocket: false };
                    const level = getCurrentLevel(state);
                    layer.bindPopup(getPopupContent(name, level), { className: 'custom-popup' });
                }
            }
        }).addTo(map);
        document.getElementById('status').innerHTML = 'Границы загружены';
        setTimeout(() => map.invalidateSize(), 100);
        updateAlertList();
    }

    // ===========================================
    // ЛИНЕЙКА (ИЗМЕРЕНИЕ РАССТОЯНИЯ И ВРЕМЕНИ)
    // ===========================================
    let rulerActive = false;
    let rulerPoints = [];
    let rulerLine = null;
    let rulerMarkers = [];

    function clearRuler() {
        rulerPoints = [];
        if (rulerLine) map.removeLayer(rulerLine);
        rulerMarkers.forEach(m => map.removeLayer(m));
        rulerMarkers = [];
        rulerLine = null;
        document.getElementById('rulerResult').innerHTML = 'Расстояние: -- км<br>Время: -- мин -- с';
        document.getElementById('rulerToggleBtn').classList.remove('active');
        rulerActive = false;
        map.getContainer().style.cursor = '';
    }

    function calculateAndDisplay() {
        if (rulerPoints.length !== 2) return;
        const p1 = rulerPoints[0];
        const p2 = rulerPoints[1];
        const distance = p1.distanceTo(p2) / 1000; // км
        const speed = parseFloat(document.getElementById('targetType').value);
        const hours = distance / speed;
        const minutes = hours * 60;
        const fullMinutes = Math.floor(minutes);
        const seconds = Math.round((minutes - fullMinutes) * 60);
        const resultDiv = document.getElementById('rulerResult');
        resultDiv.innerHTML = `📏 Расстояние: <span>${distance.toFixed(2)} км</span><br>⏱️ Время: <span>${fullMinutes} мин ${seconds} с</span>`;
    }

    function addRulerPoint(latlng) {
        if (rulerPoints.length >= 2) {
            clearRuler();
            rulerActive = true;
            document.getElementById('rulerToggleBtn').classList.add('active');
            map.getContainer().style.cursor = 'crosshair';
        }
        const marker = L.circleMarker(latlng, {
            radius: 8,
            color: rulerPoints.length === 0 ? '#2ecc71' : '#e74c3c',
            fillColor: rulerPoints.length === 0 ? '#2ecc71' : '#e74c3c',
            fillOpacity: 0.8,
            weight: 2
        }).addTo(map);
        marker.bindPopup(rulerPoints.length === 0 ? 'Точка А' : 'Точка Б').openPopup();
        rulerMarkers.push(marker);
        rulerPoints.push(latlng);
        
        if (rulerPoints.length === 2) {
            const linePoints = [rulerPoints[0], rulerPoints[1]];
            rulerLine = L.polyline(linePoints, { color: '#3498db', weight: 4, opacity: 0.8, dashArray: '5, 10' }).addTo(map);
            calculateAndDisplay();
        }
    }

    function enableRuler() {
        if (rulerActive) {
            clearRuler();
        }
        rulerActive = true;
        document.getElementById('rulerToggleBtn').classList.add('active');
        map.getContainer().style.cursor = 'crosshair';
        // Добавляем временный обработчик кликов
        map.on('click', onMapClickForRuler);
    }

    function disableRuler() {
        if (rulerActive) {
            map.off('click', onMapClickForRuler);
            clearRuler();
            rulerActive = false;
            document.getElementById('rulerToggleBtn').classList.remove('active');
            map.getContainer().style.cursor = '';
        }
    }

    function onMapClickForRuler(e) {
        if (!rulerActive) return;
        addRulerPoint(e.latlng);
        if (rulerPoints.length === 2) {
            // После двух кликов автоматически деактивируем линейку? Нет, оставим активной, но можно добавить сброс по кнопке
            // Пользователь может сбросить кнопкой "Сбросить".
        }
    }

    // Инициализация UI линейки
    document.getElementById('rulerToggleBtn').addEventListener('click', () => {
        if (rulerActive) {
            disableRuler();
        } else {
            enableRuler();
        }
    });
    document.getElementById('clearRulerBtn').addEventListener('click', () => {
        clearRuler();
        if (rulerActive) {
            // Если активна, остаёмся в режиме
            rulerActive = true;
            document.getElementById('rulerToggleBtn').classList.add('active');
            map.getContainer().style.cursor = 'crosshair';
        }
    });
    document.getElementById('targetType').addEventListener('change', () => {
        if (rulerPoints.length === 2) calculateAndDisplay();
    });

    // ===========================================
    // БОКОВОЕ МЕНЮ
    // ===========================================
    function initDrawer() {
        const drawer = document.getElementById('drawer');
        const btnOpen = document.getElementById('drawerBtn');
        const btnClose = document.getElementById('drawerClose');
        btnOpen.addEventListener('click', () => drawer.classList.add('open'));
        btnClose.addEventListener('click', () => drawer.classList.remove('open'));
        document.addEventListener('click', (e) => {
            if (drawer.classList.contains('open') && !drawer.contains(e.target) && !btnOpen.contains(e.target)) {
                drawer.classList.remove('open');
            }
        });
    }

    // ===========================================
    // СТАРТ
    // ===========================================
    const saved = localStorage.getItem("regionStates");
    if (saved) {
        try { regionStates = JSON.parse(saved); } catch(e) {}
    }
    refreshAlerts();
    setInterval(refreshAlerts, 30000);
    loadPolygons();
    document.getElementById('updateBtn').addEventListener('click', () => refreshAlerts());
    window.addEventListener('resize', () => map.invalidateSize());
    setTimeout(() => map.invalidateSize(), 200);
    map.on('zoomend', () => { if (map.getZoom() > 7) map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 }); });
    initDrawer();
</script>
</body>
</html>
