<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Alert Map - Границы регионов РФ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0e1a;
        font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
        overflow: hidden;
    }

    .clock {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 10px 20px;
        color: #e8eef2;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .time-main {
        font-size: 2rem;
        font-weight: 600;
        line-height: 1;
    }

    .date {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 18px;
        color: #e8eef2;
        font-size: 0.8rem;
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .legend-color {
        width: 28px;
        height: 18px;
        border-radius: 4px;
    }

    .custom-popup .leaflet-popup-content-wrapper {
        background: #1a1f2e;
        color: #e8eef2;
        border-radius: 12px;
        border-left: 4px solid;
    }

    .leaflet-control-attribution {
        display: none !important;
    }

    .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3000;
        background: rgba(0,0,0,0.95);
        padding: 20px 30px;
        border-radius: 12px;
        color: white;
        text-align: center;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .loader-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .time-main { font-size: 1.2rem; }
        .clock { padding: 5px 12px; top: 10px; right: 10px; }
        .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
        .legend-color { width: 20px; height: 14px; }
    }
</style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #28a745;"></div> <span>🟢 Внимание по БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #800020;"></div> <span>🏴‍☠️ Ракетная опасность</span></div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <span>Загрузка границ регионов...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ===========================================
    // ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ===========================================
    const map = L.map('map').setView([61, 95], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 10,
        minZoom: 2
    }).addTo(map);

    // ===========================================
    // ЦВЕТА ТРЕВОГ
    // ===========================================
    const colors = {
        clear: "#6c757d",
        droneDanger: "#ffc107",
        droneAttention: "#28a745",
        rocket: "#800020"
    };

    let currentAlertLevels = {};
    let regionsLayer = null;

    // ===========================================
    // ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('liveTime').innerHTML = `${hours}:${minutes}`;
        const options = { day: 'numeric', month: 'long', weekday: 'long' };
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', options);
    }
    updateClock();
    setInterval(updateClock, 60000);

    // ===========================================
    // ФОРМАТИРОВАНИЕ НАЗВАНИЙ
    // ===========================================
    function formatRegionName(name) {
        if (!name) return "";
        const words = name.split(' ');
        if (words.length === 1) return words[0];
        return `${words[0]}<br>${words.slice(1).join(' ')}`;
    }

    // ===========================================
    // РЕГИОНЫ И СИНОНИМЫ (расширенные для лучшего совпадения)
    // ===========================================
    const regionAliases = {
        "Москва": ["москва", "мск", "г москва", "город москва", "москве", "москвы", "москва город"],
        "Московская область": ["московская область", "подмосковье", "московская обл", "мо обл", "московской области"],
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб", "санкт-петербурга"],
        "Ленинградская область": ["ленинградская область", "ленинградская обл", "ленобласть", "ленинградской области"],
        "Белгородская область": ["белгородская область", "белгород", "белгородской"],
        "Брянская область": ["брянская область", "брянск", "брянской"],
        "Воронежская область": ["воронежская область", "воронеж", "воронежской"],
        "Курская область": ["курская область", "курск", "курской"],
        "Краснодарский край": ["краснодарский край", "кубань", "краснодарского"],
        "Ростовская область": ["ростовская область", "ростов-на-дону", "ростовской"],
        "Республика Татарстан": ["татарстан", "республика татарстан", "казань"],
        "Республика Крым": ["крым", "республика крым", "крыму"],
        "Калининградская область": ["калининградская область", "калининград", "калининградской"]
    };

    // ===========================================
    // ЗАГРУЗКА ГРАНИЦ
    // ===========================================
    const geojsonUrl = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
    const fallbackUrl = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
    
    function loadGeoJSON(url, isFallback = false) {
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log("GeoJSON загружен:", url);
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(error => {
                console.error("Ошибка загрузки из", url, error);
                if (!isFallback) {
                    loadGeoJSON(fallbackUrl, true);
                } else {
                    document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки границ. Проверьте соединение.</span>';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                    }, 3000);
                }
            });
    }

    function initRegionsLayer(geoJsonData) {
        regionsLayer = L.geoJSON(geoJsonData, {
            style: function(feature) {
                let regionName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                const level = currentAlertLevels[regionName] || 0;
                let fillColor = colors.clear;
                if (level === 1) fillColor = colors.droneDanger;
                else if (level === 2) fillColor = colors.droneAttention;
                else if (level === 3) fillColor = colors.rocket;
                return {
                    color: "#ffffff",
                    weight: 2.2,
                    fillColor: fillColor,
                    fillOpacity: 0.7,
                    smoothFactor: 0.5,
                    opacity: 0.9
                };
            },
            onEachFeature: function(feature, layer) {
                let regionName = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                if (regionName) {
                    updatePopup(layer, regionName);
                }
            }
        }).addTo(map);
        
        setTimeout(() => {
            map.flyTo([61, 95], 4.5, { duration: 1.2 });
        }, 200);
        
        fetchAndUpdateAlerts();
        setInterval(fetchAndUpdateAlerts, 35000);
    }

    function updatePopup(layer, regionName) {
        const level = currentAlertLevels[regionName] || 0;
        const formattedName = formatRegionName(regionName);
        let levelText = "", levelColor = "";
        if (level === 0) { levelText = "⚪ Отбой / Спокойно"; levelColor = "#adb5bd"; }
        else if (level === 1) { levelText = "🟡 Опасность БПЛА"; levelColor = "#ffc107"; }
        else if (level === 2) { levelText = "🟢 Внимание! Угроза БПЛА"; levelColor = "#6fcf97"; }
        else { levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; levelColor = "#c41e3a"; }
        
        layer.bindPopup(`
            <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                    ${formattedName}
                </div>
                <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
            </div>
        `, { className: 'custom-popup' });
    }

    function updateRegionColors() {
        if (!regionsLayer) return;
        regionsLayer.eachLayer(layer => {
            let regionName = layer.feature?.properties?.name || layer.feature?.properties?.NAME || layer.feature?.properties?.admin_name || "";
            const level = currentAlertLevels[regionName] || 0;
            let fillColor = colors.clear;
            if (level === 1) fillColor = colors.droneDanger;
            else if (level === 2) fillColor = colors.droneAttention;
            else if (level === 3) fillColor = colors.rocket;
            
            layer.setStyle({
                fillColor: fillColor,
                fillOpacity: 0.7,
                color: "#ffffff",
                weight: 2.2
            });
            updatePopup(layer, regionName);
        });
    }

    // ===========================================
    // ПАРСИНГ TELEGRAM (только последние 50 сообщений)
    // ===========================================
    async function parseTelegramAlerts() {
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/radarrussiia";
        
        try {
            const resp = await fetch(proxyUrl + encodeURIComponent(channel));
            if (!resp.ok) throw new Error("Ошибка загрузки");
            let html = await resp.text();
            
            // Собираем все ID постов и текст
            const postRegex = /data-post="radarrussiia\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            let posts = [];
            let m;
            while ((m = postRegex.exec(html)) !== null) {
                posts.push({
                    id: parseInt(m[1]),
                    text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
                });
            }
            
            // Сортируем по убыванию ID (новые сверху)
            posts.sort((a,b) => b.id - a.id);
            
            // Берём только последние 50 сообщений (это около 2-3 часов)
            const maxPosts = 60;
            const recentPosts = posts.slice(0, maxPosts);
            console.log(`Получено ${posts.length} сообщений, обрабатываем ${recentPosts.length} самых новых`);
            
            // Для каждого региона храним последний статус (только если он был в этом окне)
            const regionStatus = {}; // { region: { level, postId } }
            
            for (const post of recentPosts) {
                const text = post.text;
                
                // Ищем регионы в тексте
                let matchedRegions = [];
                for (const [official, keywords] of Object.entries(regionAliases)) {
                    if (keywords.some(kw => text.includes(kw))) {
                        matchedRegions.push(official);
                    }
                }
                if (matchedRegions.length === 0) continue;
                
                // Определяем тип сообщения
                let level = null;
                const isOtboy = /отбой|снята|завершена|отменена|нет угрозы/i.test(text);
                const isRocket = /ракетная опасность|ракетная тревога|баллистическая ракета|крылатая ракета/i.test(text);
                // Внимание по БПЛА (зеленый) – фразы типа "внимание! угроза бпла", "воздушная тревога"
                const isDroneAttention = /внимание.*бпла|бпла.*внимание|угроза бпла|воздушная тревога/i.test(text);
                // Опасность БПЛА (желтый) – просто "бпла", "беспилотник", но не "внимание"
                const isDroneDanger = /\bбпла?\b|беспилот|дрон|угроза атаки/i.test(text);
                
                if (isOtboy) {
                    level = 0;
                } else if (isRocket) {
                    level = 3;
                } else if (isDroneAttention) {
                    level = 2;
                } else if (isDroneDanger) {
                    level = 1;
                }
                
                // Если не определили уровень, пропускаем
                if (level === null) continue;
                
                for (const region of matchedRegions) {
                    const existing = regionStatus[region];
                    // Если у региона нет статуса или это сообщение новее, обновляем
                    if (!existing || existing.postId < post.id) {
                        regionStatus[region] = { level, postId: post.id };
                    }
                }
            }
            
            // Преобразуем в финальный объект: только те регионы, которые были в последних постах
            const finalAlerts = {};
            for (const [region, data] of Object.entries(regionStatus)) {
                finalAlerts[region] = data.level;
            }
            console.log("Актуальные тревоги (только из последних сообщений):", finalAlerts);
            return finalAlerts;
        } catch (err) {
            console.error("Парсинг ошибка:", err);
            return {};
        }
    }
    
    async function fetchAndUpdateAlerts() {
        try {
            const newAlerts = await parseTelegramAlerts();
            // Сбрасываем все старые тревоги, оставляем только то, что пришло
            const newCurrent = {};
            for (const [reg, lvl] of Object.entries(newAlerts)) {
                newCurrent[reg] = lvl;
            }
            // Сравниваем с текущими и обновляем только если изменилось
            let changed = false;
            for (const reg in newCurrent) {
                if (currentAlertLevels[reg] !== newCurrent[reg]) {
                    changed = true;
                    break;
                }
            }
            if (changed) {
                currentAlertLevels = newCurrent;
                updateRegionColors();
                localStorage.setItem("alertCache", JSON.stringify(currentAlertLevels));
            } else if (Object.keys(currentAlertLevels).length === 0 && Object.keys(newCurrent).length > 0) {
                currentAlertLevels = newCurrent;
                updateRegionColors();
                localStorage.setItem("alertCache", JSON.stringify(currentAlertLevels));
            }
        } catch(e) {
            console.warn("Ошибка обновления", e);
            const cached = localStorage.getItem("alertCache");
            if (cached && Object.keys(currentAlertLevels).length === 0) {
                try {
                    currentAlertLevels = JSON.parse(cached);
                    updateRegionColors();
                } catch(er) {}
            }
        }
    }
    
    // Запуск
    loadGeoJSON(geojsonUrl);
    
    map.on('zoomend', function() {
        if (map.getZoom() > 7) {
            map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 });
        }
    });
    
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && regionsLayer) {
            fetchAndUpdateAlerts();
        }
    });
</script>
</body>
</html>
