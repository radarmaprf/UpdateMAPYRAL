<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Air Alert Map — Тревоги РФ (быстрое обновление)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .clock { position: fixed; top: 20px; right: 20px; z-index: 2000; background: rgba(10,14,26,0.85); backdrop-filter: blur(8px); border-radius: 20px; padding: 8px 18px; color: #e8eef2; font-family: monospace; text-align: center; border: 1px solid rgba(255,255,255,0.15); }
        .time-main { font-size: 1.8rem; font-weight: 600; line-height: 1; }
        .date { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }
        .legend { position: fixed; bottom: 20px; left: 20px; z-index: 2000; background: rgba(10,14,26,0.85); backdrop-filter: blur(8px); border-radius: 12px; padding: 10px 16px; color: #e8eef2; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 24px; height: 16px; border-radius: 4px; }
        .update-btn { position: fixed; bottom: 20px; right: 20px; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); border-radius: 40px; padding: 10px 22px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; font-family: monospace; }
        .update-btn:hover { background: #28a745; border-color: #28a745; }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 20px; padding: 4px 14px; color: #ccc; font-size: 0.7rem; font-family: monospace; white-space: nowrap; text-align: center; }
        .alert-list-btn { position: fixed; top: 20px; left: 20px; z-index: 2000; background: rgba(220,53,69,0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); border-radius: 40px; padding: 8px 18px; color: white; font-size: 0.9rem; font-weight: bold; cursor: pointer; font-family: monospace; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .alert-list-btn:hover { background: #b02a37; transform: scale(1.02); }
        .alerts-panel { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: rgba(10,14,26,0.95); backdrop-filter: blur(12px); z-index: 3000; transition: left 0.3s ease; border-right: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; font-family: monospace; box-shadow: 2px 0 20px rgba(0,0,0,0.5); }
        .alerts-panel.open { left: 0; }
        .panel-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); }
        .panel-header h3 { color: #ffc107; font-size: 1.2rem; margin: 0; }
        .panel-actions { display: flex; gap: 12px; }
        .copy-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 1.1rem; cursor: pointer; padding: 4px 10px; border-radius: 20px; transition: 0.2s; font-family: monospace; }
        .copy-btn:hover { background: #28a745; }
        .close-panel { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; line-height: 1; }
        .close-panel:hover { color: #ff6b6b; }
        .panel-content { flex: 1; overflow-y: auto; padding: 12px 8px; }
        .alert-region-item { background: rgba(30,35,50,0.7); margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 4px solid; }
        .alert-region-item.rocket { border-left-color: #8B0000; }
        .alert-region-item.droneAlert { border-left-color: #dc3545; }
        .alert-region-item.droneDanger { border-left-color: #ffc107; }
        .region-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; color: #fff; }
        .alert-type { font-size: 0.8rem; display: inline-block; padding: 2px 8px; border-radius: 20px; }
        .alert-type.rocket { background: #8B000030; color: #ffaaaa; border: 1px solid #8B0000; }
        .alert-type.droneAlert { background: #dc354520; color: #ff8888; border: 1px solid #dc3545; }
        .alert-type.droneDanger { background: #ffc10720; color: #ffc107; border: 1px solid #ffc107; }
        .empty-message { color: #aaa; text-align: center; padding: 30px 20px; font-style: italic; }
        .copy-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; z-index: 4000; font-family: monospace; animation: fadeOut 2s forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .custom-popup .leaflet-popup-content-wrapper { background: #1a1f2e; color: #e8eef2; border-radius: 12px; border-left: 4px solid; }
        .leaflet-control-attribution { display: none !important; }
        @media (max-width: 600px) {
            .time-main { font-size: 1.2rem; }
            .clock { padding: 4px 12px; top: 10px; right: 10px; }
            .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
            .update-btn { bottom: 10px; right: 10px; padding: 8px 16px; font-size: 0.85rem; }
            .alert-list-btn { top: 10px; left: 10px; padding: 5px 14px; font-size: 0.8rem; }
            .alerts-panel { width: 85%; left: -85%; }
            .copy-btn { font-size: 0.9rem; padding: 2px 8px; }
        }
    </style>
</head>
<body>
<div class="clock"><div class="time-main" id="liveTime">--:--</div><div class="date" id="liveDate">--</div></div>
<button class="alert-list-btn" id="openPanelBtn">⚠️ Список тревог</button>
<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #dc3545;"></div> <span>🔴 Тревога БПЛА (фиксация/ПВО)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #8B0000;"></div> <span>🟤 Ракетная опасность</span></div>
</div>
<button class="update-btn" id="updateBtn">🔄 Обновить</button>
<div class="status" id="status">Загрузка...</div>
<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>
<div id="alertsPanel" class="alerts-panel">
    <div class="panel-header"><h3>🚨 Регионы с тревогами</h3><div class="panel-actions"><button class="copy-btn" id="copyAlertsBtn">📋 Копировать</button><button class="close-panel" id="closePanelBtn">&times;</button></div></div>
    <div class="panel-content" id="panelContent"><div class="empty-message">Нет активных тревог</div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    // ---------------------- КАРТА --------------------------
    const map = L.map('map').setView([62, 105], 3.8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '', subdomains: 'abcd', maxZoom: 10, minZoom: 2 }).addTo(map);

    let polygonsLayer = null;
    let lastUpdateTime = null;
    const colors = { clear: "#6c757d", droneDanger: "#ffc107", droneAlert: "#dc3545", rocket: "#8B0000" };

    // Прокси (быстрые)
    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://cors-anywhere.herokuapp.com/"
    ];

    // ---------------------- ОПТИМИЗАЦИЯ: только активные регионы (европейская часть + Урал) ------------------
    // При желании можно вернуть все регионы, раскомментировав строки в конце объекта.
    const regionAliases = {
        "Москва": ["москва"],
        "Московская область": ["московская область", "подмосковье"],
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб"],
        "Ленинградская область": ["ленинградская область", "ленобласть"],
        "Белгородская область": ["белгородская область", "белгород"],
        "Брянская область": ["брянская область", "брянск"],
        "Владимирская область": ["владимирская область", "владимир"],
        "Воронежская область": ["воронежская область", "воронеж"],
        "Ивановская область": ["ивановская область", "иваново"],
        "Калужская область": ["калужская область", "калуга"],
        "Костромская область": ["костромская область", "кострома"],
        "Курская область": ["курская область", "курск"],
        "Липецкая область": ["липецкая область", "липецк"],
        "Нижегородская область": ["нижегородская область", "нижний новгород"],
        "Новгородская область": ["новгородская область", "великий новгород", "новгород"],
        "Орловская область": ["орловская область", "орёл"],
        "Пензенская область": ["пензенская область", "пенза"],
        "Псковская область": ["псковская область", "псков"],
        "Рязанская область": ["рязанская область", "рязань"],
        "Смоленская область": ["смоленская область", "смоленск"],
        "Тамбовская область": ["тамбовская область", "тамбов"],
        "Тверская область": ["тверская область", "тверь"],
        "Тульская область": ["тульская область", "тула"],
        "Ярославская область": ["ярославская область", "ярославль"],
        "Краснодарский край": ["краснодарский край", "краснодар", "кубань"],
        "Ставропольский край": ["ставропольский край", "ставрополь"],
        "Ростовская область": ["ростовская область", "ростов-на-дону", "ростов"],
        "Волгоградская область": ["волгоградская область", "волгоград"],
        "Татарстан": ["татарстан", "республика татарстан", "казань"],
        "Башкортостан": ["башкортостан", "республика башкортостан", "уфа"],
        "Самарская область": ["самарская область", "самара"],
        "Саратовская область": ["саратовская область", "саратов"],
        "Ульяновская область": ["ульяновская область"],
        "Свердловская область": ["свердловская область", "екатеринбург"],
        "Челябинская область": ["челябинская область", "челябинск"],
        "Курганская область": ["курганская область", "курган"],
        "Оренбургская область": ["оренбургская область", "оренбург"],
        "Пермский край": ["пермский край", "пермь"],
        "Республика Крым": ["крым", "республика крым"],
        "Дагестан": ["дагестан", "республика дагестан", "махачкала"],
        "Адыгея": ["адыгея", "республика адыгея", "майкоп"]
    };

    const allRegionNames = Object.keys(regionAliases);
    
    // Единый супер-регекс для поиска регионов
    let masterRegionRegex = null;
    let regionMapFromMatch = new Map(); // сопоставление найденной строки -> официальное имя
    
    function buildMasterRegex() {
        const allKeywords = [];
        for (const [official, keywords] of Object.entries(regionAliases)) {
            for (const kw of keywords) {
                const escaped = kw.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                allKeywords.push(escaped);
                regionMapFromMatch.set(escaped.toLowerCase(), official);
            }
        }
        // сортируем по длине (чтобы длинные ключевые фразы перекрывали короткие)
        allKeywords.sort((a,b) => b.length - a.length);
        const pattern = `\\b(${allKeywords.join('|')})\\b`;
        masterRegionRegex = new RegExp(pattern, 'gi');
    }
    buildMasterRegex();

    function extractRegionsFromText(text) {
        const matches = new Set();
        let match;
        // сбросим lastIndex
        masterRegionRegex.lastIndex = 0;
        while ((match = masterRegionRegex.exec(text)) !== null) {
            const matchedWord = match[1].toLowerCase();
            const official = regionMapFromMatch.get(matchedWord);
            if (official) matches.add(official);
        }
        return Array.from(matches);
    }

    // ---------------------- ИНКРЕМЕНТАЛЬНОЕ ОБНОВЛЕНИЕ (кешируем lastPostId) ------------------
    let regionStatus = {};
    let lastKnownPostId = 0; // наибольший ID поста, который мы обработали

    // Загружаем сохранённый статус и lastPostId
    const savedStatus = localStorage.getItem('regionStatus');
    const savedPostId = localStorage.getItem('lastPostId');
    if (savedStatus) {
        try {
            regionStatus = JSON.parse(savedStatus);
        } catch(e) {}
    }
    if (savedPostId) lastKnownPostId = parseInt(savedPostId) || 0;

    // Функция загрузки ОДНОЙ страницы (последние посты)
    async function fetchSinglePage(url) {
        for (let proxy of proxies) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const proxyUrl = proxy + encodeURIComponent(url);
                const response = await fetch(proxyUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.ok) {
                    const text = await response.text();
                    if (text && text.length > 500) return text;
                }
            } catch(e) { console.warn("Прокси ошибка", e); }
        }
        throw new Error("Не удалось загрузить страницу");
    }

    // Парсим посты из HTML (возвращает массив {id, text})
    function parsePostsFromHtml(html) {
        const posts = [];
        const regex = /data-post="(?:[^\/]+)\/(\d+)".*?(?:tgme_widget_message_text|tgme_widget_message_caption)[^>]*>(.*?)<\/div>/gis;
        let match;
        while ((match = regex.exec(html)) !== null) {
            const id = parseInt(match[1]);
            let text = match[2].replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase();
            if (text) posts.push({ id, text });
        }
        return posts;
    }

    // Классификация сообщения
    function classifyMessage(text) {
        const isGlobalCancel = /отбой.*бпла.*всех.*регион|снята угроза бпла во всех регионах|отбой опасности по бпла во всех/i.test(text);
        if (isGlobalCancel) return { type: 'globalClear' };
        
        const isOtboy = /отбой|нет угрозы|угрозы нет|угроза снята/i.test(text);
        const isRocket = /ракетн(?:ая|ую|ой)\s*(?:опасность|тревога)|баллистическ(?:ая|ую)|крылат(?:ая|ую)/i.test(text);
        const isDroneDanger = /бпла|беспилотн(?:ик|ый|ая)|опасность\s*бпла|угроза\s*бпла/i.test(text);
        const isFixation = /фиксаци[яи]|работа\s*пво|пво\s*работает|заходит группа|сбитие|тревога\s*бпла/i.test(text);
        
        if (isOtboy) return { type: 'clear' };
        if (isRocket) return { type: 'alert', danger: 'rocket' };
        if (isFixation) return { type: 'alert', danger: 'droneAlert' };
        if (isDroneDanger) return { type: 'alert', danger: 'droneDanger' };
        return null;
    }

    // Обработка одного поста (обновление tempStatus)
    function processPost(post, tempStatus, isIncremental = false) {
        const classification = classifyMessage(post.text);
        if (!classification) return false;

        if (classification.type === 'globalClear') {
            // сброс всех регионов
            for (const region of allRegionNames) {
                tempStatus[region] = { rocket: false, droneAlert: false, droneDanger: false, postId: post.id };
            }
            return true;
        }

        const regions = extractRegionsFromText(post.text);
        if (regions.length === 0) return false;

        for (const region of regions) {
            const existing = tempStatus[region];
            let newStatus = { rocket: false, droneAlert: false, droneDanger: false, postId: post.id };
            if (classification.type === 'clear') {
                // отбой
                newStatus = { rocket: false, droneAlert: false, droneDanger: false, postId: post.id };
            } else if (classification.type === 'alert') {
                if (classification.danger === 'rocket') newStatus.rocket = true;
                else if (classification.danger === 'droneAlert') newStatus.droneAlert = true;
                else if (classification.danger === 'droneDanger') newStatus.droneDanger = true;
            }
            if (!existing || post.id > existing.postId) {
                tempStatus[region] = newStatus;
            } else if (post.id === existing.postId) {
                // объединение типов из одного поста
                if (classification.danger === 'rocket') existing.rocket = true;
                if (classification.danger === 'droneAlert') existing.droneAlert = true;
                if (classification.danger === 'droneDanger') existing.droneDanger = true;
            }
        }
        return true;
    }

    // Загрузка всех старых постов (при первом запуске) - максимум 180 постов через пагинацию
    async function fetchFullHistory(channelUsername, maxPosts = 180) {
        let allPosts = [];
        let nextUrl = `https://t.me/s/${channelUsername}`;
        let oldestId = null;
        let pagesLoaded = 0;
        const maxPages = 10; // страниц по ~20 постов = 200
    
        while (pagesLoaded < maxPages && allPosts.length < maxPosts) {
            pagesLoaded++;
            const html = await fetchSinglePage(nextUrl);
            if (!html) break;
            const pagePosts = parsePostsFromHtml(html);
            if (pagePosts.length === 0) break;
            // добавляем только те, которых ещё нет
            const existingIds = new Set(allPosts.map(p => p.id));
            const newPosts = pagePosts.filter(p => !existingIds.has(p.id));
            allPosts.push(...newPosts);
            if (newPosts.length === 0) break;
            const currentOldest = Math.min(...pagePosts.map(p => p.id));
            if (currentOldest === oldestId) break;
            oldestId = currentOldest;
            nextUrl = `https://t.me/s/${channelUsername}?before=${oldestId}`;
            // без задержки
        }
        // сортируем по возрастанию id (старые -> новые)
        allPosts.sort((a,b) => a.id - b.id);
        console.log(`Загружено всего постов: ${allPosts.length}`);
        return allPosts;
    }

    // Загрузка ТОЛЬКО новых постов (начиная с lastKnownPostId)
    async function fetchNewPosts(channelUsername) {
        const url = `https://t.me/s/${channelUsername}`;
        const html = await fetchSinglePage(url);
        if (!html) return [];
        const posts = parsePostsFromHtml(html);
        // фильтруем посты с id > lastKnownPostId
        const newPosts = posts.filter(p => p.id > lastKnownPostId);
        newPosts.sort((a,b) => a.id - b.id);
        return newPosts;
    }

    // Основная функция обновления (инкрементальная)
    async function refreshAlerts(incremental = true) {
        const statusDiv = document.getElementById('status');
        const channel = 'vrv_radar';
        
        try {
            let postsToProcess = [];
            let isFullScan = false;
            
            if (incremental && lastKnownPostId > 0) {
                statusDiv.innerHTML = `🔄 Проверка новых постов (после ID ${lastKnownPostId})...`;
                postsToProcess = await fetchNewPosts(channel);
                if (postsToProcess.length === 0) {
                    statusDiv.innerHTML = `✅ Новых постов нет (актуально на ${new Date().toLocaleTimeString()})`;
                    setTimeout(() => {
                        if (statusDiv.innerHTML.includes('✅')) 
                            statusDiv.innerHTML = `Актуально на ${lastUpdateTime?.toLocaleTimeString() || '--:--'}`;
                    }, 2000);
                    return;
                }
                statusDiv.innerHTML = `🔄 Найдено ${postsToProcess.length} новых постов, обрабатываю...`;
            } else {
                statusDiv.innerHTML = `🔄 Первичная загрузка (до 180 постов)...`;
                postsToProcess = await fetchFullHistory(channel, 180);
                isFullScan = true;
            }
            
            if (postsToProcess.length === 0 && !isFullScan) return;
            
            // Временно копируем старый статус, будем обновлять поверх
            let tempStatus = JSON.parse(JSON.stringify(regionStatus));
            let maxId = lastKnownPostId;
            
            for (const post of postsToProcess) {
                processPost(post, tempStatus, !isFullScan);
                if (post.id > maxId) maxId = post.id;
            }
            
            regionStatus = tempStatus;
            lastKnownPostId = maxId;
            
            // Сохраняем в localStorage
            localStorage.setItem('regionStatus', JSON.stringify(regionStatus));
            localStorage.setItem('lastPostId', lastKnownPostId.toString());
            
            updateMapAndPanel();
            lastUpdateTime = new Date();
            statusDiv.innerHTML = `✅ Готово (${lastUpdateTime.toLocaleTimeString()}, обработано ${postsToProcess.length} постов)`;
            setTimeout(() => {
                if (statusDiv.innerHTML.startsWith('✅')) 
                    statusDiv.innerHTML = `Актуально на ${lastUpdateTime.toLocaleTimeString()}`;
            }, 3000);
        } catch (err) {
            console.error(err);
            statusDiv.innerHTML = `⚠️ Ошибка обновления${lastUpdateTime ? ` (последнее ${lastUpdateTime.toLocaleTimeString()})` : ''}`;
        }
    }

    // ---------------------- ФУНКЦИИ КАРТЫ ------------------
    function getEffectiveStatus(region) {
        const st = regionStatus[region];
        if (!st) return { rocket: false, droneAlert: false, droneDanger: false };
        return { rocket: st.rocket, droneAlert: st.droneAlert, droneDanger: st.droneDanger };
    }

    function getFillColor(effective) {
        if (effective.rocket) return colors.rocket;
        if (effective.droneAlert) return colors.droneAlert;
        if (effective.droneDanger) return colors.droneDanger;
        return colors.clear;
    }

    function getPopupContent(regionName, effective) {
        let text = "", color = "";
        if (effective.rocket) { text = "🟤 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!"; color = "#ffaaaa"; }
        else if (effective.droneAlert) { text = "🔴 ТРЕВОГА БПЛА! Фиксация / Работа ПВО"; color = "#ff8888"; }
        else if (effective.droneDanger) { text = "🟡 Опасность БПЛА в регионе"; color = "#ffc107"; }
        else { text = "⚪ Отбой / Спокойно"; color = "#adb5bd"; }
        return `<div style="font-family:'Segoe UI';min-width:160px;"><b>${regionName}</b><br><span style="color:${color}">${text}</span></div>`;
    }

    function updateMapAndPanel() {
        if (!polygonsLayer) return;
        polygonsLayer.eachLayer(layer => {
            const geoName = layer.regionName;
            if (!geoName) return;
            const effective = getEffectiveStatus(geoName);
            layer.setStyle({ fillColor: getFillColor(effective), fillOpacity: 0.7 });
            const popup = layer.getPopup();
            if (popup) popup.setContent(getPopupContent(geoName, effective));
        });
        updateAlertsPanel();
    }

    function updateAlertsPanel() {
        const panelDiv = document.getElementById('panelContent');
        const active = [];
        for (const [region, st] of Object.entries(regionStatus)) {
            if (st.rocket) active.push({ name: region, type: 'rocket', label: '🟤 Ракетная опасность', priority: 1 });
            else if (st.droneAlert) active.push({ name: region, type: 'droneAlert', label: '🔴 Тревога БПЛА (фиксация/ПВО)', priority: 2 });
            else if (st.droneDanger) active.push({ name: region, type: 'droneDanger', label: '🟡 Опасность БПЛА', priority: 3 });
        }
        if (active.length === 0) {
            panelDiv.innerHTML = '<div class="empty-message">✨ Нет активных тревог</div>';
            return;
        }
        active.sort((a,b) => a.priority - b.priority);
        panelDiv.innerHTML = active.map(r => `
            <div class="alert-region-item ${r.type}">
                <div class="region-name">${r.name}</div>
                <div class="alert-type ${r.type}">${r.label}</div>
            </div>
        `).join('');
    }

    // ---------------------- КОПИРОВАНИЕ ------------------
    function getCurrentDateTimeString() {
        const now = new Date();
        return `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    }
    async function copyAlertsList() {
        const active = [];
        for (const [region, st] of Object.entries(regionStatus)) {
            if (st.rocket) active.push({ name: region, label: '🟤 Ракетная опасность', priority: 1 });
            else if (st.droneAlert) active.push({ name: region, label: '🔴 Тревога БПЛА (фиксация/работа ПВО)', priority: 2 });
            else if (st.droneDanger) active.push({ name: region, label: '🟡 Опасность БПЛА', priority: 3 });
        }
        if (active.length === 0) { showToast("✨ Нет активных тревог"); return; }
        active.sort((a,b) => a.priority - b.priority);
        const lines = active.map(a => `${a.label}: ${a.name}`);
        const text = `📅 Активные тревоги на ${getCurrentDateTimeString()}\n${lines.join('\n')}`;
        try { await navigator.clipboard.writeText(text); showToast(`📋 Скопировано ${active.length} тревог`); }
        catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast(`📋 Скопировано ${active.length} тревог`); }
    }
    function showToast(msg) {
        const old = document.querySelector('.copy-toast');
        if (old) old.remove();
        const toast = document.createElement('div'); toast.className = 'copy-toast'; toast.textContent = msg;
        document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000);
    }

    // ---------------------- ЗАГРУЗКА ГРАНИЦ ------------------
    function loadPolygons() {
        const url = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
        const fallback = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
        fetch(url).then(r => r.ok ? r.json() : Promise.reject()).then(data => applyPolygons(data))
            .catch(() => fetch(fallback).then(r => r.json()).then(data => applyPolygons(data)).catch(e => console.warn("Границы не загружены", e)));
    }

    function applyPolygons(geoData) {
        if (polygonsLayer) map.removeLayer(polygonsLayer);
        polygonsLayer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties?.name || feature.properties?.NAME || feature.properties?.admin_name || "";
                const norm = normalizeRegionName(name);
                const effective = getEffectiveStatus(norm);
                return { color: "#fff", weight: 2.2, fillColor: getFillColor(effective), fillOpacity: 0.7, smoothFactor: 0.5 };
            },
            onEachFeature: (f, layer) => {
                let name = f.properties?.name || f.properties?.NAME || f.properties?.admin_name || "";
                if (name) {
                    const norm = normalizeRegionName(name);
                    layer.regionName = norm;
                    const effective = getEffectiveStatus(norm);
                    layer.bindPopup(getPopupContent(norm, effective), { className: 'custom-popup' });
                }
            }
        }).addTo(map);
        try { map.fitBounds(polygonsLayer.getBounds()); } catch(e) { map.setView([62, 105], 3.8); }
        document.getElementById('status').innerHTML = 'Границы загружены';
        updateMapAndPanel();
    }

    function normalizeRegionName(geoName) {
        const map = {
            "г. Москва": "Москва", "Москва": "Москва", "Санкт-Петербург": "Санкт-Петербург",
            "Республика Татарстан": "Татарстан", "Республика Башкортостан": "Башкортостан",
            "Республика Крым": "Крым", "Республика Адыгея": "Адыгея", "Чувашская Республика": "Чувашская Республика",
            "Удмуртская Республика": "Удмуртская Республика", "Республика Мордовия": "Республика Мордовия",
            "Республика Марий Эл": "Марий Эл", "Чеченская Республика": "Чечня", "Республика Дагестан": "Дагестан"
        };
        return map[geoName] || geoName;
    }

    // ---------------------- ЧАСЫ ------------------
    function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru', { day:'numeric', month:'long', weekday:'long' });
    }
    updateClock(); setInterval(updateClock, 60000);

    // ---------------------- СТАРТ ------------------
    loadPolygons();
    setTimeout(() => {
        refreshAlerts(true).then(() => {
            setInterval(() => refreshAlerts(true), 60000);
        });
    }, 2000);

    document.getElementById('updateBtn').addEventListener('click', () => refreshAlerts(true));
    const panel = document.getElementById('alertsPanel');
    document.getElementById('openPanelBtn').addEventListener('click', () => { panel.classList.add('open'); updateAlertsPanel(); });
    document.getElementById('closePanelBtn').addEventListener('click', () => panel.classList.remove('open'));
    document.getElementById('copyAlertsBtn').addEventListener('click', () => copyAlertsList());
    document.addEventListener('click', (e) => { if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== document.getElementById('openPanelBtn')) panel.classList.remove('open'); });
    window.addEventListener('resize', () => map.invalidateSize());
})();
</script>
</body>
</html>
