<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Alert Map - Границы регионов РФ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0e1a;
        font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
        overflow: hidden;
    }

    .clock {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 10px 20px;
        color: #e8eef2;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .time-main {
        font-size: 2rem;
        font-weight: 600;
        line-height: 1;
    }

    .date {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(10, 14, 26, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 18px;
        color: #e8eef2;
        font-size: 0.8rem;
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .legend-color {
        width: 28px;
        height: 18px;
        border-radius: 4px;
    }

    .custom-popup .leaflet-popup-content-wrapper {
        background: #1a1f2e;
        color: #e8eef2;
        border-radius: 12px;
        border-left: 4px solid;
    }

    .leaflet-control-attribution {
        display: none !important;
    }

    .loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3000;
        background: rgba(0,0,0,0.95);
        padding: 20px 30px;
        border-radius: 12px;
        color: white;
        text-align: center;
        font-family: monospace;
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .loader-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
        .time-main { font-size: 1.2rem; }
        .clock { padding: 5px 12px; top: 10px; right: 10px; }
        .legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
        .legend-color { width: 20px; height: 14px; }
    }
</style>
</head>
<body>

<div class="clock">
    <div class="time-main" id="liveTime">--:--</div>
    <div class="date" id="liveDate">--</div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color" style="background: #6c757d;"></div> <span>⚪ Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #28a745;"></div> <span>🟢 Внимание по БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffc107;"></div> <span>🟡 Опасность БПЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #800020;"></div> <span>🏴‍☠️ Ракетная опасность</span></div>
</div>

<div id="map" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"></div>

<div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <span>Загрузка границ регионов...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ===========================================
    // ИНИЦИАЛИЗАЦИЯ КАРТЫ
    // ===========================================
    const map = L.map('map').setView([61, 95], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 10,
        minZoom: 2
    }).addTo(map);

    // ===========================================
    // НОВЫЕ ЦВЕТА ТРЕВОГ
    // 0 - отбой (серый)
    // 1 - опасность БПЛА (жёлтый)
    // 2 - внимание по БПЛА (зелёный)
    // 3 - ракетная опасность (бордовый)
    // ===========================================
    const colors = {
        clear: "#6c757d",      // отбой
        droneDanger: "#ffc107", // опасность БПЛА (жёлтый)
        droneAttention: "#28a745", // внимание по БПЛА (зелёный)
        rocket: "#800020"      // ракетная опасность
    };

    let currentAlertLevels = {};
    let regionsLayer = null;

    // ===========================================
    // ЧАСЫ
    // ===========================================
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('liveTime').innerHTML = `${hours}:${minutes}`;
        const options = { day: 'numeric', month: 'long', weekday: 'long' };
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('ru-RU', options);
    }
    updateClock();
    setInterval(updateClock, 60000);

    // ===========================================
    // ФОРМАТИРОВАНИЕ НАЗВАНИЙ
    // ===========================================
    function formatRegionName(name) {
        if (!name) return "";
        const words = name.split(' ');
        if (words.length === 1) return words[0];
        return `${words[0]}<br>${words.slice(1).join(' ')}`;
    }

    // ===========================================
    // РЕГИОНЫ ДЛЯ ПАРСИНГА (исправлены Москва и Лен.область)
    // ===========================================
    const regionAliases = {
        "Москва": ["москва", "мск", "г москва", "город москва", "москве", "москвы"],
        "Московская область": ["московская область", "подмосковье", "московская обл", "мо обл"],
        "Санкт-Петербург": ["санкт-петербург", "питер", "спб"],
        "Ленинградская область": ["ленинградская область", "ленинградская обл", "ленобласть", "ленинградской"],
        "Белгородская область": ["белгородская область", "белгород"],
        "Брянская область": ["брянская область", "брянск"],
        "Владимирская область": ["владимирская область", "владимирская"],
        "Воронежская область": ["воронежская область", "воронеж"],
        "Ивановская область": ["ивановская область"],
        "Калужская область": ["калужская область", "калуга"],
        "Костромская область": ["костромская область", "кострома"],
        "Курская область": ["курская область", "курск"],
        "Липецкая область": ["липецкая область", "липецк"],
        "Нижегородская область": ["нижегородская область", "нижний новгород"],
        "Новгородская область": ["новгородская область", "новгород"],
        "Орловская область": ["орловская область", "орел"],
        "Пензенская область": ["пензенская область", "пенза"],
        "Псковская область": ["псковская область", "псков"],
        "Рязанская область": ["рязанская область", "рязань"],
        "Смоленская область": ["смоленская область", "смоленск"],
        "Тамбовская область": ["тамбовская область", "тамбов"],
        "Тверская область": ["тверская область", "тверь"],
        "Тульская область": ["тульская область", "тула"],
        "Ярославская область": ["ярославская область", "ярославль"],
        "Краснодарский край": ["краснодарский край", "кубань"],
        "Ставропольский край": ["ставропольский край", "ставрополье"],
        "Ростовская область": ["ростовская область", "ростов-на-дону"],
        "Волгоградская область": ["волгоградская область", "волгоград"],
        "Астраханская область": ["астраханская область", "астрахань"],
        "Республика Татарстан": ["татарстан", "республика татарстан"],
        "Республика Башкортостан": ["башкортостан", "республика башкортостан"],
        "Республика Крым": ["крым", "республика крым"],
        "Калининградская область": ["калининградская область", "калининград"],
        "Свердловская область": ["свердловская область", "екатеринбург"],
        "Челябинская область": ["челябинская область", "челябинск"],
        "Новосибирская область": ["новосибирская область", "новосибирск"],
        "Омская область": ["омская область", "омск"],
        "Томская область": ["томская область", "томск"],
        "Кемеровская область": ["кемеровская область", "кемерово"],
        "Иркутская область": ["иркутская область", "иркутск"],
        "Красноярский край": ["красноярский край", "красноярск"],
        "Алтайский край": ["алтайский край", "барнаул"],
        "Приморский край": ["приморский край", "владивосток"],
        "Хабаровский край": ["хабаровский край", "хабаровск"],
        "Самарская область": ["самарская область", "самара"],
        "Саратовская область": ["саратовская область", "саратов"],
        "Пермский край": ["пермский край", "пермь"],
        "Ханты-Мансийский АО": ["хмао", "ханты-мансийский"],
        "Ямало-Ненецкий АО": ["янао", "ямало-ненецкий"]
    };

    // ===========================================
    // ЗАГРУЗКА ГРАНИЦ С GITHUB
    // ===========================================
    const geojsonUrl = "https://raw.githubusercontent.com/azatkh/ru-regions-geojson/main/regions.geojson";
    const fallbackUrl = "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/russia.geojson";
    
    function loadGeoJSON(url, isFallback = false) {
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log("GeoJSON загружен:", url);
                document.getElementById('loader').style.display = 'none';
                initRegionsLayer(data);
            })
            .catch(error => {
                console.error("Ошибка загрузки из", url, error);
                if (!isFallback) {
                    console.log("Пробуем запасной источник...");
                    loadGeoJSON(fallbackUrl, true);
                } else {
                    document.getElementById('loader').innerHTML = '<span>❌ Ошибка загрузки границ. Проверьте соединение.</span>';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                    }, 3000);
                }
            });
    }

    function initRegionsLayer(geoJsonData) {
        regionsLayer = L.geoJSON(geoJsonData, {
            style: function(feature) {
                let regionName = feature.properties?.name || 
                                feature.properties?.NAME || 
                                feature.properties?.admin_name ||
                                feature.properties?.region ||
                                "";
                const level = currentAlertLevels[regionName] || 0;
                let fillColor;
                if (level === 0) fillColor = colors.clear;
                else if (level === 1) fillColor = colors.droneDanger;
                else if (level === 2) fillColor = colors.droneAttention;
                else fillColor = colors.rocket;
                
                return {
                    color: "#ffffff",
                    weight: 2.2,
                    fillColor: fillColor,
                    fillOpacity: 0.7,
                    smoothFactor: 0.5,
                    opacity: 0.9
                };
            },
            onEachFeature: function(feature, layer) {
                let regionName = feature.properties?.name || 
                                feature.properties?.NAME || 
                                feature.properties?.admin_name ||
                                feature.properties?.region ||
                                "";
                if (regionName) {
                    const formattedName = formatRegionName(regionName);
                    const level = currentAlertLevels[regionName] || 0;
                    
                    let levelText = "";
                    let levelColor = "";
                    if (level === 0) {
                        levelText = "⚪ Отбой / Спокойно";
                        levelColor = "#adb5bd";
                    } else if (level === 1) {
                        levelText = "🟡 Опасность БПЛА";
                        levelColor = "#ffc107";
                    } else if (level === 2) {
                        levelText = "🟢 Внимание! Угроза БПЛА";
                        levelColor = "#6fcf97";
                    } else {
                        levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!";
                        levelColor = "#c41e3a";
                    }
                    
                    layer.bindPopup(`
                        <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                            <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                                ${formattedName}
                            </div>
                            <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                        </div>
                    `, { className: 'custom-popup' });
                    
                    if (!feature.properties._layer) {
                        feature.properties._layer = layer;
                    }
                }
            }
        }).addTo(map);
        
        setTimeout(() => {
            map.flyTo([61, 95], 4.5, { duration: 1.2 });
        }, 200);
        
        fetchAndUpdateAlerts();
        setInterval(fetchAndUpdateAlerts, 35000);
    }

    function updateRegionColors() {
        if (!regionsLayer) return;
        
        regionsLayer.eachLayer(layer => {
            let regionName = layer.feature?.properties?.name || 
                            layer.feature?.properties?.NAME || 
                            layer.feature?.properties?.admin_name ||
                            layer.feature?.properties?.region ||
                            "";
            const level = currentAlertLevels[regionName] || 0;
            let fillColor;
            if (level === 0) fillColor = colors.clear;
            else if (level === 1) fillColor = colors.droneDanger;
            else if (level === 2) fillColor = colors.droneAttention;
            else fillColor = colors.rocket;
            
            layer.setStyle({
                fillColor: fillColor,
                fillOpacity: 0.7,
                color: "#ffffff",
                weight: 2.2
            });
            
            if (layer.getPopup()) {
                const formattedName = formatRegionName(regionName);
                let levelText = "";
                let levelColor = "";
                if (level === 0) {
                    levelText = "⚪ Отбой / Спокойно";
                    levelColor = "#adb5bd";
                } else if (level === 1) {
                    levelText = "🟡 Опасность БПЛА";
                    levelColor = "#ffc107";
                } else if (level === 2) {
                    levelText = "🟢 Внимание! Угроза БПЛА";
                    levelColor = "#6fcf97";
                } else {
                    levelText = "💀 РАКЕТНАЯ ОПАСНОСТЬ! Укрытие!";
                    levelColor = "#c41e3a";
                }
                
                layer.getPopup().setContent(`
                    <div style="font-family: 'Segoe UI'; font-weight: bold; min-width: 160px;">
                        <div style="font-size:1.1rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                            ${formattedName}
                        </div>
                        <span style="color:${levelColor}; font-size:0.9rem;">${levelText}</span>
                    </div>
                `);
            }
        });
    }

    // ===========================================
    // ПАРСИНГ TELEGRAM (НОВЫЙ КАНАЛ)
    // ===========================================
    async function parseTelegramAlerts() {
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const channel = "https://t.me/s/radarrussiia";  // новый канал
        
        try {
            const resp = await fetch(proxyUrl + encodeURIComponent(channel));
            if (!resp.ok) throw new Error("Ошибка загрузки");
            let html = await resp.text();
            
            let allHtml = html;
            for (let i = 0; i < 2; i++) {
                const matchIds = [...allHtml.matchAll(/data-post="\/radarrussiia(\d+)"/g)];
                if (matchIds.length === 0) break;
                const ids = matchIds.map(m => parseInt(m[1]));
                const oldest = Math.min(...ids);
                const nextUrl = `https://t.me/s/radarrussiia?before=${oldest}`;
                const nextResp = await fetch(proxyUrl + encodeURIComponent(nextUrl));
                if (!nextResp.ok) break;
                allHtml += await nextResp.text();
            }
            
            const postRegex = /data-post="radarrussiia\/(\d+)".*?tgme_widget_message_text[^>]*>(.*?)<\/div>/gis;
            const posts = [];
            let m;
            while ((m = postRegex.exec(allHtml)) !== null) {
                posts.push({
                    id: parseInt(m[1]),
                    text: m[2].replace(/<[^>]*>/g, ' ').toLowerCase()
                });
            }
            
            posts.sort((a,b) => b.id - a.id);
            
            const tempLevels = {};
            
            for (const post of posts) {
                const text = post.text;
                
                let matchedRegions = [];
                for (const [official, keywords] of Object.entries(regionAliases)) {
                    if (keywords.some(kw => text.includes(kw))) {
                        matchedRegions.push(official);
                    }
                }
                if (matchedRegions.length === 0) continue;
                
                let level = 0;
                const isOtboy = /отбой|снята|завершена|отменена/i.test(text);
                const isDroneDanger = /\bбпла?\b|беспилот|дрон|угроза атаки/i.test(text);
                const isDroneAttention = /внимание.*бпла|бпла.*внимание|угроза бпла|воздушная тревога/i.test(text);
                const isRocket = /ракетн|ракета|баллистическ|крылат/i.test(text);
                
                if (isOtboy) {
                    level = 0;
                } else if (isRocket) {
                    level = 3;
                } else if (isDroneAttention) {
                    level = 2;   // зелёный
                } else if (isDroneDanger) {
                    level = 1;   // жёлтый
                } else if (/опасность|тревога/i.test(text)) {
                    level = 1;
                }
                
                for (const region of matchedRegions) {
                    const existing = tempLevels[region];
                    if (!existing || existing.postId < post.id) {
                        tempLevels[region] = { level, postId: post.id };
                    }
                }
            }
            
            const finalAlerts = {};
            for (const [region, data] of Object.entries(tempLevels)) {
                finalAlerts[region] = data.level;
            }
            console.log("Уровни тревог:", finalAlerts);
            return finalAlerts;
        } catch (err) {
            console.error("Парсинг ошибка:", err);
            return {};
        }
    }
    
    async function fetchAndUpdateAlerts() {
        try {
            const levels = await parseTelegramAlerts();
            let changed = false;
            for (const [reg, lvl] of Object.entries(levels)) {
                if (currentAlertLevels[reg] !== lvl) {
                    currentAlertLevels[reg] = lvl;
                    changed = true;
                }
            }
            if (changed || Object.keys(levels).length > 0) {
                updateRegionColors();
                localStorage.setItem("alertCache", JSON.stringify(currentAlertLevels));
            }
        } catch(e) {
            console.warn("Ошибка обновления", e);
            const cached = localStorage.getItem("alertCache");
            if (cached && Object.keys(currentAlertLevels).length === 0) {
                try {
                    currentAlertLevels = JSON.parse(cached);
                    updateRegionColors();
                } catch(er) {}
            }
        }
    }
    
    loadGeoJSON(geojsonUrl);
    
    map.on('zoomend', function() {
        if (map.getZoom() > 7) {
            map.flyTo(map.getCenter(), map.getZoom(), { duration: 0.3 });
        }
    });
    
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && regionsLayer) {
            fetchAndUpdateAlerts();
        }
    });
</script>
</body>
</html>
